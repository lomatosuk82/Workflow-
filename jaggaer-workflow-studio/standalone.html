<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaggaer Approval Workflow Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    // Dynamically load app-bundle.js and transform with Babel
    const script = document.createElement('script');
    script.src = 'app-bundle.js';
    script.type = 'text/babel';
    script.setAttribute('data-presets', 'react');
    script.onload = () => Babel.transformScriptTags();
    document.body.appendChild(script);
    // Fallback: transform after a short delay
    setTimeout(() => Babel.transformScriptTags(), 500);
  </script>
</body>
</html>
