<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jaggaer Approval Workflow Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, Fragment } = React;

const verticals = {
  Manufacturing: { questions: ["Should direct materials, MRO, and capex follow different approval patterns?"] },
  Healthcare: { questions: ["Which commodities require clinical review?"] },
  "Higher Education": { questions: ["Do grants override department approval?"] },
  "Public Sector": { questions: ["Which statutory thresholds require procurement intervention?"] },
  "Life Sciences": { questions: ["Which categories require QA or EHS review?"] },
};

const questionBank = {
  foundations: ["Which workflow type is being designed?", "What business objective is the workflow solving?", "Which approval dimensions materially change routing?"],
  governance: ["What are the approval thresholds?", "Which approvals expire?", "Which exceptions bypass standard routing?"],
  technical: ["Which rules can be maintained in ADW versus XML?", "Which folders already exist?", "Are there automated steps?"],
};

const worksheetPresets = [
  { id: "p2o_validation", label: "P2O validation", matchers: ["p2o"], defaultMode: "static", hints: { approval: ["approval name", "approver"], ruleName: ["rule name"], commodity: ["commodity code"], company: ["company code"], amount: ["total amount"], department: ["department"], glAccount: ["gl account"] } },
  { id: "monetary", label: "Monetary", matchers: ["monetary"], defaultMode: "static", hints: { approval: ["approval name"], ruleName: ["rule name"], commodity: ["category code"], amount: ["pr amount"], department: ["department"], glAccount: ["gl account"] } },
];

const EMPTY_MAPPING = { approval: "", ruleName: "", commodity: "", company: "", amount: "", department: "", glAccount: "" };

const BUILDER_DEFAULTS = {
  workflowType: "requisition", versionDescription: "Generated by Workflow Studio", vertical: "Manufacturing", includeExpiration: true, expiryMode: "department", useInventoryRobot: false, sampleDepartment: "Operations", sampleCommodity: "Capex Equipment", sampleGl: "1505",
  approvals: [
    { id: 1, name: "Department Approval", mode: "dynamic", driver: "department", threshold: "0", folder: "" },
    { id: 2, name: "Commodity Specialist", mode: "adw", driver: "commodity", threshold: "0", folder: "" },
    { id: 3, name: "Capital Approval", mode: "adw", driver: "glAccount", threshold: "10000", folder: "" },
  ],
};

const QUESTIONNAIRE_DEFAULTS = { customerName: "", workflowType: "requisition", vertical: "Manufacturing", versionDescription: "Generated from questionnaire", routeByDepartment: true, routeByCommodity: true, routeByAmount: true, routeByGl: false, includeExpiry: true, expiryMode: "department", highValueThreshold: "25000", departmentFolder: "Department Approval", commodityFolder: "Commodity Review", glFolder: "Finance Approval", needsInventoryRobot: false, notes: "" };

const normalizeHeader = (v) => String(v || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
const pickHeader = (headers, hints) => { const n = headers.map(h => ({ raw: h, norm: normalizeHeader(h) })); const f = n.find(i => hints.some(hint => i.norm.includes(hint))); return f ? f.raw : ""; };
const detectPreset = (name) => worksheetPresets.find(p => p.matchers.every(t => normalizeHeader(name).includes(t))) || worksheetPresets[0];
const detectMapping = (headers, preset) => { const p = preset || worksheetPresets[0]; const n = { ...EMPTY_MAPPING }; Object.keys(n).forEach(k => { n[k] = p.hints && p.hints[k] ? pickHeader(headers, p.hints[k]) : ""; }); return n; };
const parseThreshold = (raw) => { const t = String(raw || "").trim(); if (!t) return ""; const k = t.match(/(\d+(?:\.\d+)?)\s*k/i); if (k) return String(Math.round(Number(k[1]) * 1000)); const a = t.match(/(\d+(?:\.\d+)?)/); return a ? String(Number(a[1])) : ""; };
const escapeXml = (v) => String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&apos;");
const slugify = (v) => String(v || "").replace(/[^A-Za-z0-9]+/g, " ").trim().split(/\s+/).map((p, i) => i === 0 ? p : p.charAt(0).toUpperCase() + p.slice(1)).join("") || "Activity";
const recommendMode = (s) => s.mode === "adw" ? "ADW" : s.mode === "dynamic" ? "Dynamic" : "Static";

const buildRuleFromForm = (form, step) => {
  const t = Number(step.threshold || 0);
  if (step.templateRule) return step.templateRule;
  if (step.mode === "adw") return `Document.RequiresRuleGroupEvaluation("${step.name}") == true`;
  if (step.mode === "dynamic" && step.driver === "department") return t > 0 ? `Document.RequiresDepartmentalApproval() == true && [Document.TotalAmount() >= ${t}]` : `Document.RequiresDepartmentalApproval() == true`;
  if (step.driver === "department") return `[Document.CustomFieldValues("Department") in {"${form.sampleDepartment}"}]`;
  if (step.driver === "commodity") return `[Document.CustomFieldValues("Commodity Code") in {"${form.sampleCommodity}"}]`;
  if (step.driver === "glAccount") return t > 0 ? `[Document.AccountCode() in {"${form.sampleGl}"}] && [Document.TotalAmount() >= ${t}]` : `[Document.AccountCode() in {"${form.sampleGl}"}]`;
  return `Document.TotalAmount() >= ${t || 1}`;
};

const buildWorkflowModel = (form) => {
  const steps = [], activities = [], relationships = [], folders = [];
  const addStep = (n, h) => { if (n && !steps.some(s => s.name === n)) steps.push({ name: n, help: h }); };
  const addFolder = (n, t) => { if (n && !folders.some(f => f.name === n)) folders.push({ name: n, type: t }); };
  activities.push({ name: "START", type: "start", folderSelectionRule: "Dummy", rule: "" });
  form.approvals.forEach(step => {
    const fsr = step.mode === "adw" ? "MultiElementDynamic" : step.mode === "dynamic" && step.driver === "department" ? "Department" : "ExplicitFolder";
    const fr = fsr === "ExplicitFolder" ? (step.folder || "") : "";
    const attrs = [];
    if (step.mode === "adw") attrs.push({ name: "RuleGroupInternalName", value: step.name });
    attrs.push({ name: "wfActivityHelp", value: `${recommendMode(step)} approval driven by ${step.driver}.` });
    activities.push({ name: slugify(step.name), type: "manual", stepName: step.name, folderRef: fr, folderSelectionRule: fsr, rule: buildRuleFromForm(form, step), attrs });
    addStep(step.name, `Workflow step for ${step.name}.`);
    if (fr) addFolder(fr, "shared");
  });
  activities.push({ name: "END", type: "end", folderSelectionRule: "Dummy", rule: "" });
  for (let i = 0; i < activities.length - 1; i++) relationships.push({ previous: activities[i].name, next: activities[i + 1].name });
  return { steps, activities, relationships, folders };
};

const buildXmlFromForm = (form) => {
  const m = buildWorkflowModel(form);
  const sub = form.workflowType === "contract" ? "  <WorkflowSubType>Approval</WorkflowSubType>\n" : "";
  const stepsXml = m.steps.map(s => `  <Step name="${escapeXml(s.name)}">\n    <Attribute name="wfActivityHelp"><AttrValue lang="default">${escapeXml(s.help)}</AttrValue></Attribute>\n  </Step>`).join("\n");
  const activitiesXml = m.activities.map(a => {
    const sr = a.stepName ? `\n    <StepRef name="${escapeXml(a.stepName)}" />` : "";
    const fr = a.folderRef ? `\n    <FolderRef name="${escapeXml(a.folderRef)}" />` : "";
    const at = (a.attrs || []).map(attr => `\n    <Attribute name="${escapeXml(attr.name)}"><AttrValue lang="default">${escapeXml(attr.value)}</AttrValue></Attribute>`).join("");
    const r = a.rule ? `<![CDATA[${a.rule}]]>` : "";
    return `  <Activity name="${escapeXml(a.name)}">\n    <ActivityType>${escapeXml(a.type)}</ActivityType>${sr}${fr}\n    <Rule>${r}</Rule>\n    <FolderSelectionRule>${escapeXml(a.folderSelectionRule)}</FolderSelectionRule>${at}\n  </Activity>`;
  }).join("\n");
  const relsXml = m.relationships.map(r => `  <ActivityRelationship previous="${escapeXml(r.previous)}" next="${escapeXml(r.next)}" />`).join("\n");
  return `<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE ProcessDefinition SYSTEM "https://usertest.sciquest.com/app_docs/dtd/workflow/WorkflowDefinition.dtd">\n<ProcessDefinition>\n  <WorkflowType>${escapeXml(form.workflowType)}</WorkflowType>\n${sub}  <Usable>true</Usable>\n  <Version>1</Version>\n  <VersionDescription>${escapeXml(form.versionDescription)}</VersionDescription>\n  <!--====== Steps ======-->\n${stepsXml}\n  <!--====== Activities ======-->\n${activitiesXml}\n  <!--====== Relationships ======-->\n${relsXml}\n</ProcessDefinition>`;
};

const questionnaireToForm = (q) => {
  const approvals = [];
  if (q.routeByDepartment) approvals.push({ id: 1, name: "Department Approval", mode: "dynamic", driver: "department", threshold: "0", folder: q.departmentFolder || "" });
  if (q.routeByCommodity) approvals.push({ id: 2, name: "Commodity Review", mode: "static", driver: "commodity", threshold: "0", folder: q.commodityFolder || "Commodity Review" });
  if (q.routeByAmount) approvals.push({ id: 3, name: "High Value Approval", mode: "adw", driver: "amount", threshold: q.highValueThreshold || "25000", folder: "" });
  if (q.routeByGl) approvals.push({ id: 4, name: "GL Approval", mode: "static", driver: "glAccount", threshold: "0", folder: q.glFolder || "Finance Approval" });
  return { workflowType: q.workflowType, versionDescription: q.versionDescription, vertical: q.vertical, includeExpiration: q.includeExpiry, expiryMode: q.expiryMode, useInventoryRobot: q.needsInventoryRobot, sampleDepartment: "Customer Dept", sampleCommodity: "Customer Commodity", sampleGl: "Customer GL", approvals };
};

const validateXml = (xml) => {
  const issues = [];
  if (!xml.includes("<ProcessDefinition>")) issues.push("Missing ProcessDefinition root.");
  if (!xml.includes("<WorkflowType>")) issues.push("Missing WorkflowType.");
  if (!xml.includes('Activity name="START"')) issues.push("Missing START activity.");
  if (!xml.includes('Activity name="END"')) issues.push("Missing END activity.");
  return issues;
};

const downloadText = (filename, text) => {
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url; link.download = filename;
  document.body.appendChild(link); link.click();
  document.body.removeChild(link); URL.revokeObjectURL(url);
};

const Section = ({ title, subtitle, children }) => (
  <div className="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
    <div className="mb-3"><div className="text-base font-semibold text-slate-900">{title}</div>{subtitle && <div className="mt-1 text-sm text-slate-500">{subtitle}</div>}</div>
    {children}
  </div>
);

const SmallTag = ({ children }) => <span className="rounded-full border border-slate-200 bg-slate-50 px-2 py-1 text-xs text-slate-700">{children}</span>;

const VisualWorkflow = ({ form }) => {
  const model = useMemo(() => buildWorkflowModel(form), [form]);
  const nodes = model.activities.map(a => ({ id: a.name, label: a.stepName || a.name, kind: a.type }));
  const kindStyle = (k) => k === "start" || k === "end" ? "border-slate-300 bg-slate-50" : k === "automated" ? "border-emerald-300 bg-emerald-50" : "border-sky-300 bg-sky-50";
  return (
    <div className="rounded-2xl border-4 border-sky-600/60 bg-white p-4">
      <div className="mb-2 text-sm font-medium text-slate-700">Workflow Flow</div>
      <div className="overflow-x-auto pb-2">
        <div className="flex min-w-max items-center gap-3">
          {nodes.map((n, i) => (
            <Fragment key={n.id}>
              <div className={`min-w-[120px] rounded-2xl border px-3 py-2 text-center text-sm font-semibold shadow-sm ${kindStyle(n.kind)}`}>{n.label}</div>
              {i < nodes.length - 1 && <div className="h-0.5 w-6 bg-slate-300" />}
            </Fragment>
          ))}
        </div>
      </div>
    </div>
  );
};

const BuilderMode = ({ form, setForm, xmlDraft, setXmlDraft }) => {
  const model = useMemo(() => buildWorkflowModel(form), [form]);
  const blueprint = useMemo(() => {
    const l = [`Type: ${form.workflowType}`, `Vertical: ${form.vertical}`, "", "Steps"];
    model.steps.forEach((s, i) => l.push(`${i + 1}. ${s.name}`));
    l.push("", "Activities");
    model.activities.forEach(a => l.push(`- ${a.name} | ${a.type} | ${a.folderSelectionRule}`));
    return l.join("\n");
  }, [form, model]);
  const issues = useMemo(() => validateXml(xmlDraft), [xmlDraft]);
  const updateApproval = (id, patch) => setForm(c => ({ ...c, approvals: c.approvals.map(i => i.id === id ? { ...i, ...patch } : i) }));

  return (
    <div className="grid gap-6 xl:grid-cols-2">
      <div className="space-y-6">
        <Section title="Builder: Workflow Structure" subtitle="Configure approval steps and routing.">
          <div className="grid gap-3 md:grid-cols-2">
            <label className="text-sm"><div className="mb-1 font-medium">Workflow type</div><select value={form.workflowType} onChange={e => setForm(c => ({ ...c, workflowType: e.target.value }))} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2"><option value="requisition">requisition</option><option value="receipt">receipt</option><option value="contract">contract</option></select></label>
            <label className="text-sm"><div className="mb-1 font-medium">Version</div><input value={form.versionDescription} onChange={e => setForm(c => ({ ...c, versionDescription: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2" /></label>
            <label className="text-sm"><div className="mb-1 font-medium">Sample department</div><input value={form.sampleDepartment} onChange={e => setForm(c => ({ ...c, sampleDepartment: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2" /></label>
            <label className="text-sm"><div className="mb-1 font-medium">Sample commodity</div><input value={form.sampleCommodity} onChange={e => setForm(c => ({ ...c, sampleCommodity: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2" /></label>
          </div>
          <div className="mt-4 space-y-3">
            {form.approvals.map(a => (
              <div key={a.id} className="rounded-2xl border border-slate-200 p-3">
                <div className="grid gap-2 md:grid-cols-4">
                  <label className="text-sm"><div className="mb-1 font-medium">Step</div><input value={a.name} onChange={e => updateApproval(a.id, { name: e.target.value })} className="w-full rounded-xl border border-slate-200 px-3 py-2" /></label>
                  <label className="text-sm"><div className="mb-1 font-medium">Mode</div><select value={a.mode} onChange={e => updateApproval(a.id, { mode: e.target.value })} className="w-full rounded-xl border border-slate-200 px-3 py-2"><option value="static">static</option><option value="dynamic">dynamic</option><option value="adw">adw</option></select></label>
                  <label className="text-sm"><div className="mb-1 font-medium">Driver</div><select value={a.driver} onChange={e => updateApproval(a.id, { driver: e.target.value })} className="w-full rounded-xl border border-slate-200 px-3 py-2"><option value="department">department</option><option value="commodity">commodity</option><option value="amount">amount</option><option value="glAccount">gl account</option></select></label>
                  <label className="text-sm"><div className="mb-1 font-medium">Threshold</div><input value={a.threshold} onChange={e => updateApproval(a.id, { threshold: e.target.value })} className="w-full rounded-xl border border-slate-200 px-3 py-2" /></label>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-4 flex flex-wrap gap-2">
            <button onClick={() => setForm(c => ({ ...c, approvals: [...c.approvals, { id: Date.now(), name: `Approval ${c.approvals.length + 1}`, mode: "adw", driver: "amount", threshold: "0", folder: "" }] }))} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Add Step</button>
            <button onClick={() => setXmlDraft(buildXmlFromForm(form))} className="rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm font-medium">Generate XML</button>
          </div>
        </Section>
      </div>
      <div className="space-y-6">
        <Section title="Workflow Preview" subtitle="Visual representation."><VisualWorkflow form={form} /></Section>
        <Section title="Blueprint" subtitle="Summary."><pre className="max-h-[200px] overflow-auto rounded-2xl bg-slate-950 p-4 text-xs leading-5 text-emerald-300">{blueprint}</pre></Section>
        <Section title="XML Output" subtitle="Export workflow definition.">
          <textarea value={xmlDraft} onChange={e => setXmlDraft(e.target.value)} rows={12} className="w-full rounded-2xl border border-slate-200 bg-slate-950 px-3 py-3 font-mono text-xs leading-5 text-emerald-300" />
          <div className="mt-3 flex gap-2">
            <button onClick={() => downloadText(`${form.workflowType}-workflow.xml`, xmlDraft)} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Export XML</button>
          </div>
          <div className="mt-3">{issues.length === 0 ? <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-sm text-emerald-800">Valid XML structure.</div> : issues.map(i => <div key={i} className="rounded-2xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-900 mb-2">{i}</div>)}</div>
        </Section>
      </div>
    </div>
  );
};

const TemplateMode = ({ form, setForm, templateXml, setTemplateXml }) => {
  const [workbookName, setWorkbookName] = useState("");
  const [sheets, setSheets] = useState({});
  const [sheetNames, setSheetNames] = useState([]);
  const [selectedSheet, setSelectedSheet] = useState("");
  const [sheetRows, setSheetRows] = useState([]);
  const [mapping, setMapping] = useState({ ...EMPTY_MAPPING });
  const headers = useMemo(() => sheetRows.length ? Object.keys(sheetRows[0]) : [], [sheetRows]);
  const issues = useMemo(() => validateXml(templateXml), [templateXml]);

  const uploadWorkbook = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: "array" });
    const ns = {};
    wb.SheetNames.forEach(n => { ns[n] = XLSX.utils.sheet_to_json(wb.Sheets[n], { defval: "" }); });
    setWorkbookName(file.name); setSheets(ns); setSheetNames(wb.SheetNames);
    if (wb.SheetNames[0]) {
      const rows = ns[wb.SheetNames[0]] || [];
      setSelectedSheet(wb.SheetNames[0]); setSheetRows(rows);
      setMapping(rows.length ? detectMapping(Object.keys(rows[0]), worksheetPresets[0]) : { ...EMPTY_MAPPING });
    }
  };

  const selectSheet = (name) => {
    const rows = sheets[name] || [];
    setSelectedSheet(name); setSheetRows(rows);
    setMapping(rows.length ? detectMapping(Object.keys(rows[0]), worksheetPresets[0]) : { ...EMPTY_MAPPING });
  };

  const buildFromSheet = () => {
    if (!sheetRows.length || !mapping.approval) return;
    const groups = new Map();
    sheetRows.forEach((row, i) => {
      const approver = String(row[mapping.approval] || "").trim() || `Approver ${i + 1}`;
      if (!groups.has(approver)) groups.set(approver, []);
      groups.get(approver).push(row);
    });
    const approvals = Array.from(groups.entries()).slice(0, 15).map(([approver, rows], i) => ({
      id: Date.now() + i, name: approver.slice(0, 60), mode: "static",
      driver: mapping.commodity && rows[0][mapping.commodity] ? "commodity" : "department",
      threshold: parseThreshold(mapping.amount ? rows[0][mapping.amount] : "") || "0", folder: approver.slice(0, 60),
      templateRule: rows.map(r => { const parts = []; if (mapping.commodity && r[mapping.commodity]) parts.push(`[Document.CustomFieldValues("Commodity Code") in {"${r[mapping.commodity]}"}]`); if (mapping.department && r[mapping.department]) parts.push(`[Document.CustomFieldValues("Department") in {"${r[mapping.department]}"}]`); const t = parseThreshold(mapping.amount ? r[mapping.amount] : ""); if (t) parts.push(`[Document.TotalAmount() >= ${t}]`); return parts.length ? `(${parts.join(" && ")})` : "true"; }).join(" || ") || "true"
    }));
    const nextForm = { ...form, approvals };
    setForm(nextForm); setTemplateXml(buildXmlFromForm(nextForm));
  };

  return (
    <div className="grid gap-6 xl:grid-cols-2">
      <div className="space-y-6">
        <Section title="Template Import" subtitle="Upload Excel spreadsheet.">
          <div className="grid gap-3 md:grid-cols-2">
            <label className="text-sm"><div className="mb-1 font-medium">Upload file</div><input type="file" accept=".xlsx,.xls" onChange={uploadWorkbook} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm" /></label>
            <div className="rounded-2xl bg-slate-50 p-3 text-sm"><div className="font-medium">Loaded</div><div className="mt-1">{workbookName || "No file"}</div></div>
          </div>
          <div className="mt-4 grid gap-3 md:grid-cols-2">
            <label className="text-sm"><div className="mb-1 font-medium">Sheet</div><select value={selectedSheet} onChange={e => selectSheet(e.target.value)} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2"><option value="">Select</option>{sheetNames.map(n => <option key={n} value={n}>{n}</option>)}</select></label>
            <div className="rounded-2xl bg-slate-50 p-3 text-sm"><div className="font-medium">Headers</div><div className="mt-1 text-xs">{headers.slice(0, 4).join(", ") || "None"}</div></div>
          </div>
          <div className="mt-4 grid gap-2 md:grid-cols-3">
            {Object.keys(mapping).map(k => <label key={k} className="text-sm"><div className="mb-1 font-medium">{k}</div><select value={mapping[k]} onChange={e => setMapping(c => ({ ...c, [k]: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-2 py-1 text-sm"><option value="">-</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>)}
          </div>
          <div className="mt-4"><button onClick={buildFromSheet} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Generate XML</button></div>
          <div className="mt-4 rounded-2xl border border-slate-200 bg-white p-3">
            <div className="font-medium text-sm">Preview ({sheetRows.length} rows)</div>
            <div className="mt-2 max-h-32 overflow-auto space-y-1">{sheetRows.slice(0, 4).map((r, i) => <div key={i} className="rounded bg-slate-50 p-2 text-xs">{headers.slice(0, 3).map(h => `${h}=${r[h]}`).join(" | ")}</div>)}</div>
          </div>
        </Section>
      </div>
      <div className="space-y-6">
        <Section title="Workflow Preview" subtitle="From spreadsheet."><VisualWorkflow form={form} /></Section>
        <Section title="XML Output" subtitle="Export.">
          <textarea value={templateXml} onChange={e => setTemplateXml(e.target.value)} rows={14} className="w-full rounded-2xl border border-slate-200 bg-slate-950 px-3 py-3 font-mono text-xs leading-5 text-emerald-300" />
          <div className="mt-3"><button onClick={() => downloadText(`template-workflow.xml`, templateXml)} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Export XML</button></div>
          <div className="mt-3">{issues.length === 0 ? <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-sm text-emerald-800">Valid.</div> : issues.map(i => <div key={i} className="rounded-2xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-900 mb-2">{i}</div>)}</div>
        </Section>
      </div>
    </div>
  );
};

const QuestionnaireMode = ({ questionnaire, setQuestionnaire, questionnaireXml, setQuestionnaireXml }) => {
  const formFromQ = useMemo(() => questionnaireToForm(questionnaire), [questionnaire]);
  const issues = useMemo(() => validateXml(questionnaireXml), [questionnaireXml]);
  const questions = useMemo(() => [...questionBank.foundations, ...questionBank.governance, ...(verticals[questionnaire.vertical]?.questions || []), ...questionBank.technical], [questionnaire.vertical]);

  return (
    <div className="grid gap-6 xl:grid-cols-2">
      <div className="space-y-6">
        <Section title="Questionnaire" subtitle="Customer decisions.">
          <div className="grid gap-3 md:grid-cols-2">
            <label className="text-sm"><div className="mb-1 font-medium">Customer</div><input value={questionnaire.customerName} onChange={e => setQuestionnaire(c => ({ ...c, customerName: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2" /></label>
            <label className="text-sm"><div className="mb-1 font-medium">Type</div><select value={questionnaire.workflowType} onChange={e => setQuestionnaire(c => ({ ...c, workflowType: e.target.value }))} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2"><option value="requisition">requisition</option><option value="receipt">receipt</option><option value="contract">contract</option></select></label>
            <label className="text-sm"><div className="mb-1 font-medium">Vertical</div><select value={questionnaire.vertical} onChange={e => setQuestionnaire(c => ({ ...c, vertical: e.target.value }))} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2">{Object.keys(verticals).map(v => <option key={v} value={v}>{v}</option>)}</select></label>
            <label className="text-sm"><div className="mb-1 font-medium">Threshold</div><input value={questionnaire.highValueThreshold} onChange={e => setQuestionnaire(c => ({ ...c, highValueThreshold: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2" /></label>
          </div>
          <div className="mt-4 grid gap-2 md:grid-cols-2">
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByDepartment} onChange={e => setQuestionnaire(c => ({ ...c, routeByDepartment: e.target.checked }))} /> Department</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByCommodity} onChange={e => setQuestionnaire(c => ({ ...c, routeByCommodity: e.target.checked }))} /> Commodity</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByAmount} onChange={e => setQuestionnaire(c => ({ ...c, routeByAmount: e.target.checked }))} /> Amount</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByGl} onChange={e => setQuestionnaire(c => ({ ...c, routeByGl: e.target.checked }))} /> GL</label>
          </div>
          <div className="mt-4"><button onClick={() => setQuestionnaireXml(buildXmlFromForm(formFromQ))} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Generate XML</button></div>
        </Section>
        <Section title="Questions" subtitle="Workshop prompts.">
          <div className="space-y-2 max-h-[250px] overflow-auto">{questions.map((q, i) => <div key={i} className="rounded-xl border border-slate-200 bg-slate-50 p-2 text-sm"><span className="font-semibold mr-1">Q{i + 1}.</span>{q}</div>)}</div>
        </Section>
      </div>
      <div className="space-y-6">
        <Section title="Workflow Preview" subtitle="From answers."><VisualWorkflow form={formFromQ} /></Section>
        <Section title="XML Output" subtitle="Export.">
          <textarea value={questionnaireXml} onChange={e => setQuestionnaireXml(e.target.value)} rows={12} className="w-full rounded-2xl border border-slate-200 bg-slate-950 px-3 py-3 font-mono text-xs leading-5 text-emerald-300" />
          <div className="mt-3"><button onClick={() => downloadText(`questionnaire-workflow.xml`, questionnaireXml)} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Export XML</button></div>
          <div className="mt-3">{issues.length === 0 ? <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-sm text-emerald-800">Valid.</div> : issues.map(i => <div key={i} className="rounded-2xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-900 mb-2">{i}</div>)}</div>
        </Section>
      </div>
    </div>
  );
};

const App = () => {
  const [mode, setMode] = useState("builder");
  const [builderForm, setBuilderForm] = useState(BUILDER_DEFAULTS);
  const [builderXml, setBuilderXml] = useState(buildXmlFromForm(BUILDER_DEFAULTS));
  const [templateForm, setTemplateForm] = useState(BUILDER_DEFAULTS);
  const [templateXml, setTemplateXml] = useState(buildXmlFromForm(BUILDER_DEFAULTS));
  const [questionnaire, setQuestionnaire] = useState(QUESTIONNAIRE_DEFAULTS);
  const [questionnaireXml, setQuestionnaireXml] = useState(buildXmlFromForm(questionnaireToForm(QUESTIONNAIRE_DEFAULTS)));

  return (
    <div className="min-h-screen bg-slate-100 text-slate-900">
      <div className="mx-auto max-w-7xl p-4 md:p-6">
        <div className="mb-6 rounded-[28px] bg-slate-900 p-6 text-white shadow-xl">
          <div className="grid gap-6 lg:grid-cols-[1.5fr,1fr]">
            <div>
              <div className="mb-2 text-sm text-slate-300">Jaggaer Approval Workflow Studio</div>
              <h1 className="text-2xl md:text-3xl font-semibold tracking-tight">Three workflow-generation options</h1>
              <p className="mt-3 max-w-2xl text-sm leading-6 text-slate-300">Build workflows directly, import from spreadsheets, or use questionnaires.</p>
              <div className="mt-4 flex flex-wrap gap-2"><SmallTag>Builder</SmallTag><SmallTag>Template</SmallTag><SmallTag>Questionnaire</SmallTag></div>
            </div>
            <div className="rounded-3xl border border-white/10 bg-white/5 p-4">
              <div className="text-sm text-slate-300">Current mode</div>
              <div className="mt-2 text-lg font-semibold">{mode === "builder" ? "Direct Builder" : mode === "template" ? "Template Import" : "Questionnaire"}</div>
              <div className="mt-4 grid grid-cols-3 gap-2">
                <button onClick={() => setMode("builder")} className={mode === "builder" ? "rounded-2xl bg-white px-3 py-2 text-sm font-medium text-slate-900" : "rounded-2xl bg-white/10 px-3 py-2 text-sm font-medium text-white"}>Builder</button>
                <button onClick={() => setMode("template")} className={mode === "template" ? "rounded-2xl bg-white px-3 py-2 text-sm font-medium text-slate-900" : "rounded-2xl bg-white/10 px-3 py-2 text-sm font-medium text-white"}>Template</button>
                <button onClick={() => setMode("questionnaire")} className={mode === "questionnaire" ? "rounded-2xl bg-white px-3 py-2 text-sm font-medium text-slate-900" : "rounded-2xl bg-white/10 px-3 py-2 text-sm font-medium text-white"}>Questions</button>
              </div>
            </div>
          </div>
        </div>
        {mode === "builder" && <BuilderMode form={builderForm} setForm={setBuilderForm} xmlDraft={builderXml} setXmlDraft={setBuilderXml} />}
        {mode === "template" && <TemplateMode form={templateForm} setForm={setTemplateForm} templateXml={templateXml} setTemplateXml={setTemplateXml} />}
        {mode === "questionnaire" && <QuestionnaireMode questionnaire={questionnaire} setQuestionnaire={setQuestionnaire} questionnaireXml={questionnaireXml} setQuestionnaireXml={setQuestionnaireXml} />}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
