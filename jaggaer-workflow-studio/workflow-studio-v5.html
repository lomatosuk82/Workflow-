<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

// ============ ACTIVITY FLAGS ============
const ACTIVITY_FLAGS = {

  OrderConsolidation: "Allows PO consolidation",
  MFARequired: "Requires multi-factor authentication"

// ============ ADW RULES BUILDER COMPONENT ============
const ADWRulesBuilder = ({ rules, onChange }) => {
  const emptyRule = { 
    departments: "", 
    minAmount: "", 
    maxAmount: "", 
    commodityCodes: "", 
    glAccounts: "", 
    companyCodes: "", 
    approvers: "" 
  };

  const addRule = () => onChange([...rules, { ...emptyRule, id: Date.now() }]);
  const removeRule = (id) => onChange(rules.filter(r => r.id !== id));
  const updateRule = (id, field, value) => onChange(rules.map(r => r.id === id ? {...r, [field]: value} : r));

  const applyTemplate = (template) => {
    const templates = {
      amountTiers: [
        { ...emptyRule, id: Date.now(), minAmount: "0", maxAmount: "5000", approvers: "manager@company.com" },
        { ...emptyRule, id: Date.now() + 1, minAmount: "5000", maxAmount: "25000", approvers: "director@company.com" },
        { ...emptyRule, id: Date.now() + 2, minAmount: "25000", maxAmount: "", approvers: "vp@company.com" }
      ],
      byDepartment: [
        { ...emptyRule, id: Date.now(), departments: "IT", approvers: "it-manager@company.com" },
        { ...emptyRule, id: Date.now() + 1, departments: "HR", approvers: "hr-manager@company.com" },
        { ...emptyRule, id: Date.now() + 2, departments: "Finance", approvers: "finance-manager@company.com" }
      ],
      deptAndAmount: [
        { ...emptyRule, id: Date.now(), departments: "IT", minAmount: "0", maxAmount: "10000", approvers: "it-manager@company.com" },
        { ...emptyRule, id: Date.now() + 1, departments: "IT", minAmount: "10000", maxAmount: "", approvers: "it-director@company.com" },
        { ...emptyRule, id: Date.now() + 2, departments: "HR", minAmount: "0", maxAmount: "10000", approvers: "hr-manager@company.com" }
      ],
      byCommodity: [
        { ...emptyRule, id: Date.now(), commodityCodes: "IT, Software", approvers: "it-procurement@company.com" },
        { ...emptyRule, id: Date.now() + 1, commodityCodes: "MRO, Facilities", approvers: "facilities@company.com" },
        { ...emptyRule, id: Date.now() + 2, commodityCodes: "Services", approvers: "services-manager@company.com" }
      ]
    };
    onChange(templates[template] || []);
  };

  const generateRulePreview = (rule) => {
    const conditions = [];
    if (rule.departments) conditions.push(`Dept: ${rule.departments}`);
    if (rule.minAmount) conditions.push(`Min: $${rule.minAmount}`);
    if (rule.maxAmount) conditions.push(`Max: $${rule.maxAmount}`);
    if (rule.commodityCodes) conditions.push(`Commodity: ${rule.commodityCodes}`);
    if (rule.glAccounts) conditions.push(`GL: ${rule.glAccounts}`);
    if (rule.companyCodes) conditions.push(`Co: ${rule.companyCodes}`);
    return conditions.length > 0 ? conditions.join(" AND ") : "No conditions (matches all)";
  };

  return (
    <div className="md:col-span-2 mt-4">
      <div className="bg-amber-50 border-2 border-amber-200 rounded-xl p-4">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <span className="text-amber-600">📋</span>
            <h4 className="font-semibold text-amber-900">ADW Approval Rules</h4>
          </div>
          <div className="flex items-center gap-2">
            <select 
              onChange={(e) => { if (e.target.value) applyTemplate(e.target.value); e.target.value = ""; }}
              className="text-xs px-2 py-1 border border-amber-300 rounded bg-white text-amber-800"
            >
              <option value="">Quick Templates...</option>
              <option value="amountTiers">Amount Tiers</option>
              <option value="byDepartment">By Department</option>
              <option value="deptAndAmount">Dept + Amount</option>
              <option value="byCommodity">By Commodity</option>
            </select>
            {rules.length > 0 && (
              <button onClick={() => onChange([])} className="text-xs px-2 py-1 bg-amber-200 text-amber-800 rounded hover:bg-amber-300">
                Clear All
              </button>
            )}
            <button onClick={addRule} className="text-xs px-3 py-1 bg-amber-500 text-white rounded hover:bg-amber-600">
              + Add Rule
            </button>
          </div>
        </div>

        {rules.length === 0 ? (
          <div className="text-center py-6 text-amber-700">
            <p className="text-sm">No rules configured. Click "+ Add Rule" or select a template.</p>
            <p className="text-xs mt-1 text-amber-600">Rules define conditions for routing to specific approvers.</p>
          </div>
        ) : (
          <div className="space-y-4">
            {rules.map((rule, idx) => (
              <div key={rule.id} className="bg-white border border-amber-200 rounded-lg p-4">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-sm font-semibold text-amber-800">Rule #{idx + 1}</span>
                  <button onClick={() => removeRule(rule.id)} className="text-xs text-red-500 hover:text-red-700">
                    ✕ Remove
                  </button>
                </div>
                
                <div className="grid grid-cols-3 gap-3 mb-3">
                  <div>
                    <label className="block text-xs font-medium text-amber-700 mb-1">Department(s)</label>
                    <input
                      value={rule.departments || ""}
                      onChange={(e) => updateRule(rule.id, "departments", e.target.value)}
                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                      placeholder="e.g., IT, HR, Finance"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-medium text-amber-700 mb-1">Min Amount ($)</label>
                    <input
                      type="number"
                      value={rule.minAmount || ""}
                      onChange={(e) => updateRule(rule.id, "minAmount", e.target.value)}
                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                      placeholder="0"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-medium text-amber-700 mb-1">Max Amount ($)</label>
                    <input
                      type="number"
                      value={rule.maxAmount || ""}
                      onChange={(e) => updateRule(rule.id, "maxAmount", e.target.value)}
                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                      placeholder="No limit"
                    />
                  </div>
                </div>

                <div className="grid grid-cols-3 gap-3 mb-3">
                  <div>
                    <label className="block text-xs font-medium text-amber-700 mb-1">Commodity Code(s)</label>
                    <input
                      value={rule.commodityCodes || ""}
                      onChange={(e) => updateRule(rule.id, "commodityCodes", e.target.value)}
                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                      placeholder="e.g., IT, MRO"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-medium text-amber-700 mb-1">GL Account(s)</label>
                    <input
                      value={rule.glAccounts || ""}
                      onChange={(e) => updateRule(rule.id, "glAccounts", e.target.value)}
                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                      placeholder="e.g., 1505, 1510"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-medium text-amber-700 mb-1">Company Code(s)</label>
                    <input
                      value={rule.companyCodes || ""}
                      onChange={(e) => updateRule(rule.id, "companyCodes", e.target.value)}
                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                      placeholder="e.g., 1000, 2000"
                    />
                  </div>
                </div>

                <div className="mb-2">
                  <label className="block text-xs font-medium text-amber-700 mb-1">👤 Approver(s) for this rule</label>
                  <input
                    value={rule.approvers || ""}
                    onChange={(e) => updateRule(rule.id, "approvers", e.target.value)}
                    className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400 focus:border-amber-400"
                    placeholder="e.g., john.smith@company.com, jane.doe@company.com"
                  />
                </div>

                <div className="bg-amber-50 rounded px-3 py-2 text-xs text-amber-700">
                  <strong>Rule:</strong> {generateRulePreview(rule)} → {rule.approvers ? `[${rule.approvers}]` : "[No approvers set]"}
                </div>
              </div>
            ))}
          </div>
        )}

        {rules.length > 0 && (
          <div className="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
            <h5 className="text-xs font-semibold text-blue-800 mb-2">📊 Rules Summary</h5>
            <div className="text-xs text-blue-700 space-y-1">
              {rules.map((rule, idx) => (
                <div key={rule.id} className="flex items-center gap-2">
                  <span className="font-medium">#{idx + 1}:</span>
                  <span>{generateRulePreview(rule)}</span>
                  <span className="text-blue-500">→</span>
                  <span className="font-medium">{rule.approvers || "No approvers"}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ============ MAIN APP ============
const App = () => {
  const [mode, setMode] = useState(null); // null, 'builder', 'template', 'questionnaire'
  const [workflowType, setWorkflowType] = useState(null);
  const [steps, setSteps] = useState([]);
  const [workflowName, setWorkflowName] = useState("");
  const [showEmulator, setShowEmulator] = useState(false);
  const [selectedStep, setSelectedStep] = useState(null);
  const [validationErrors, setValidationErrors] = useState([]);

  // Load standard workflow template
  const loadTemplate = (type) => {
    const template = STANDARD_WORKFLOWS[type];
    if (template) {
      setWorkflowType(type);
      setWorkflowName(template.name + " Workflow");
      setSteps(template.steps.map(s => ({ ...s, id: Date.now() + Math.random() })));
    }
  };

  // Validate workflow
  const validateWorkflow = useCallback(() => {
    const errors = [];
    if (!workflowName.trim()) errors.push({ type: "error", message: "Workflow name is required" });
    if (steps.length === 0) errors.push({ type: "error", message: "At least one step is required" });
    
    steps.forEach((step, idx) => {
      if (!step.name?.trim()) errors.push({ type: "error", message: `Step ${idx + 1}: Name is required` });
      if (step.folderRule === "ExplicitFolder" && !step.folder?.trim()) {
        errors.push({ type: "error", message: `Step "${step.name}": Folder name is required` });
      }
      if (step.folderRule === "MultiElementDynamic" && !step.ruleGroup?.trim()) {
        errors.push({ type: "error", message: `Step "${step.name}": Rule Group is required` });
      }
      if (step.type === "automated" && !step.robot) {
        errors.push({ type: "warning", message: `Step "${step.name}": No robot specified for automated step` });
      }
    });

    // Check for required PO workflow steps
    if (workflowType === "purchaseOrder") {
      const hasRevisePO = steps.some(s => s.robot === "CreatePORevisionRobot");
      if (!hasRevisePO) errors.push({ type: "warning", message: "PO workflows should include a Revise PO step" });
    }

    setValidationErrors(errors);
    return errors.filter(e => e.type === "error").length === 0;
  }, [workflowName, steps, workflowType]);

  // Generate XML
  const generateXML = () => {
    const slugify = (str) => str.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
    
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    xml += `<WorkflowProcess name="${slugify(workflowName)}" version="1">\n`;
    xml += `  <WorkflowType>${workflowType || 'requisition'}</WorkflowType>\n\n`;
    
    // Steps
    xml += `  <!-- Steps -->\n`;
    steps.forEach(step => {
      xml += `  <Step name="${step.name}">\n`;
      xml += `    <HelpText>${step.description || ''}</HelpText>\n`;
      xml += `  </Step>\n`;
    });
    
    // Activities
    xml += `\n  <!-- Activities -->\n`;
    xml += `  <Activity name="START">\n    <ActivityType>start</ActivityType>\n  </Activity>\n\n`;
    
    steps.forEach(step => {
      xml += `  <Activity name="${slugify(step.name)}">\n`;
      xml += `    <ActivityType>${step.type}</ActivityType>\n`;
      xml += `    <StepRef name="${step.name}" />\n`;
      if (step.folder) xml += `    <FolderRef name="${step.folder}" />\n`;
      xml += `    <Rule><![CDATA[${step.rule || 'true'}]]></Rule>\n`;
      xml += `    <FolderSelectionRule>${step.folderRule}</FolderSelectionRule>\n`;
      if (step.ruleGroup) {
        xml += `    <Attribute name="RuleGroupInternalName">\n`;
        xml += `      <AttrValue lang="default">${step.ruleGroup}</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      if (step.skipIfNoApprovers) {
        xml += `    <Attribute name="wfSkipStepIfNoApprovers">\n`;
        xml += `      <AttrValue lang="default">true</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      // ADW Rules as config attribute
      if (step.adwRules && step.adwRules.length > 0) {
        const rulesConfig = step.adwRules.map(r => ({
          dept: r.departments,
          min: r.minAmount,
          max: r.maxAmount,
          commodity: r.commodityCodes,
          gl: r.glAccounts,
          company: r.companyCodes,
          approvers: r.approvers
        }));
        xml += `    <Attribute name="wfADWRulesConfig">\n`;
        xml += `      <AttrValue lang="default"><![CDATA[${JSON.stringify(rulesConfig)}]]></AttrValue>\n`;
        xml += `    </Attribute>\n`;
        // Also add approvers list for backward compatibility
        const allApprovers = step.adwRules.map(r => r.approvers).filter(Boolean).join(', ');
        if (allApprovers) {
          xml += `    <Attribute name="wfADWApprovers">\n`;
          xml += `      <AttrValue lang="default">${allApprovers}</AttrValue>\n`;
          xml += `    </Attribute>\n`;
        }
      }
      if (step.flags) {
        step.flags.forEach(flag => xml += `    <Flag>${flag}</Flag>\n`);
      }
      // Robot reference for automated steps
      if (step.type === 'automated' && step.robot) {
        xml += `    <!-- Robot: ${ROBOTS[step.robot]?.name || step.robot} (ID: ${ROBOTS[step.robot]?.id || 'N/A'}) -->\n`;
      }
      xml += `  </Activity>\n\n`;
    });
    
    xml += `  <Activity name="END">\n    <ActivityType>end</ActivityType>\n  </Activity>\n\n`;
    
    // Relationships
    xml += `  <!-- Relationships -->\n`;
    xml += `  <ActivityRelationship from="START" to="${slugify(steps[0]?.name || 'END')}" />\n`;
    steps.forEach((step, idx) => {
      const next = steps[idx + 1] ? slugify(steps[idx + 1].name) : "END";
      xml += `  <ActivityRelationship from="${slugify(step.name)}" to="${next}" />\n`;
    });
    
    xml += `</WorkflowProcess>`;
    return xml;
  };

  // Welcome Screen
  if (!mode) {
    return (

  if (mode === "template") {
    return (

// ============ WORKFLOW EMULATOR ============
const WorkflowEmulator = ({ steps, workflowName, workflowType, onClose }) => {
  const [currentStep, setCurrentStep] = useState(-1); // -1 = START
  const [isRunning, setIsRunning] = useState(false);
  const [log, setLog] = useState([]);
  const [documentData, setDocumentData] = useState({
    totalAmount: 15000,
    department: "Engineering",
    commodity: "IT Equipment",
    status: "Submitted"
  });

  const allSteps = [
    { name: "START", type: "start", description: "Document enters workflow" },
    ...steps,
    { name: "END", type: "end", description: "Workflow complete" }
  ];

  const addLog = (message, type = "info") => {
    setLog(prev => [...prev, { time: new Date().toLocaleTimeString(), message, type }]);
  };

  const runSimulation = async () => {
    setIsRunning(true);
    setLog([]);
    setCurrentStep(-1);

    addLog(`🚀 Starting ${workflowName} simulation`, "success");
    addLog(`📄 Document: Amount=$${documentData.totalAmount}, Dept=${documentData.department}`, "info");

    await new Promise(r => setTimeout(r, 1000));
    setCurrentStep(0);
    addLog("▶️ START activity triggered", "info");

    for (let i = 0; i < steps.length; i++) {
      await new Promise(r => setTimeout(r, 1500));
      setCurrentStep(i + 1);
      
      const step = steps[i];
      addLog(`📍 Entering: ${step.name}`, "info");
      
      // Evaluate rule
      let ruleResult = true;
      if (step.rule && step.rule !== "true") {
        // Simple rule evaluation for demo
        if (step.rule.includes("TotalAmount()") && step.rule.includes(">=")) {
          const threshold = parseInt(step.rule.match(/>=\s*(\d+)/)?.[1] || "0");
          ruleResult = documentData.totalAmount >= threshold;
          addLog(`   📊 Rule check: Amount ${documentData.totalAmount} >= ${threshold} → ${ruleResult ? "✅ PASS" : "⏭️ SKIP"}`, ruleResult ? "success" : "warning");
        }
      }

      if (!ruleResult) {
        addLog(`   ⏭️ Step skipped (rule not met)`, "warning");
        continue;
      }

      // Process step
      if (step.type === "automated") {
        addLog(`   🤖 Robot executing: ${ROBOTS[step.robot]?.name || step.robot || "Unknown"}`, "info");
        await new Promise(r => setTimeout(r, 800));
        addLog(`   ✅ Robot completed successfully`, "success");
      } else if (step.type === "notification") {
        addLog(`   📧 Notification sent to approvers`, "info");
      } else {
        addLog(`   👤 Awaiting approval in folder: ${step.folder || "Dynamic"}`, "info");
        await new Promise(r => setTimeout(r, 500));
        addLog(`   ✅ Approved by: john.smith@company.com`, "success");
      }
    }

    await new Promise(r => setTimeout(r, 1000));
    setCurrentStep(steps.length + 1);
    addLog("🏁 END activity reached", "success");
    addLog("✨ Workflow completed successfully!", "success");
    setIsRunning(false);
  };

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        {/* Header */}
        <div className="bg-gradient-to-r from-purple-600 to-blue-600 text-white p-6">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-2xl font-bold">🎮 Workflow Simulator</h2>
              <p className="text-purple-200 mt-1">{workflowName}</p>
            </div>
            <button onClick={onClose} className="text-white/80 hover:text-white text-2xl">×</button>
          </div>
        </div>

        <div className="flex-1 overflow-auto p-6">
          <div className="grid lg:grid-cols-2 gap-6">
            {/* Visual Flow */}
            <div>
              <h3 className="font-semibold text-slate-900 mb-4">📊 Workflow Progress</h3>
              <div className="bg-slate-50 rounded-xl p-4 space-y-3">
                {allSteps.map((step, idx) => (
                  <div key={idx} className="flex items-center gap-4">
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white font-bold transition-all duration-500 ${
                      idx < currentStep ? 'bg-green-500 scale-100' :
                      idx === currentStep ? 'bg-blue-500 scale-110 animate-pulse-glow' :
                      'bg-slate-300 scale-90'
                    }`}>
                      {idx < currentStep ? '✓' : 
                       step.type === 'start' ? '▶' : 
                       step.type === 'end' ? '■' : 
                       step.type === 'automated' ? '🤖' : 
                       step.type === 'notification' ? '📧' : '👤'}
                    </div>
                    <div className="flex-1">
                      <div className={`font-medium ${idx === currentStep ? 'text-blue-600' : idx < currentStep ? 'text-green-600' : 'text-slate-400'}`}>
                        {step.name}
                      </div>
                      <div className="text-xs text-slate-500">{step.description}</div>
                    </div>
                    {idx === currentStep && isRunning && (
                      <div className="text-blue-500 animate-pulse">Processing...</div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* Log & Controls */}
            <div>
              <h3 className="font-semibold text-slate-900 mb-4">📜 Execution Log</h3>
              <div className="bg-slate-900 rounded-xl p-4 h-64 overflow-auto font-mono text-sm">
                {log.length === 0 ? (
                  <div className="text-slate-500">Click "Run Simulation" to start...</div>
                ) : (
                  log.map((entry, i) => (
                    <div key={i} className={`mb-1 ${
                      entry.type === 'success' ? 'text-green-400' :
                      entry.type === 'warning' ? 'text-amber-400' :
                      entry.type === 'error' ? 'text-red-400' : 'text-slate-300'
                    }`}>
                      <span className="text-slate-500">[{entry.time}]</span> {entry.message}
                    </div>
                  ))
                )}
              </div>

              {/* Test Data */}
              <div className="mt-4 bg-slate-100 rounded-xl p-4">
                <h4 className="font-medium text-slate-700 mb-3">📄 Test Document Data</h4>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs text-slate-500">Total Amount</label>
                    <input
                      type="number"
                      value={documentData.totalAmount}
                      onChange={(e) => setDocumentData({...documentData, totalAmount: parseInt(e.target.value) || 0})}
                      className="w-full px-3 py-2 border rounded-lg text-sm"
                      disabled={isRunning}
                    />
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">Department</label>
                    <input
                      value={documentData.department}
                      onChange={(e) => setDocumentData({...documentData, department: e.target.value})}
                      className="w-full px-3 py-2 border rounded-lg text-sm"
                      disabled={isRunning}
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div className="border-t border-slate-200 p-4 flex justify-between items-center bg-slate-50">
          <div className="text-sm text-slate-500">
            {currentStep >= 0 && currentStep <= steps.length && (
              <span>Step {currentStep + 1} of {steps.length + 2}</span>
            )}
          </div>
          <div className="flex gap-3">
            <button
              onClick={() => { setCurrentStep(-1); setLog([]); }}
              className="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300"
              disabled={isRunning}
            >
              Reset
            </button>
            <button
              onClick={runSimulation}
              className="px-6 py-2 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-lg hover:opacity-90 disabled:opacity-50"
              disabled={isRunning}
            >
              {isRunning ? "Running..." : "▶️ Run Simulation"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// Render
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
