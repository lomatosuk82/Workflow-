// ============ UTILITIES ============
const escapeXml = (v) => String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&apos;");

const parseConditionToRule = (conditions, driver) => {
  if (!conditions || conditions.length === 0) return "true";
  
  const parts = conditions.map(c => {
    const field = c.driver === "department" ? 'Document.CustomFieldValues("Department")'
      : c.driver === "commodity" ? 'Document.CustomFieldValues("Commodity Code")'
      : c.driver === "glAccount" ? 'Document.AccountCode()'
      : c.driver === "amount" ? 'Document.TotalAmount()'
      : c.driver === "costCenter" ? 'Document.CustomFieldValues("Cost Center")'
      : 'Document.CustomFieldValues("' + c.driver + '")';
    
    const values = c.values.split(",").map(v => v.trim());
    
    if (c.operator === "range") {
      const rangeMatch = c.values.match(/(\d+)\s*[-–]\s*(\d+)/);
      if (rangeMatch) {
        return `[${field} >= ${rangeMatch[1]} && ${field} <= ${rangeMatch[2]}]`;
      }
    }
    if (c.operator === "in") {
      return `[${field} in {${values.map(v => `"${v}"`).join(",")}}]`;
    }
    if (c.operator === "equals") {
      return `[${field} == "${values[0]}"]`;
    }
    if (c.operator === "startsWith") {
      return `${field}.StartsWith("${values[0]}") == true`;
    }
    if (c.operator === "greaterThan") {
      return `[${field} >= ${values[0]}]`;
    }
    if (c.operator === "lessThan") {
      return `[${field} <= ${values[0]}]`;
    }
    return `[${field} in {${values.map(v => `"${v}"`).join(",")}}]`;
  });
  
  // Group by logic operator
  let result = parts[0] || "true";
  for (let i = 1; i < parts.length; i++) {
    const logic = conditions[i]?.logic === "OR" ? " || " : " && ";
    result += logic + parts[i];
  }
  return result;
};

const buildXmlFromState = (state) => {
  const { workflowType, versionDescription, steps, activities, relationships } = state;
  const sub = workflowType === "contract" ? "  <WorkflowSubType>Approval</WorkflowSubType>\n" : "";
  
  const stepsXml = steps.map(s => 
    `  <Step name="${escapeXml(s.name)}">\n    <Attribute name="wfActivityHelp"><AttrValue lang="default">${escapeXml(s.help)}</AttrValue></Attribute>\n  </Step>`
  ).join("\n");
  
  const activitiesXml = activities.map(a => {
    const step = steps.find(s => s.id === a.stepId);
    const stepRef = step ? `\n    <StepRef name="${escapeXml(step.name)}" />` : "";
    const folderRef = a.folderRef ? `\n    <FolderRef name="${escapeXml(a.folderRef)}" />` : "";
    const rule = a.rule || parseConditionToRule(a.conditions);
    const ruleXml = rule && rule !== "true" ? `<![CDATA[${rule}]]>` : "";
    return `  <Activity name="${escapeXml(a.name)}">\n    <ActivityType>${escapeXml(a.type)}</ActivityType>${stepRef}${folderRef}\n    <Rule>${ruleXml}</Rule>\n    <FolderSelectionRule>${escapeXml(a.folderSelectionRule)}</FolderSelectionRule>\n  </Activity>`;
  }).join("\n");
  
  const relsXml = relationships.map(r => {
    const from = activities.find(a => a.id === r.fromId);
    const to = activities.find(a => a.id === r.toId);
    if (!from || !to) return "";
    return `  <ActivityRelationship previous="${escapeXml(from.name)}" next="${escapeXml(to.name)}" />`;
  }).filter(Boolean).join("\n");
  
  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE ProcessDefinition SYSTEM "https://usertest.sciquest.com/app_docs/dtd/workflow/WorkflowDefinition.dtd">
<ProcessDefinition>
  <WorkflowType>${escapeXml(workflowType)}</WorkflowType>
${sub}  <Usable>true</Usable>
  <Version>1</Version>
  <VersionDescription>${escapeXml(versionDescription)}</VersionDescription>
  <!--====== Steps ======-->
${stepsXml}
  <!--====== Activities ======-->
${activitiesXml}
  <!--====== Relationships ======-->
${relsXml}
</ProcessDefinition>`;
};

const downloadText = (filename, text) => {
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url; link.download = filename;
  document.body.appendChild(link); link.click();
  document.body.removeChild(link); URL.revokeObjectURL(url);
};

// Condition Editor Component
const ConditionEditor = ({ conditions, onChange, drivers = ["department", "commodity", "glAccount", "amount", "costCenter"] }) => {
  const addCondition = () => {
    onChange([...conditions, { driver: drivers[0], operator: "in", values: "", logic: "AND" }]);
  };
  
  const updateCondition = (index, field, value) => {
    const updated = [...conditions];
    updated[index] = { ...updated[index], [field]: value };
    onChange(updated);
  };
  
  const removeCondition = (index) => {
    onChange(conditions.filter((_, i) => i !== index));
  };
  
  return (
    <div className="space-y-2">
      {conditions.map((c, i) => (
        <div key={i} className="flex flex-wrap gap-2 items-center p-2 rounded-xl bg-slate-50 border border-slate-200">
          {i > 0 && (
            <select value={c.logic} onChange={e => updateCondition(i, "logic", e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1 text-xs bg-amber-50">
              {LOGIC_OPERATORS.map(op => <option key={op} value={op}>{op}</option>)}
            </select>
          )}
          <select value={c.driver} onChange={e => updateCondition(i, "driver", e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1 text-xs">
            {drivers.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
          <select value={c.operator} onChange={e => updateCondition(i, "operator", e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1 text-xs">
            {OPERATORS.map(op => <option key={op} value={op}>{op}</option>)}
          </select>
          <input 
            value={c.values} 
            onChange={e => updateCondition(i, "values", e.target.value)} 
            placeholder={c.operator === "range" ? "e.g., 201-210" : c.operator === "in" ? "e.g., A,B,C" : "value"}
            className="flex-1 min-w-[120px] rounded-lg border border-slate-300 px-2 py-1 text-xs"
          />
          <button onClick={() => removeCondition(i)} className="text-red-500 hover:text-red-700 text-xs px-2">✕</button>
        </div>
      ))}
      <button onClick={addCondition} className="text-xs text-sky-600 hover:text-sky-800 font-medium">+ Add Condition</button>
    </div>
  );
};

// Relationship Editor Component
const RelationshipEditor = ({ relationships, activities, onChange }) => {
  const addRelationship = () => {
    const newId = Math.max(0, ...relationships.map(r => r.id)) + 1;
    onChange([...relationships, { id: newId, fromId: activities[0]?.id, toId: activities[1]?.id }]);
  };
  
  const updateRelationship = (id, field, value) => {
    onChange(relationships.map(r => r.id === id ? { ...r, [field]: Number(value) } : r));
  };
  
  const removeRelationship = (id) => {
    onChange(relationships.filter(r => r.id !== id));
  };
  
  return (
    <div className="space-y-2">
      {relationships.map(r => {
        const from = activities.find(a => a.id === r.fromId);
        const to = activities.find(a => a.id === r.toId);
        return (
          <div key={r.id} className="flex items-center gap-2 p-2 rounded-lg bg-slate-50 border border-slate-200">
            <select value={r.fromId} onChange={e => updateRelationship(r.id, "fromId", e.target.value)} className="flex-1 rounded-lg border border-slate-300 px-2 py-1 text-xs">

      })}

    </div>

// Visual Flow Component
const VisualFlow = ({ activities, relationships }) => {
  const orderedActivities = useMemo(() => {
    const start = activities.find(a => a.type === "start");
    if (!start) return activities;
    
    const ordered = [start];
    const visited = new Set([start.id]);
    
    while (ordered.length < activities.length) {
      const last = ordered[ordered.length - 1];
      const nextRel = relationships.find(r => r.fromId === last.id && !visited.has(r.toId));
      if (nextRel) {
        const next = activities.find(a => a.id === nextRel.toId);
        if (next) {
          ordered.push(next);
          visited.add(next.id);
        } else break;
      } else {
        // Add remaining unvisited
        activities.filter(a => !visited.has(a.id)).forEach(a => {
          ordered.push(a);
          visited.add(a.id);
        });
        break;
      }
    }
    return ordered;
  }, [activities, relationships]);
  
  const typeColor = (type) => {
    if (type === "start" || type === "end") return "border-slate-400 bg-slate-100";
    if (type === "automated") return "border-emerald-400 bg-emerald-50";
    if (type === "notification") return "border-amber-400 bg-amber-50";
    return "border-sky-400 bg-sky-50";
  };
  
  return (
    <div className="overflow-x-auto pb-2">
      <div className="flex min-w-max items-center gap-2">
        {orderedActivities.map((a, i) => (
          <Fragment key={a.id}>
            <div className={`min-w-[100px] rounded-xl border-2 px-3 py-2 text-center text-xs font-semibold shadow-sm ${typeColor(a.type)}`}>
              <div>{a.name}</div>
              <div className="text-[10px] font-normal text-slate-500 mt-1">{a.type}</div>
            </div>
            {i < orderedActivities.length - 1 && <div className="h-0.5 w-6 bg-slate-300" />}
          </Fragment>
        ))}
      </div>
    </div>
  );
};

                <div key={s.id} className="flex gap-2 items-center p-2 rounded-lg bg-slate-50 border border-slate-200">
                  <input value={s.name} onChange={e => updateStep(s.id, { name: e.target.value })} className="flex-1 rounded-lg border border-slate-300 px-2 py-1 text-sm" placeholder="Step name" />
                  <input value={s.help} onChange={e => updateStep(s.id, { help: e.target.value })} className="flex-1 rounded-lg border border-slate-300 px-2 py-1 text-sm" placeholder="Help text" />
                  <button onClick={() => deleteStep(s.id)} className="text-red-500 hover:text-red-700 text-xs px-2">✕</button>
                </div>
              ))}
            </div>
          </Section>
        )}
        
        {activeTab === "activities" && (
          <Section title="Activities" subtitle="Configure workflow activities" actions={<button onClick={addActivity} className="rounded-lg bg-slate-900 px-3 py-1 text-xs font-medium text-white">+ Add</button>}>
            <div className="space-y-2 max-h-[400px] overflow-auto">
              {state.activities.map(a => (
                <ActivityEditor key={a.id} activity={a} steps={state.steps} onUpdate={updated => updateActivity(a.id, updated)} onDelete={() => deleteActivity(a.id)} />
              ))}
            </div>
          </Section>
        )}
        
        {activeTab === "relationships" && (
          <Section title="Activity Relationships" subtitle="Define activity flow">
            <RelationshipEditor relationships={state.relationships} activities={state.activities} onChange={rels => setState({ ...state, relationships: rels })} />
          </Section>
        )}
      </div>
      
      <div className="space-y-4">
        <Section title="Workflow Flow" subtitle="Visual representation">
          <VisualFlow activities={state.activities} relationships={state.relationships} />
        </Section>
        
        <Section title="Relationships Summary">
          <div className="space-y-1 max-h-[150px] overflow-auto">
            {state.relationships.map(r => {
              const from = state.activities.find(a => a.id === r.fromId);
              const to = state.activities.find(a => a.id === r.toId);
              return (
                <div key={r.id} className="text-xs text-slate-600 font-mono bg-slate-50 rounded px-2 py-1">
                  {from?.name || "?"} → {to?.name || "?"}
                </div>
              );
            })}
          </div>
        </Section>
        
        <Section title="XML Output" actions={<button onClick={() => downloadText(`${state.workflowType}-workflow.xml`, xml)} className="rounded-lg bg-slate-900 px-3 py-1 text-xs font-medium text-white">Export</button>}>
          <textarea value={xml} readOnly rows={16} className="w-full rounded-xl border border-slate-200 bg-slate-950 px-3 py-2 font-mono text-[10px] leading-5 text-emerald-300" />
        </Section>
      </div>
    </div>
  );
};

// ============ TEMPLATE MODE ============
const TemplateMode = ({ state, setState }) => {
  const [workbookName, setWorkbookName] = useState("");
  const [sheetRows, setSheetRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({ approval: "", department: "", commodity: "", amount: "", glAccount: "" });
  const xml = useMemo(() => buildXmlFromState(state), [state]);
  
  const uploadWorkbook = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: "array" });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
    setWorkbookName(file.name);
    setSheetRows(rows);
    setHeaders(rows.length ? Object.keys(rows[0]) : []);
  };
  
  const generateFromSheet = () => {
    if (!sheetRows.length) return;
    
    const groups = new Map();
    sheetRows.forEach((row, i) => {
      const approver = String(row[mapping.approval] || `Approver${i + 1}`).trim();
      if (!groups.has(approver)) groups.set(approver, []);
      groups.get(approver).push(row);
    });
    
    const steps = [];
    const activities = [{ id: 1, name: "START", type: "start", stepId: null, folderSelectionRule: "Dummy", folderRef: "", conditions: [] }];
    let actId = 2;
    
    Array.from(groups.entries()).slice(0, 20).forEach(([approver, rows], i) => {
      const stepId = i + 1;
      steps.push({ id: stepId, name: approver, help: `Imported from ${workbookName}` });
      
      const conditions = [];
      const first = rows[0];
      if (mapping.department && first[mapping.department]) {
        const vals = rows.map(r => r[mapping.department]).filter(Boolean).join(",");
        conditions.push({ driver: "department", operator: "in", values: vals, logic: "AND" });
      }
      if (mapping.commodity && first[mapping.commodity]) {
        const vals = rows.map(r => r[mapping.commodity]).filter(Boolean).join(",");
        conditions.push({ driver: "commodity", operator: "in", values: vals, logic: "AND" });
      }
      if (mapping.amount && first[mapping.amount]) {
        conditions.push({ driver: "amount", operator: "greaterThan", values: String(first[mapping.amount]).replace(/[^0-9.]/g, ""), logic: "AND" });
      }
      
      activities.push({
        id: actId++,
        name: approver.replace(/[^A-Za-z0-9]/g, ""),
        type: "manual",
        stepId,
        folderSelectionRule: "ExplicitFolder",
        folderRef: approver,
        conditions
      });
    });
    
    activities.push({ id: actId, name: "END", type: "end", stepId: null, folderSelectionRule: "Dummy", folderRef: "", conditions: [] });
    
    const relationships = [];
    for (let i = 0; i < activities.length - 1; i++) {
      relationships.push({ id: i + 1, fromId: activities[i].id, toId: activities[i + 1].id });
    }
    
    setState({ ...state, steps, activities, relationships });
  };
  
  return (
    <div className="grid gap-6 xl:grid-cols-2">
      <div className="space-y-4">
        <Section title="Import Spreadsheet">
          <div className="space-y-3">
            <label className="text-sm"><div className="mb-1 font-medium">Upload Excel</div>
              <input type="file" accept=".xlsx,.xls" onChange={uploadWorkbook} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm" />
            </label>
            {workbookName && <div className="text-sm text-slate-600">Loaded: {workbookName} ({sheetRows.length} rows)</div>}
          </div>
        </Section>
        
        {headers.length > 0 && (
          <Section title="Column Mapping">
            <div className="grid gap-2 md:grid-cols-2">
              {Object.keys(mapping).map(k => (
                <label key={k} className="text-xs"><div className="mb-1 font-medium text-slate-600">{k}</div>
                  <select value={mapping[k]} onChange={e => setMapping({ ...mapping, [k]: e.target.value })} className="w-full rounded-lg border border-slate-200 px-2 py-1 text-sm">
                    <option value="">-</option>
                    {headers.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                </label>
              ))}
            </div>
            <button onClick={generateFromSheet} className="mt-3 rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white">Generate Workflow</button>
          </Section>
        )}
        
        <Section title="Activities" subtitle="Edit imported activities">
          <div className="space-y-2 max-h-[300px] overflow-auto">
            {state.activities.map(a => (
              <ActivityEditor key={a.id} activity={a} steps={state.steps} onUpdate={updated => setState({ ...state, activities: state.activities.map(x => x.id === a.id ? updated : x) })} onDelete={() => setState({ ...state, activities: state.activities.filter(x => x.id !== a.id), relationships: state.relationships.filter(r => r.fromId !== a.id && r.toId !== a.id) })} />
            ))}
          </div>
        </Section>
        
        <Section title="Relationships">
          <RelationshipEditor relationships={state.relationships} activities={state.activities} onChange={rels => setState({ ...state, relationships: rels })} />
        </Section>
      </div>
      
      <div className="space-y-4">
        <Section title="Workflow Flow"><VisualFlow activities={state.activities} relationships={state.relationships} /></Section>
        <Section title="XML Output" actions={<button onClick={() => downloadText("template-workflow.xml", xml)} className="rounded-lg bg-slate-900 px-3 py-1 text-xs font-medium text-white">Export</button>}>
          <textarea value={xml} readOnly rows={18} className="w-full rounded-xl border border-slate-200 bg-slate-950 px-3 py-2 font-mono text-[10px] leading-5 text-emerald-300" />
        </Section>
      </div>
    </div>
  );
};

// ============ QUESTIONNAIRE MODE ============
const QuestionnaireMode = ({ answers, setAnswers }) => {
  const currentQ = questionnaireQuestions[answers.currentQuestion];
  const canProceed = currentQ ? (currentQ.condition ? answers[currentQ.condition] === true : true) : false;
  
  const generatedState = useMemo(() => {
    if (!answers.completed) return null;
    
    const steps = [];
    const activities = [{ id: 1, name: "START", type: "start", stepId: null, folderSelectionRule: "Dummy", folderRef: "", conditions: [] }];
    let actId = 2, stepId = 1;
    
    if (answers.routeByDepartment) {
      steps.push({ id: stepId, name: "Department Approval", help: "Route by department" });
      const conditions = [];
      if (answers.departmentValues) {
        const rangeMatch = answers.departmentValues.match(/(\d+)\s*[-–]\s*(\d+)/);
        if (rangeMatch) {
          conditions.push({ driver: "department", operator: "range", values: answers.departmentValues, logic: "AND" });
        } else {
          conditions.push({ driver: "department", operator: "in", values: answers.departmentValues, logic: "AND" });
        }
      }
      activities.push({ id: actId++, name: "DepartmentApproval", type: "manual", stepId: stepId++, folderSelectionRule: "Department", folderRef: "", conditions });
    }
    
    if (answers.routeByCommodity) {
      steps.push({ id: stepId, name: "Commodity Review", help: "Route by commodity" });
      activities.push({ id: actId++, name: "CommodityReview", type: "manual", stepId: stepId++, folderSelectionRule: "MultiElementDynamic", folderRef: "", conditions: [] });
    }
    
    if (answers.routeByAmount) {
      steps.push({ id: stepId, name: "High Value Approval", help: "Amount threshold routing" });
      activities.push({ id: actId++, name: "HighValueApproval", type: "manual", stepId: stepId++, folderSelectionRule: "ExplicitFolder", folderRef: "High Value Approvers", conditions: [{ driver: "amount", operator: "greaterThan", values: answers.highValueThreshold || "25000", logic: "AND" }] });
    }
    
    if (answers.routeByGl) {
      steps.push({ id: stepId, name: "GL Approval", help: "GL account routing" });
      activities.push({ id: actId++, name: "GLApproval", type: "manual", stepId: stepId++, folderSelectionRule: "ExplicitFolder", folderRef: "Finance", conditions: [] });
    }
    
    if (answers.needsNotification) {
      activities.push({ id: actId++, name: "Notification", type: "notification", stepId: null, folderSelectionRule: "ExplicitFolder", folderRef: "Notifications", conditions: [] });
    }
    
    if (answers.needsAutomation) {
      steps.push({ id: stepId, name: "Automation", help: "Automated processing" });
      activities.push({ id: actId++, name: "AutoProcess", type: "automated", stepId: stepId++, folderSelectionRule: "ExplicitFolder", folderRef: "Automation", conditions: [] });
    }
    
    activities.push({ id: actId, name: "END", type: "end", stepId: null, folderSelectionRule: "Dummy", folderRef: "", conditions: [] });
    
    const relationships = [];
    for (let i = 0; i < activities.length - 1; i++) {
      relationships.push({ id: i + 1, fromId: activities[i].id, toId: activities[i + 1].id });
    }
    
    return { workflowType: answers.workflowType || "requisition", versionDescription: "Generated from questionnaire", vertical: answers.vertical || "Manufacturing", steps, activities, relationships };
  }, [answers]);
  
  const xml = useMemo(() => generatedState ? buildXmlFromState(generatedState) : "", [generatedState]);
  
  const answerQuestion = (value) => {
    const updated = { ...answers, [currentQ.field]: value };
    
    // Move to next applicable question
    let nextIdx = answers.currentQuestion + 1;
    while (nextIdx < questionnaireQuestions.length) {
      const nextQ = questionnaireQuestions[nextIdx];
      if (!nextQ.condition || updated[nextQ.condition] === true) break;
      nextIdx++;
    }
    
    if (nextIdx >= questionnaireQuestions.length) {
      updated.completed = true;
    } else {
      updated.currentQuestion = nextIdx;
    }
    
    setAnswers(updated);
  };
  
  const reset = () => setAnswers({ ...QUESTIONNAIRE_DEFAULTS });
  
  return (
    <div className="grid gap-6 xl:grid-cols-2">
      <div className="space-y-4">
        {!answers.completed ? (
          <Section title={`Question ${answers.currentQuestion + 1} of ${questionnaireQuestions.length}`} subtitle="Answer to build your workflow">
            <div className="p-4 rounded-xl bg-slate-50 border border-slate-200">
              <div className="text-lg font-medium text-slate-900 mb-4">{currentQ?.text}</div>
              
              {currentQ?.type === "select" && (
                <div className="space-y-2">
                  {currentQ.options.map(opt => (
                    <button key={opt} onClick={() => answerQuestion(opt)} className="w-full text-left px-4 py-3 rounded-xl border border-slate-200 bg-white hover:bg-sky-50 hover:border-sky-300 transition">
                      {opt}
                    </button>
                  ))}
                </div>
              )}
              
              {currentQ?.type === "yesno" && (
                <div className="flex gap-3">
                  <button onClick={() => answerQuestion(true)} className="flex-1 px-4 py-3 rounded-xl border border-emerald-200 bg-emerald-50 hover:bg-emerald-100 text-emerald-800 font-medium">Yes</button>
                  <button onClick={() => answerQuestion(false)} className="flex-1 px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-800 font-medium">No</button>
                </div>
              )}
              
              {currentQ?.type === "number" && (
                <div className="flex gap-2">
                  <input type="number" defaultValue={answers[currentQ.field] || ""} id="numInput" className="flex-1 rounded-xl border border-slate-200 px-4 py-3" placeholder="Enter amount" />
                  <button onClick={() => answerQuestion(document.getElementById("numInput").value)} className="px-6 py-3 rounded-xl bg-slate-900 text-white font-medium">Next</button>
                </div>
              )}
              
              {currentQ?.type === "text" && (
                <div className="flex gap-2">
                  <input type="text" defaultValue={answers[currentQ.field] || ""} id="textInput" className="flex-1 rounded-xl border border-slate-200 px-4 py-3" placeholder="e.g., 201-205 or 300,301,305" />
                  <button onClick={() => answerQuestion(document.getElementById("textInput").value)} className="px-6 py-3 rounded-xl bg-slate-900 text-white font-medium">Next</button>
                </div>
              )}
            </div>
            
            <div className="mt-4">
              <div className="text-xs text-slate-500 mb-2">Progress</div>
              <div className="h-2 bg-slate-200 rounded-full overflow-hidden">
                <div className="h-full bg-sky-500 transition-all" style={{ width: `${((answers.currentQuestion + 1) / questionnaireQuestions.length) * 100}%` }} />
              </div>
            </div>
          </Section>
        ) : (
          <Section title="Questionnaire Complete" subtitle="Your workflow has been generated" actions={<button onClick={reset} className="rounded-lg border border-slate-200 px-3 py-1 text-xs font-medium">Reset</button>}>
            <div className="space-y-2">
              <div className="text-sm"><strong>Type:</strong> {answers.workflowType}</div>
              <div className="text-sm"><strong>Vertical:</strong> {answers.vertical}</div>
              <div className="text-sm"><strong>Department routing:</strong> {answers.routeByDepartment ? `Yes (${answers.departmentValues || "all"})` : "No"}</div>
              <div className="text-sm"><strong>Commodity routing:</strong> {answers.routeByCommodity ? "Yes" : "No"}</div>
              <div className="text-sm"><strong>Amount routing:</strong> {answers.routeByAmount ? `Yes (≥${answers.highValueThreshold})` : "No"}</div>
              <div className="text-sm"><strong>GL routing:</strong> {answers.routeByGl ? "Yes" : "No"}</div>
              <div className="text-sm"><strong>Notifications:</strong> {answers.needsNotification ? "Yes" : "No"}</div>
              <div className="text-sm"><strong>Automation:</strong> {answers.needsAutomation ? "Yes" : "No"}</div>
            </div>
          </Section>
        )}
        
        <Section title="Your Answers">
          <div className="space-y-1 max-h-[200px] overflow-auto">
            {questionnaireQuestions.slice(0, answers.currentQuestion + (answers.completed ? 1 : 0)).map((q, i) => {
              if (q.condition && answers[q.condition] !== true) return null;
              const val = answers[q.field];
              return (
                <div key={q.id} className="text-xs p-2 rounded bg-slate-50 flex justify-between">
                  <span className="text-slate-600">{q.text.slice(0, 50)}...</span>
                  <span className="font-medium">{val === true ? "Yes" : val === false ? "No" : val || "-"}</span>
                </div>
              );
            })}
          </div>
        </Section>
      </div>
      
      <div className="space-y-4">
        {generatedState && (
          <>
            <Section title="Generated Workflow"><VisualFlow activities={generatedState.activities} relationships={generatedState.relationships} /></Section>
            <Section title="Steps & Activities">
              <div className="grid gap-2 md:grid-cols-2">
                <div>
                  <div className="text-xs font-medium text-slate-600 mb-2">Steps ({generatedState.steps.length})</div>
                  {generatedState.steps.map(s => <div key={s.id} className="text-xs p-2 rounded bg-slate-50 mb-1">{s.name}</div>)}
                </div>
                <div>
                  <div className="text-xs font-medium text-slate-600 mb-2">Activities ({generatedState.activities.length})</div>
                  {generatedState.activities.map(a => <div key={a.id} className="text-xs p-2 rounded bg-slate-50 mb-1"><SmallTag color={a.type === "manual" ? "sky" : a.type === "automated" ? "emerald" : "slate"}>{a.type}</SmallTag> {a.name}</div>)}
                </div>
              </div>
            </Section>
            <Section title="XML Output" actions={<button onClick={() => downloadText("questionnaire-workflow.xml", xml)} className="rounded-lg bg-slate-900 px-3 py-1 text-xs font-medium text-white">Export</button>}>
              <textarea value={xml} readOnly rows={14} className="w-full rounded-xl border border-slate-200 bg-slate-950 px-3 py-2 font-mono text-[10px] leading-5 text-emerald-300" />
            </Section>
          </>
        )}
        {!generatedState && (
          <Section title="Workflow Preview" subtitle="Complete the questionnaire to generate your workflow">
            <div className="text-center py-12 text-slate-400">Answer the questions to see your workflow here</div>
          </Section>
        )}
      </div>
    </div>
  );
};

// ============ MAIN APP ============
const App = () => {
  const [mode, setMode] = useState("builder");
  const [builderState, setBuilderState] = useState(BUILDER_DEFAULTS);
  const [templateState, setTemplateState] = useState(BUILDER_DEFAULTS);
  const [questionnaireAnswers, setQuestionnaireAnswers] = useState(QUESTIONNAIRE_DEFAULTS);

  return (
    <div className="min-h-screen bg-slate-100 text-slate-900">
      <div className="mx-auto max-w-7xl p-4 md:p-6">
        <div className="mb-6 rounded-2xl bg-slate-900 p-6 text-white shadow-xl">
          <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
              <div className="text-sm text-slate-400">Jaggaer Workflow Studio V2</div>
              <h1 className="text-2xl font-semibold">Build, Import, or Answer Questions</h1>
            </div>
            <div className="flex gap-2">
              {["builder", "template", "questionnaire"].map(m => (
                <button key={m} onClick={() => setMode(m)} className={`px-4 py-2 rounded-xl text-sm font-medium transition ${mode === m ? "bg-white text-slate-900" : "bg-white/10 text-white hover:bg-white/20"}`}>
                  {m.charAt(0).toUpperCase() + m.slice(1)}
                </button>
              ))}
            </div>
          </div>
        </div>
        
        {mode === "builder" && <BuilderMode state={builderState} setState={setBuilderState} />}
        {mode === "template" && <TemplateMode state={templateState} setState={setTemplateState} />}
        {mode === "questionnaire" && <QuestionnaireMode answers={questionnaireAnswers} setAnswers={setQuestionnaireAnswers} />}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
