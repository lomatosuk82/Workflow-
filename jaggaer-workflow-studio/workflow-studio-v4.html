        </div>
      </Section>

      {/* Import section below dashboard */}
      <Section title="Import from Spreadsheet" subtitle="Upload a customer template Excel file to generate workflow XML." borderColor="border-sky-400">
          <div className="grid gap-3 md:grid-cols-3">
            <label className="text-sm">
              <div className="mb-1 font-medium">Template Type</div>
              <select value={selectedTemplateType} onChange={e => setSelectedTemplateType(e.target.value)} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 outline-none">
                {Object.entries(TEMPLATE_HEADERS).map(([key, tmpl]) => (
                  <option key={key} value={key}>{tmpl.name}</option>
                ))}
              </select>
            </label>
            <label className="text-sm">
              <div className="mb-1 font-medium">Upload Template (.xlsx)</div>
              <input type="file" accept=".xlsx,.xls" onChange={uploadWorkbook} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none" />
            </label>
            <div className="rounded-2xl bg-slate-50 p-3 text-sm">
              <div className="font-medium">Loaded: {workbookName || "None"}</div>
              <div className="text-slate-500">{sheetRows.length} rows</div>
            </div>
          </div>
          
          {/* Expected Headers Display */}
          <div className="mt-4 rounded-xl border border-sky-200 bg-sky-50 p-3">
            <div className="text-sm font-medium text-sky-900 mb-2">Expected Headers for {currentTemplate.name}:</div>
            <div className="flex flex-wrap gap-1">
              {currentTemplate.headers.map(h => (
                <span key={h} className="px-2 py-1 rounded bg-sky-200 text-sky-800 text-xs font-medium">{h}</span>
              ))}
            </div>
          </div>
          
          {sheetNames.length > 0 && (
            <div className="mt-4">
              <label className="text-sm">
                <div className="mb-1 font-medium">Select Worksheet</div>
                <select value={selectedSheet} onChange={e => { setSelectedSheet(e.target.value); setSheetRows(sheets[e.target.value] || []); }} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 outline-none">
                  {sheetNames.map(n => <option key={n} value={n}>{n}</option>)}
                </select>
              </label>
            </div>
          )}
          
          {/* Detected Headers */}
          {headers.length > 0 && (
            <div className="mt-4 rounded-xl border border-amber-200 bg-amber-50 p-3">
              <div className="text-sm font-medium text-amber-900 mb-2">Detected Headers in File:</div>
              <div className="flex flex-wrap gap-1">
                {headers.map(h => (
                  <span key={h} className="px-2 py-1 rounded bg-amber-200 text-amber-800 text-xs font-medium">{h}</span>
                ))}
              </div>
            </div>
          )}
          
          {headers.length > 0 && (
            <div className="mt-4">
              <div className="text-sm font-medium text-slate-700 mb-2">Map Columns (auto-detected where possible):</div>
              <div className="grid gap-3 md:grid-cols-3 lg:grid-cols-4">
                <label className="text-sm"><div className="mb-1 font-medium text-sky-700">Approval Name *</div><select value={mapping.ApprovalName || ""} onChange={e => setMapping(c => ({ ...c, ApprovalName: e.target.value }))} className="w-full rounded-xl border border-sky-300 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium text-sky-700">ApprovalUserId *</div><select value={mapping.ApprovalUserId || ""} onChange={e => setMapping(c => ({ ...c, ApprovalUserId: e.target.value }))} className="w-full rounded-xl border border-sky-300 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Total Amount</div><select value={mapping.TotalAmount || ""} onChange={e => setMapping(c => ({ ...c, TotalAmount: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Condition</div><select value={mapping.Condition || ""} onChange={e => setMapping(c => ({ ...c, Condition: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Main Category</div><select value={mapping.MainCategory || ""} onChange={e => setMapping(c => ({ ...c, MainCategory: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Commodity Code</div><select value={mapping.CommodityCode || ""} onChange={e => setMapping(c => ({ ...c, CommodityCode: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Commodity Name</div><select value={mapping.CommodityName || ""} onChange={e => setMapping(c => ({ ...c, CommodityName: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Company Code</div><select value={mapping.CompanyCode || ""} onChange={e => setMapping(c => ({ ...c, CompanyCode: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
                <label className="text-sm"><div className="mb-1 font-medium">Item Type</div><select value={mapping.ItemType || ""} onChange={e => setMapping(c => ({ ...c, ItemType: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none"><option value="">-- Select --</option>{headers.map(h => <option key={h} value={h}>{h}</option>)}</select></label>
              </div>
            </div>
          )}
          <div className="mt-4 flex flex-wrap gap-3 items-center">
            <button onClick={buildFromSpreadsheet} disabled={!sheetRows.length} className={`rounded-2xl px-5 py-2.5 text-sm font-medium text-white ${sheetRows.length ? 'bg-sky-600 hover:bg-sky-700' : 'bg-slate-300 cursor-not-allowed'}`}>🔄 Generate Workflow from Template</button>
            {sheetRows.length > 0 && <span className="text-sm text-slate-600">Ready to import {sheetRows.length} rows</span>}
          </div>
          {sheetRows.length > 0 && (
            <div className="mt-4 rounded-2xl border border-slate-200 p-3 max-h-64 overflow-auto">
              <div className="text-sm font-medium mb-2">Preview (first 10 rows)</div>
              <table className="w-full text-xs">
                <thead>
                  <tr className="bg-slate-100">
                    {headers.slice(0, 6).map(h => <th key={h} className="px-2 py-1 text-left font-medium text-slate-700 border-b">{h}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {sheetRows.slice(0, 10).map((row, i) => (
                    <tr key={i} className={i % 2 === 0 ? "bg-white" : "bg-slate-50"}>
                      {headers.slice(0, 6).map(h => <td key={h} className="px-2 py-1 border-b border-slate-100">{row[h] || "-"}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
      </Section>

      {/* XML Section - full width below */}
      <Section title="Generated XML" subtitle="Review, validate, and export the Jaggaer-compliant workflow XML.">
        <textarea value={templateXml} onChange={e => setTemplateXml(e.target.value)} rows={14} className="w-full rounded-2xl border border-slate-200 bg-slate-950 px-3 py-3 font-mono text-xs leading-6 text-emerald-300 outline-none" />
        <div className="mt-3 flex flex-wrap gap-2">
          <button onClick={() => setTemplateXml(buildXmlFromForm(form))} className="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-medium text-white">🔄 Regenerate XML</button>
          <button onClick={() => download(`${form.workflowType}-workflow.xml`, templateXml)} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">📥 Export XML</button>
        </div>
        <div className="mt-4">
          {validationIssues.length === 0 ? (
            <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-sm text-emerald-800">
              ✓ <strong>Valid XML</strong> - Ready to import into Jaggaer
            </div>
          ) : (
            <div className="space-y-2">
              <div className="text-sm font-medium text-amber-800">⚠ Validation Issues:</div>
              {validationIssues.map(i => <div key={i} className="rounded-xl border border-amber-200 bg-amber-50 p-2 text-sm text-amber-900">• {i}</div>)}
            </div>
          )}
        </div>
      </Section>
    </div>
  );
};

// ============ QUESTIONNAIRE MODE ============
const QuestionnaireMode = ({ questionnaire, setQuestionnaire, questionnaireXml, setQuestionnaireXml }) => {
  const formFromQ = useMemo(() => questionnaireToForm(questionnaire), [questionnaire]);
  const validationIssues = useMemo(() => validateXml(questionnaireXml), [questionnaireXml]);
  const questions = useMemo(() => [...QUESTION_BANK.foundations, ...QUESTION_BANK.governance, ...(VERTICALS[questionnaire.vertical]?.questions || []), ...QUESTION_BANK.technical], [questionnaire.vertical]);

  const generateFromQ = () => setQuestionnaireXml(buildXmlFromForm(formFromQ));

  return (
    <div className="space-y-6">
      {/* Dashboard at top - full width */}
      <VisualWorkflowDashboard form={formFromQ} title="Questionnaire Workflow Dashboard" subtitle="Workflow generated from customer answers" />

      {/* Questionnaire and Questions side by side */}
      <div className="grid gap-6 xl:grid-cols-2">
        <Section title="Customer Questionnaire" subtitle="Capture customer decisions to generate workflow XML.">
          <div className="grid gap-3 md:grid-cols-2">
            <label className="text-sm"><div className="mb-1 font-medium">Customer Name</div><input value={questionnaire.customerName} onChange={e => setQuestionnaire(c => ({ ...c, customerName: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2 outline-none" /></label>
            <label className="text-sm"><div className="mb-1 font-medium">Module</div><select value={questionnaire.module} onChange={e => setQuestionnaire(c => ({ ...c, module: e.target.value, workflowType: WORKFLOW_MODULES[e.target.value][0].id }))} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 outline-none">{Object.keys(WORKFLOW_MODULES).map(m => <option key={m} value={m}>{m}</option>)}</select></label>
            <label className="text-sm"><div className="mb-1 font-medium">Workflow Type</div><select value={questionnaire.workflowType} onChange={e => setQuestionnaire(c => ({ ...c, workflowType: e.target.value }))} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 outline-none">{WORKFLOW_MODULES[questionnaire.module]?.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}</select></label>
            <label className="text-sm"><div className="mb-1 font-medium">Vertical</div><select value={questionnaire.vertical} onChange={e => setQuestionnaire(c => ({ ...c, vertical: e.target.value }))} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 outline-none">{Object.keys(VERTICALS).map(v => <option key={v} value={v}>{v}</option>)}</select></label>
            <label className="text-sm"><div className="mb-1 font-medium">High Value Threshold</div><input value={questionnaire.highValueThreshold} onChange={e => setQuestionnaire(c => ({ ...c, highValueThreshold: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2 outline-none" /></label>
          </div>
          <div className="mt-4 grid gap-2 md:grid-cols-2">
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByDepartment} onChange={e => setQuestionnaire(c => ({ ...c, routeByDepartment: e.target.checked }))} /> Route by Department</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByCommodity} onChange={e => setQuestionnaire(c => ({ ...c, routeByCommodity: e.target.checked }))} /> Route by Commodity</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByAmount} onChange={e => setQuestionnaire(c => ({ ...c, routeByAmount: e.target.checked }))} /> Route by Amount</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.routeByGl} onChange={e => setQuestionnaire(c => ({ ...c, routeByGl: e.target.checked }))} /> Route by GL</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.includeExpiry} onChange={e => setQuestionnaire(c => ({ ...c, includeExpiry: e.target.checked }))} /> Include Expiry Logic</label>
            <label className="inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white px-4 py-2 text-sm"><input type="checkbox" checked={questionnaire.needsInventoryRobot} onChange={e => setQuestionnaire(c => ({ ...c, needsInventoryRobot: e.target.checked }))} /> Inventory Automation</label>
          </div>
          <div className="mt-4 grid gap-3 md:grid-cols-3">
            <label className="text-sm"><div className="mb-1 font-medium">Department Folder</div><input value={questionnaire.departmentFolder} onChange={e => setQuestionnaire(c => ({ ...c, departmentFolder: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2 outline-none" /></label>
            <label className="text-sm"><div className="mb-1 font-medium">Commodity Folder</div><input value={questionnaire.commodityFolder} onChange={e => setQuestionnaire(c => ({ ...c, commodityFolder: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2 outline-none" /></label>
            <label className="text-sm"><div className="mb-1 font-medium">GL Folder</div><input value={questionnaire.glFolder} onChange={e => setQuestionnaire(c => ({ ...c, glFolder: e.target.value }))} className="w-full rounded-2xl border border-slate-200 px-3 py-2 outline-none" /></label>
          </div>
          <textarea value={questionnaire.notes} onChange={e => setQuestionnaire(c => ({ ...c, notes: e.target.value }))} rows={3} className="mt-4 w-full rounded-2xl border border-slate-200 bg-white px-3 py-3 text-sm outline-none" placeholder="Customer notes, assumptions, exceptions..." />
          <div className="mt-4"><button onClick={generateFromQ} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">Generate XML from Questionnaire</button></div>
        </Section>

        <Section title="Workshop Questions" subtitle="Use these prompts during customer workshops.">
          <div className="space-y-2 max-h-[400px] overflow-auto pr-1">
            {questions.map((q, i) => <div key={i} className="rounded-2xl border border-slate-200 bg-slate-50 p-3 text-sm"><span className="font-semibold text-slate-900 mr-2">Q{i + 1}.</span>{q}</div>)}
          </div>
        </Section>
      </div>

      {/* XML Section - full width below */}
      <Section title="Generated XML" subtitle="Review, validate, and export the Jaggaer-compliant workflow XML.">
        <textarea value={questionnaireXml} onChange={e => setQuestionnaireXml(e.target.value)} rows={14} className="w-full rounded-2xl border border-slate-200 bg-slate-950 px-3 py-3 font-mono text-xs leading-6 text-emerald-300 outline-none" />
        <div className="mt-3 flex flex-wrap gap-2">
          <button onClick={generateFromQ} className="rounded-2xl bg-sky-600 px-4 py-2 text-sm font-medium text-white">🔄 Regenerate XML</button>
          <button onClick={() => download(`${questionnaire.workflowType}-workflow.xml`, questionnaireXml)} className="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-medium text-white">📥 Export XML</button>
        </div>
        <div className="mt-4">
          {validationIssues.length === 0 ? (
            <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-sm text-emerald-800">
              ✓ <strong>Valid XML</strong> - Ready to import into Jaggaer
            </div>
          ) : (
            <div className="space-y-2">
              <div className="text-sm font-medium text-amber-800">⚠ Validation Issues:</div>
              {validationIssues.map(i => <div key={i} className="rounded-xl border border-amber-200 bg-amber-50 p-2 text-sm text-amber-900">• {i}</div>)}
            </div>
          )}
        </div>
      </Section>
    </div>
  );
};

// ============ MAIN APP ============
const App = () => {
  const [mode, setMode] = useState("builder");
  const [showWelcome, setShowWelcome] = useState(true);
  const [builderForm, setBuilderForm] = useState(BUILDER_DEFAULTS);
  const [builderXml, setBuilderXml] = useState(buildXmlFromForm(BUILDER_DEFAULTS));
  const [templateForm, setTemplateForm] = useState(BUILDER_DEFAULTS);
  const [templateXml, setTemplateXml] = useState(buildXmlFromForm(BUILDER_DEFAULTS));
  const [questionnaire, setQuestionnaire] = useState(QUESTIONNAIRE_DEFAULTS);
  const [questionnaireXml, setQuestionnaireXml] = useState(buildXmlFromForm(questionnaireToForm(QUESTIONNAIRE_DEFAULTS)));

  const handleSelectMode = (selectedMode) => {
    setMode(selectedMode);
    setShowWelcome(false);
  };

  const modeDesc = mode === "builder" ? "Build workflow structure directly in the app" : mode === "template" ? "Import from customer spreadsheet template" : "Use questionnaire to capture customer decisions";
  const modeIcons = { builder: "🔧", template: "📊", questionnaire: "📋" };
  const modeColors = { builder: "sky", template: "emerald", questionnaire: "purple" };

  return (
    <div className="min-h-screen bg-slate-100 text-slate-900">
      {/* Welcome Modal */}
      {showWelcome && <WelcomeModal onClose={() => setShowWelcome(false)} onSelectMode={handleSelectMode} />}
      
      <div className="mx-auto max-w-7xl p-4 md:p-6">
        <div className="mb-6 rounded-[28px] bg-gradient-to-r from-slate-900 to-slate-800 p-6 text-white shadow-xl">
          <div className="grid gap-6 lg:grid-cols-[1.6fr,1fr]">
            <div>
              <div className="mb-2 text-sm text-slate-300">Jaggaer Approval Workflow Studio</div>
              <h1 className="text-3xl font-semibold tracking-tight">Build, Import, or Generate Workflow XML</h1>
              <p className="mt-3 max-w-3xl text-sm leading-6 text-slate-300">Three workflow-generation modes for solution consultants. Build workflows visually, import from customer templates, or use guided questionnaires to capture requirements.</p>
              <div className="mt-4 flex flex-wrap gap-2">
                <SmallTag>14 Workflow Types</SmallTag>
                <SmallTag>5 Verticals</SmallTag>
                <SmallTag>ADW / Dynamic / Static</SmallTag>
                <SmallTag>XML Export</SmallTag>
              </div>
            </div>
            <div className="rounded-3xl border border-white/10 bg-white/5 p-4">
              <div className="text-sm text-slate-300">Current Mode</div>
              <div className="mt-2 text-lg font-semibold flex items-center gap-2">
                <span className="text-2xl">{modeIcons[mode]}</span>
                {modeDesc}
              </div>
              <div className="mt-4 grid grid-cols-3 gap-2">
                {["builder", "template", "questionnaire"].map(m => (
                  <button key={m} onClick={() => setMode(m)} className={`rounded-2xl px-3 py-3 text-sm font-medium transition flex flex-col items-center gap-1 ${mode === m ? "bg-white text-slate-900" : "bg-white/10 text-white hover:bg-white/20"}`}>
                    <span className="text-lg">{modeIcons[m]}</span>
                    <span>{m.charAt(0).toUpperCase() + m.slice(1)}</span>
                  </button>
                ))}
              </div>
              <button onClick={() => setShowWelcome(true)} className="mt-3 text-xs text-slate-400 hover:text-white w-full text-center">
                Show welcome guide
              </button>
            </div>
          </div>
        </div>

        {mode === "builder" && <BuilderMode form={builderForm} setForm={setBuilderForm} xmlDraft={builderXml} setXmlDraft={setBuilderXml} />}
        {mode === "template" && <TemplateMode form={templateForm} setForm={setTemplateForm} templateXml={templateXml} setTemplateXml={setTemplateXml} />}
        {mode === "questionnaire" && <QuestionnaireMode questionnaire={questionnaire} setQuestionnaire={setQuestionnaire} questionnaireXml={questionnaireXml} setQuestionnaireXml={setQuestionnaireXml} />}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
