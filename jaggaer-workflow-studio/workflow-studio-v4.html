  const template = TEMPLATE_HEADERS[workflowType] || TEMPLATE_HEADERS.requisition;
  const ws = XLSX.utils.json_to_sheet([template.sampleRow], { header: template.headers });

// ============ UTILITIES ============
const escapeXml = (v) => String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&apos;");
const slugify = (v) => String(v || "").replace(/[^A-Za-z0-9]+/g, " ").trim().split(/\s+/).map((p, i) => i === 0 ? p : p.charAt(0).toUpperCase() + p.slice(1)).join("") || "Activity";
const recommendMode = (step) => step.mode === "adw" ? "ADW" : step.mode === "dynamic" ? "Dynamic" : "Static";

// Build multi-value condition from comma-separated values
const buildMultiValueCondition = (fieldExpr, values, logic = "or") => {
  const valueList = String(values || "").split(",").map(v => v.trim()).filter(v => v);
  if (valueList.length === 0) return "";
  if (valueList.length === 1) return `[${fieldExpr} == "${valueList[0]}"]`;
  
  if (logic === "in") {
    // Use "in" syntax: field in {"val1", "val2", "val3"}
    return `[${fieldExpr} in {${valueList.map(v => `"${v}"`).join(", ")}}]`;
  }
  // Use explicit AND/OR logic
  const conditions = valueList.map(v => `${fieldExpr} == "${v}"`);
  const joiner = logic === "and" ? " && " : " || ";
  return `[${conditions.join(joiner)}]`;
};

const buildRuleFromForm = (form, step) => {
  const threshold = Number(step.threshold || 0);
  const ruleLogic = step.ruleLogic || "in"; // "in", "and", "or"
  const ruleValues = step.ruleValues || ""; // comma-separated values
  
  // If manual rule override exists, use it
  if (step.manualRuleOverride) return step.templateRule || "";
  
  // ADW mode - with support for structured rules
  if (step.mode === "adw") {
    const ruleGroupName = step.ruleGroup || step.name;
    
    // If structured ADW rules exist, build a combined rule expression
    if (step.adwRules && step.adwRules.length > 0) {
      const ruleExpressions = step.adwRules.map(rule => {
        const conditions = [];
        
        // Department condition
        if (rule.department) {
          const depts = rule.department.split(",").map(d => d.trim()).filter(d => d);
          if (depts.length === 1) {
            conditions.push(`Document.CustomFieldValues("Department") == "${depts[0]}"`);
          } else if (depts.length > 1) {
            conditions.push(`Document.CustomFieldValues("Department") in {${depts.map(d => `"${d}"`).join(", ")}}`);
          }
        }
        
        // Amount range conditions
        if (rule.minAmount) {
          conditions.push(`Document.TotalAmount() >= ${rule.minAmount}`);
        }
        if (rule.maxAmount) {
          conditions.push(`Document.TotalAmount() <= ${rule.maxAmount}`);
        }
        
        // Commodity condition
        if (rule.commodity) {
          const comms = rule.commodity.split(",").map(c => c.trim()).filter(c => c);
          if (comms.length === 1) {
            conditions.push(`Document.CustomFieldValues("Commodity Code") == "${comms[0]}"`);
          } else if (comms.length > 1) {
            conditions.push(`Document.CustomFieldValues("Commodity Code") in {${comms.map(c => `"${c}"`).join(", ")}}`);
          }
        }
        
        // GL Account condition
        if (rule.glAccount) {
          const gls = rule.glAccount.split(",").map(g => g.trim()).filter(g => g);
          if (gls.length === 1) {
            conditions.push(`Document.AccountCode() == "${gls[0]}"`);
          } else if (gls.length > 1) {
            conditions.push(`Document.AccountCode() in {${gls.map(g => `"${g}"`).join(", ")}}`);
          }
        }
        
        // Company Code condition
        if (rule.companyCode) {
          const codes = rule.companyCode.split(",").map(c => c.trim()).filter(c => c);
          if (codes.length === 1) {
            conditions.push(`Document.CustomFieldValues("Company Code") == "${codes[0]}"`);
          } else if (codes.length > 1) {
            conditions.push(`Document.CustomFieldValues("Company Code") in {${codes.map(c => `"${c}"`).join(", ")}}`);
          }
        }
        
        return conditions.length > 0 ? `(${conditions.join(" && ")})` : null;
      }).filter(Boolean);
      
      // Combine all rule expressions with OR (any rule can match)
      if (ruleExpressions.length > 0) {
        return `Document.RequiresRuleGroupEvaluation("${ruleGroupName}") == true && (${ruleExpressions.join(" || ")})`;
      }
    }
    
    // Fallback to simple ADW rule
    let rule = `Document.RequiresRuleGroupEvaluation("${ruleGroupName}") == true`;
    if (threshold > 0) rule += ` && Document.TotalAmount() >= ${threshold}`;
    return rule;
  }
  
  // Dynamic Department mode
  if (step.mode === "dynamic" && step.driver === "department") {
    let rule = `Document.RequiresDepartmentalApproval() == true`;
    if (threshold > 0) rule += ` && [Document.TotalAmount() >= ${threshold}]`;
    return rule;
  }
  
  // Department driver with multi-value support
  if (step.driver === "department") {
    const deptValues = ruleValues || form.sampleDepartment;
    let rule = buildMultiValueCondition('Document.CustomFieldValues("Department")', deptValues, ruleLogic);
    if (threshold > 0) rule += ` && [Document.TotalAmount() >= ${threshold}]`;
    return rule || "true";
  }
  
  // Commodity driver with multi-value support
  if (step.driver === "commodity") {
    const commValues = ruleValues || form.sampleCommodity;
    let rule = buildMultiValueCondition('Document.CustomFieldValues("Commodity Code")', commValues, ruleLogic);
    if (threshold > 0) rule += ` && [Document.TotalAmount() >= ${threshold}]`;
    return rule || "true";
  }
  
  // GL Account driver with multi-value support
  if (step.driver === "glAccount") {
    const glValues = ruleValues || form.sampleGl;
    let rule = buildMultiValueCondition('Document.AccountCode()', glValues, ruleLogic);
    if (threshold > 0) rule += ` && [Document.TotalAmount() >= ${threshold}]`;
    return rule || "true";
  }
  
  // Product/EHS driver
  if (step.driver === "product") {
    return `[Product.Toxin == true || Product.Hazardous == true]`;
  }
  
  // Amount-only driver
  return threshold > 0 ? `Document.TotalAmount() >= ${threshold}` : "true";
};

const buildWorkflowModel = (form) => {
  const steps = [], activities = [], relationships = [], folders = [];
  const addStep = (name, help) => { if (name && !steps.some(s => s.name === name)) steps.push({ name, help }); };
  const addFolder = (name, type) => { if (name && !folders.some(f => f.name === name)) folders.push({ name, type }); };

  // Add standard robot folders that are always needed
  addFolder("Start Robot", "automated");
  addFolder("End Robot", "automated");
  
  // START activity - automated robot step
  activities.push({ 
    name: "START", 
    type: "start", 
    folderRef: "Start Robot",
    folderSelectionRule: "ExplicitFolder", 
    rule: "",
    attrs: [{ name: "wfActivityHelp", value: "Automated start point - initializes workflow routing" }]
  });

  form.approvals.forEach(step => {
    const activityType = step.activityType || "manual";
    
    // Determine folder selection rule based on mode
    let fsr = "ExplicitFolder";
    if (step.mode === "adw") fsr = "MultiElementDynamic";
    else if (step.mode === "dynamic" && step.driver === "department") fsr = "Department";
    else if (step.mode === "customField") fsr = "CustomFieldValue";
    
    // Determine folder reference
    // For automated/notification activities, always require a folder
    let folderRef = "";
    if (activityType === "automated") {
      // Automated activities need robot folders
      folderRef = step.folder || `${slugify(step.name)} Robot`;
      addFolder(folderRef, "automated");
    } else if (activityType === "notification") {
      // Notification activities need notification folders
      folderRef = step.folder || `${step.name} Notification`;
      addFolder(folderRef, "shared");
    } else if (fsr === "ExplicitFolder") {
      // Manual static activities
      folderRef = step.folder || "";
      if (folderRef) addFolder(folderRef, "shared");
    }
    
    const attrs = [];
    
    // Core routing attributes
    if (step.mode === "adw") attrs.push({ name: "RuleGroupInternalName", value: step.ruleGroup || step.name });
    if (step.mode === "customField" && step.customFieldName) attrs.push({ name: "wfFolderRuleCustomFieldName", value: step.customFieldName });
    
    // Approver configuration attributes
    if (step.mode === "static" && step.approvers) {
      attrs.push({ name: "wfApprovers", value: step.approvers });
    }
    if (step.mode === "dynamic" && step.departmentApprovers) {
      attrs.push({ name: "wfDepartmentApprovers", value: step.departmentApprovers });
    }
    if (step.mode === "adw") {
      // Process structured ADW rules if present
      if (step.adwRules && step.adwRules.length > 0) {
        const rulesConfig = step.adwRules.map((rule, idx) => {
          const conditions = [];
          if (rule.department) conditions.push(`Department=${rule.department}`);
          if (rule.minAmount) conditions.push(`MinAmount=${rule.minAmount}`);
          if (rule.maxAmount) conditions.push(`MaxAmount=${rule.maxAmount}`);
          if (rule.commodity) conditions.push(`Commodity=${rule.commodity}`);
          if (rule.glAccount) conditions.push(`GLAccount=${rule.glAccount}`);
          if (rule.companyCode) conditions.push(`CompanyCode=${rule.companyCode}`);
          return `Rule${idx + 1}: ${conditions.join(", ")} => ${rule.approvers || ""}`;
        }).join("\n");
        attrs.push({ name: "wfADWRulesConfig", value: rulesConfig });
      }
      if (step.adwApprovers) attrs.push({ name: "wfADWApprovers", value: step.adwApprovers });
      if (step.defaultApprovers) attrs.push({ name: "wfDefaultApprovers", value: step.defaultApprovers });
    }
    if (step.mode === "customField" && step.customFieldApprovers) {
      attrs.push({ name: "wfCustomFieldApprovers", value: step.customFieldApprovers });
    }
    
    // Rule values for multi-value conditions
    if (step.ruleValues) attrs.push({ name: "wfRuleValues", value: step.ruleValues });
    if (step.ruleLogic && step.ruleLogic !== "in") attrs.push({ name: "wfRuleLogic", value: step.ruleLogic });
    
    // Help and support notes
    const defaultHelp = activityType === "automated" 
      ? `Automated robot action for ${step.name}.`
      : activityType === "notification"
      ? `Email notification for ${step.name}.`
      : `${recommendMode(step)} approval driven by ${step.driver}.`;
    attrs.push({ name: "wfActivityHelp", value: step.helpText || defaultHelp });
    if (step.supportNote || form.includeExpiration) attrs.push({ name: "wfActivitySupportNote", value: step.supportNote || `Validate delegation and expiry handling by ${form.expiryMode}.` });

    // Use manual override rule if set, otherwise auto-generate
    const rule = step.manualRuleOverride && step.templateRule ? step.templateRule : buildRuleFromForm(form, step);

    activities.push({ name: slugify(step.name), type: activityType, stepName: step.name, folderRef, folderSelectionRule: fsr, rule, attrs });
    addStep(step.name, `Workflow step for ${step.name}.`);
  });

  if (["Healthcare", "Life Sciences"].includes(form.vertical)) {
    activities.push({ name: "SafetyNotification", type: "notification", folderRef: "Safety Notification", folderSelectionRule: "ExplicitFolder", rule: `[Product.HazMat = true || Product.Controlled = true]`, attrs: [{ name: "wfActivityHelp", value: "Notification for regulated or hazardous items." }] });
    addFolder("Safety Notification", "shared");
  }

  if (form.workflowType === "receipt" && form.useInventoryRobot) {
    activities.push({ name: "CreateInventory", type: "automated", stepName: "Create Inventory Receipts", folderRef: "Create Inventory", folderSelectionRule: "ExplicitFolder", rule: "true", attrs: [{ name: "wfActivityHelp", value: "Automated inventory receipt creation." }] });
    addStep("Create Inventory Receipts", "System step to create inventory receipts.");
    addFolder("Create Inventory", "automated");
  }

  // END activity - automated robot step
  activities.push({ 
    name: "END", 
    type: "end", 
    folderRef: "End Robot",
    folderSelectionRule: "ExplicitFolder", 
    rule: "",
    attrs: [{ name: "wfActivityHelp", value: "Automated end point - finalizes workflow and triggers completion actions" }]
  });
  
  // Build activity relationships (sequential flow)
  for (let i = 0; i < activities.length - 1; i++) {
    relationships.push({ previous: activities[i].name, next: activities[i + 1].name });
  }

  return { steps, activities, relationships, folders };
};

const buildXmlFromForm = (form) => {
  const model = buildWorkflowModel(form);
  
  // WorkflowSubType for contracts
  const subtype = form.workflowType === "contract" ? "  <WorkflowSubType>Approval</WorkflowSubType>\n" : "";
  
  // Build Steps XML
  const stepsXml = model.steps.map(s => {
    return `  <Step name="${escapeXml(s.name)}">
    <Attribute name="wfStepHelp">
      <AttrValue lang="default">${escapeXml(s.help)}</AttrValue>
    </Attribute>
  </Step>`;
  }).join("\n");
  
  // Build Folders XML (shared folders and robots)
  const foldersXml = model.folders.map(f => {
    const folderType = f.type === "automated" ? "robot" : "shared";
    return `  <Folder name="${escapeXml(f.name)}" type="${folderType}">
    <Attribute name="wfFolderHelp">
      <AttrValue lang="default">${escapeXml(f.name)} folder</AttrValue>
    </Attribute>
  </Folder>`;
  }).join("\n");
  
  // Build Activities XML
  const activitiesXml = model.activities.map(a => {
    const stepRef = a.stepName ? `\n    <StepRef name="${escapeXml(a.stepName)}" />` : "";
    const folderRef = a.folderRef ? `\n    <FolderRef name="${escapeXml(a.folderRef)}" />` : "";
    const attrs = (a.attrs || []).map(attr => `
    <Attribute name="${escapeXml(attr.name)}">
      <AttrValue lang="default">${escapeXml(attr.value)}</AttrValue>
    </Attribute>`).join("");
    const ruleXml = a.rule ? `<![CDATA[${a.rule}]]>` : "";
    
    return `  <Activity name="${escapeXml(a.name)}">
    <ActivityType>${escapeXml(a.type)}</ActivityType>${stepRef}${folderRef}
    <Rule>${ruleXml}</Rule>
    <FolderSelectionRule>${escapeXml(a.folderSelectionRule)}</FolderSelectionRule>${attrs}
  </Activity>`;
  }).join("\n");
  
  // Build Activity Relationships XML
  const relsXml = model.relationships.map(r => 
    `  <ActivityRelationship previous="${escapeXml(r.previous)}" next="${escapeXml(r.next)}" />`
  ).join("\n");
  
  // Assemble full XML document
  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE ProcessDefinition SYSTEM "https://usertest.sciquest.com/app_docs/dtd/workflow/WorkflowDefinition.dtd">
<ProcessDefinition>
  <WorkflowType>${escapeXml(form.workflowType)}</WorkflowType>
${subtype}  <Usable>true</Usable>
  <Version>1</Version>
  <VersionDescription>${escapeXml(form.versionDescription || "Generated by Jaggaer Workflow Studio")}</VersionDescription>

  <!--====== Steps ======-->
${stepsXml}

  <!--====== Folders ======-->
${foldersXml}

  <!--====== Activities ======-->
${activitiesXml}

  <!--====== Activity Relationships ======-->
${relsXml}
</ProcessDefinition>`;
};

// Parse XML back to form structure
const parseXmlToForm = (xmlText) => {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, "text/xml");
  
  const workflowType = doc.querySelector("WorkflowType")?.textContent || "requisition";
  const versionDescription = doc.querySelector("VersionDescription")?.textContent || "Imported workflow";
  
  // Find module from workflow type
  let module = "eProcurement";
  for (const [mod, types] of Object.entries(WORKFLOW_MODULES)) {
    if (types.some(t => t.id === workflowType)) { module = mod; break; }
  }
  
  // Parse activities to create approvals
  const approvals = [];
  let idCounter = 1;
  
  doc.querySelectorAll("Activity").forEach(act => {
    const name = act.getAttribute("name");
    const type = act.querySelector("ActivityType")?.textContent || "manual";
    
    // Skip START and END activities
    if (type === "start" || type === "end") return;
    
    const stepRef = act.querySelector("StepRef")?.getAttribute("name") || name;
    const folderRef = act.querySelector("FolderRef")?.getAttribute("name") || "";
    const fsr = act.querySelector("FolderSelectionRule")?.textContent || "ExplicitFolder";
    const rule = act.querySelector("Rule")?.textContent?.trim() || "";
    
    // Get RuleGroupInternalName
    const ruleGroupAttr = act.querySelector('[name="RuleGroupInternalName"] AttrValue');
    const ruleGroup = ruleGroupAttr ? ruleGroupAttr.textContent : "";
    
    // Get help text
    const helpAttr = act.querySelector('[name="wfActivityHelp"] AttrValue');
    const helpText = helpAttr ? helpAttr.textContent : "";
    
    // Get support note
    const supportAttr = act.querySelector('[name="wfActivitySupportNote"] AttrValue');
    const supportNote = supportAttr ? supportAttr.textContent : "";
    
    // Get custom field name for CustomFieldValue routing
    const cfAttr = act.querySelector('[name="wfFolderRuleCustomFieldName"] AttrValue');
    const customFieldName = cfAttr ? cfAttr.textContent : "";
    
    // Get approver configuration attributes
    const approversAttr = act.querySelector('[name="wfApprovers"] AttrValue');
    const approvers = approversAttr ? approversAttr.textContent : "";
    
    const deptApproversAttr = act.querySelector('[name="wfDepartmentApprovers"] AttrValue');
    const departmentApprovers = deptApproversAttr ? deptApproversAttr.textContent : "";
    
    const adwApproversAttr = act.querySelector('[name="wfADWApprovers"] AttrValue');
    const adwApprovers = adwApproversAttr ? adwApproversAttr.textContent : "";
    
    const defaultApproversAttr = act.querySelector('[name="wfDefaultApprovers"] AttrValue');
    const defaultApprovers = defaultApproversAttr ? defaultApproversAttr.textContent : "";
    
    const cfApproversAttr = act.querySelector('[name="wfCustomFieldApprovers"] AttrValue');
    const customFieldApprovers = cfApproversAttr ? cfApproversAttr.textContent : "";
    
    // Get rule values and logic
    const ruleValuesAttr = act.querySelector('[name="wfRuleValues"] AttrValue');
    const ruleValues = ruleValuesAttr ? ruleValuesAttr.textContent : "";
    
    const ruleLogicAttr = act.querySelector('[name="wfRuleLogic"] AttrValue');
    const ruleLogic = ruleLogicAttr ? ruleLogicAttr.textContent : "in";
    
    // Determine mode based on FolderSelectionRule
    let mode = "static";
    if (fsr === "MultiElementDynamic") mode = "adw";
    else if (fsr === "Department") mode = "dynamic";
    else if (fsr === "CustomFieldValue") mode = "customField";
    
    // Determine driver from rule content
    let driver = "amount";
    if (rule.includes("RequiresDepartmentalApproval") || fsr === "Department") driver = "department";
    else if (rule.includes("Commodity")) driver = "commodity";
    else if (rule.includes("AccountCode") || rule.includes("acctElement") || fsr === "CustomFieldValue") driver = "glAccount";
    else if (rule.includes("Product.Toxin") || rule.includes("Product.Hazardous")) driver = "product";
    
    // Extract threshold from rule if present
    let threshold = "0";
    const thresholdMatch = rule.match(/TotalAmount\(\)\s*>=\s*(\d+)/);
    if (thresholdMatch) threshold = thresholdMatch[1];
    
    approvals.push({
      id: idCounter++,
      name: stepRef,
      activityName: name,
      activityType: type,
      mode,
      driver,
      threshold,
      folder: folderRef,
      folderSelectionRule: fsr,
      ruleGroup: ruleGroup,
      customFieldName: customFieldName,
      templateRule: rule,
      manualRuleOverride: !!rule, // If rule exists from import, treat as manual override
      helpText: helpText,
      supportNote: supportNote,
      // Approver fields
      approvers: approvers,
      departmentApprovers: departmentApprovers,
      adwApprovers: adwApprovers,
      defaultApprovers: defaultApprovers,
      customFieldApprovers: customFieldApprovers,
      // Rule configuration
      ruleValues: ruleValues,
      ruleLogic: ruleLogic,
      importedApprover: folderRef || ruleGroup || stepRef,
    });
  });
  
  // Check for inventory robot
  const hasInventory = approvals.some(a => a.folder === "Create Inventory" || a.name.includes("Inventory"));
  
  return {
    workflowType,
    module,
    versionDescription,
    vertical: "Manufacturing",
    includeExpiration: true,
    expiryMode: "department",
    useInventoryRobot: hasInventory,
    sampleDepartment: "Operations",
    sampleCommodity: "Capex Equipment",
    sampleGl: "1505",
    approvals: approvals.length > 0 ? approvals : BUILDER_DEFAULTS.approvals,
  };
};

const validateXml = (xml) => {
  const issues = [];
  
  // Check for required root elements
  if (!xml.includes("<?xml version")) issues.push("Missing XML declaration.");
  if (!xml.includes("<!DOCTYPE ProcessDefinition")) issues.push("Missing DOCTYPE declaration.");
  if (!xml.includes("<ProcessDefinition>")) issues.push("Missing <ProcessDefinition> root element.");
  if (!xml.includes("</ProcessDefinition>")) issues.push("Unclosed <ProcessDefinition> element.");
  
  // Check for required workflow elements
  if (!xml.includes("<WorkflowType>")) issues.push("Missing <WorkflowType> element.");
  if (!xml.includes("<Usable>")) issues.push("Missing <Usable> element.");
  if (!xml.includes("<Version>")) issues.push("Missing <Version> element.");
  if (!xml.includes("<VersionDescription>")) issues.push("Missing <VersionDescription> element.");
  
  // Check for required activities
  if (!xml.includes('name="START"')) issues.push("Missing START activity.");
  if (!xml.includes('name="END"')) issues.push("Missing END activity.");
  
  // Check for activity structure
  if (!xml.includes("<Activity")) issues.push("No activities defined.");
  if (!xml.includes("<ActivityType>")) issues.push("Activities missing <ActivityType>.");
  if (!xml.includes("<FolderSelectionRule>")) issues.push("Activities missing <FolderSelectionRule>.");
  
  // Check for relationships
  if (!xml.includes("<ActivityRelationship")) issues.push("Missing activity relationships.");
  
  // Check for steps (at least one should exist for non-trivial workflows)
  const activityCount = (xml.match(/<Activity /g) || []).length;
  const stepCount = (xml.match(/<Step /g) || []).length;
  if (activityCount > 2 && stepCount === 0) issues.push("No workflow steps defined.");
  
  // Check for well-formed XML
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, "text/xml");
    const parseError = doc.querySelector("parsererror");
    if (parseError) issues.push("XML parsing error: " + parseError.textContent.slice(0, 100));
  } catch (e) {
    issues.push("Invalid XML structure.");
  }
  
  return issues;
};

            <div className="text-xs text-slate-300">Approval Steps</div>
          </div>
        </div>
        <div className="mt-3 flex flex-wrap gap-2">
          <span className="px-2 py-1 bg-white/10 rounded text-xs">{form.vertical}</span>
          <span className="px-2 py-1 bg-white/10 rounded text-xs">{model.activities.length} Activities (incl. START/END)</span>
          <span className="px-2 py-1 bg-white/10 rounded text-xs">{model.folders.filter(f => f.type === "automated").length} Robot Folders</span>
          <span className="px-2 py-1 bg-white/10 rounded text-xs">{model.folders.filter(f => f.type === "shared").length} Shared Folders</span>
        </div>
      </div>

      {/* Simple Text Description - Plain English */}
      <div className="rounded-2xl border-2 border-indigo-300 bg-indigo-50/50 p-4 mb-4">
        <div className="mb-3 text-sm font-semibold text-indigo-900 flex items-center gap-2">
          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
          Workflow Summary (Plain Text)
        </div>
        <div className="bg-white rounded-xl p-4 text-sm text-slate-700 space-y-2 font-mono">
          {/* START Robot */}
          <div className="border-l-4 border-slate-400 pl-3 py-1 bg-slate-50 rounded-r">
            <div className="font-semibold text-slate-700">🤖 START (Robot)</div>
            <div className="text-slate-500 text-xs">Automated workflow initialization → Folder: "Start Robot"</div>
          </div>
          
          {model.activities.filter(a => a.type !== "start" && a.type !== "end").map((a, i) => {
            const describeRouting = (fsr, folderRef, rule) => {
              if (fsr === "Department") return "routes to Department Approvers";
              if (fsr === "MultiElementDynamic") return "routes via ADW Rule Group";
              if (fsr === "CustomFieldValue") return "routes based on Custom Field value";
              if (fsr === "ExplicitFolder" && folderRef) return `routes to folder "${folderRef}"`;
              return "static routing";
            };
            const describeType = (type) => {
              if (type === "automated") return "🤖 AUTOMATED";
              if (type === "notification") return "📧 NOTIFICATION";
              return "👤 MANUAL";
            };
            const describeCondition = (rule) => {
              if (!rule || rule === "true") return "Always executes";
              if (rule.includes("RequiresRuleGroupEvaluation")) {
                const match = rule.match(/RequiresRuleGroupEvaluation\("([^"]+)"\)/);
                return match ? `When ADW Rule Group "${match[1]}" matches` : "When ADW rules match";
              }
              if (rule.includes("RequiresDepartmentalApproval")) return "When department approval is required";
              if (rule.includes("RequiresCustomFieldValueApproval")) return "When custom field approval is required";
              if (rule.includes("Product.Toxin") || rule.includes("Product.Hazardous")) return "When product is Toxic or Hazardous";
              if (rule.includes("TotalAmount")) {
                const match = rule.match(/TotalAmount\(\)\s*>=\s*(\d+)/);
                return match ? `When amount >= $${Number(match[1]).toLocaleString()}` : "Based on amount threshold";
              }
              return "Conditional";
            };
            return (
              <div key={a.name} className="border-l-4 border-indigo-300 pl-3 py-1">
                <div className="font-semibold text-slate-900">
                  Step {i + 1}: {a.stepName || a.name}
                </div>
                <div className="text-slate-600 text-xs mt-1">
                  {describeType(a.type)} • {describeRouting(a.folderSelectionRule, a.folderRef, a.rule)}
                </div>
                <div className="text-indigo-600 text-xs mt-0.5">
                  ↳ {describeCondition(a.rule)}
                </div>
              </div>
            );
          })}
          
          {/* END Robot */}
          <div className="border-l-4 border-slate-400 pl-3 py-1 bg-slate-50 rounded-r">
            <div className="font-semibold text-slate-700">🤖 END (Robot)</div>
            <div className="text-slate-500 text-xs">Automated workflow completion → Folder: "End Robot"</div>
          </div>
        </div>
      </div>

      {/* Visual Workflow Flow */}
      <div className="rounded-2xl border-2 border-sky-200 bg-sky-50/30 p-4 mb-4">
        <div className="mb-2 text-sm font-semibold text-slate-700">Visual Workflow Flow</div>
        <div className="overflow-x-auto pb-2">
          <div className="flex min-w-max items-center gap-2">
            {model.activities.map((a, i) => (
              <Fragment key={a.name}>
                <div className={`min-w-[140px] rounded-2xl border-2 px-4 py-3 text-center shadow-sm ${kindStyle(a.type)}`}>
                  <div className="font-semibold text-sm">{a.stepName || a.name}</div>
                  <div className="text-[10px] opacity-70 mt-1">{a.type}</div>
                  {a.folderRef && <div className="text-[9px] mt-1 bg-white/60 rounded px-1 py-0.5">→ {a.folderRef}</div>}
                  {a.folderSelectionRule === "MultiElementDynamic" && <div className="text-[9px] mt-1 bg-amber-100 rounded px-1 py-0.5">ADW</div>}
                  {a.folderSelectionRule === "Department" && <div className="text-[9px] mt-1 bg-blue-100 rounded px-1 py-0.5">Dept</div>}
                </div>
                {i < model.activities.length - 1 && <div className="text-slate-400 text-lg">→</div>}
              </Fragment>
            ))}
          </div>
        </div>
      </div>

      {/* Approvers & Routing Summary */}
      <div className="rounded-2xl border-2 border-green-300 bg-green-50/50 p-4 mb-4">
        <div className="mb-3 text-sm font-semibold text-green-900">Approvers & Routing Configuration</div>
        <div className="grid gap-3 md:grid-cols-2">
          {form.approvals.filter(a => a.activityType !== "automated").map((a, idx) => (
            <div key={a.id} className={`bg-white rounded-xl p-3 border-2 ${a.mode === "static" ? "border-green-200" : a.mode === "dynamic" ? "border-blue-200" : a.mode === "adw" ? "border-amber-200" : "border-purple-200"}`}>
              <div className="flex items-center gap-2 mb-2">
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-white text-[10px] ${a.mode === "static" ? "bg-green-600" : a.mode === "dynamic" ? "bg-blue-600" : a.mode === "adw" ? "bg-amber-600" : "bg-purple-600"}`}>
                  {idx + 1}
                </span>
                <div className="font-semibold text-sm text-slate-900">{a.name}</div>
              </div>
              <div className="text-xs space-y-1">
                {a.mode === "static" && (
                  <>
                    <div className="text-green-700">📁 <strong>Folder:</strong> {a.folder || "[Not Set]"}</div>
                    <div className="text-green-600">
                      <strong>Approvers:</strong> {a.approvers ? a.approvers.split(",").map(ap => ap.trim()).join(", ") : "[None configured]"}
                    </div>
                  </>
                )}
                {a.mode === "dynamic" && (
                  <>
                    <div className="text-blue-700">👥 <strong>Department Routing</strong></div>
                    <div className="text-blue-600">
                      {(() => {
                        const lines = (a.departmentApprovers || "").split("\n").filter(l => l.includes("="));
                        if (lines.length === 0) return "[No departments configured]";
                        return lines.slice(0, 3).map(l => {
                          const [dept, approvers] = l.split("=").map(s => s.trim());
                          return `Dept ${dept}: ${approvers}`;
                        }).join("; ") + (lines.length > 3 ? ` (+${lines.length - 3} more)` : "");
                      })()}
                    </div>
                  </>
                )}
                {a.mode === "adw" && (
                  <>
                    <div className="text-amber-700">⚙️ <strong>Rule Group:</strong> {a.ruleGroup || a.name}</div>
                    <div className="text-amber-600">
                      {(() => {
                        const lines = (a.adwApprovers || "").split("\n").filter(l => l.includes("="));
                        if (lines.length === 0) return a.defaultApprovers ? `Default: ${a.defaultApprovers}` : "[No approvers configured]";
                        return `${lines.length} condition(s)` + (a.defaultApprovers ? `, Default: ${a.defaultApprovers}` : "");
                      })()}
                    </div>
                  </>
                )}
                {a.mode === "customField" && (
                  <>
                    <div className="text-purple-700">🏷️ <strong>Field:</strong> {a.customFieldName || "[Not Set]"}</div>
                    <div className="text-purple-600">
                      {(() => {
                        const lines = (a.customFieldApprovers || "").split("\n").filter(l => l.includes("="));
                        return lines.length > 0 ? `${lines.length} value(s) configured` : "[No approvers configured]";
                      })()}
                    </div>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Automated Actions */}
      {model.activities.filter(a => a.type === "automated").length > 0 && (
        <div className="rounded-2xl border-2 border-orange-300 bg-orange-50/50 p-4 mb-4">
          <div className="mb-3 text-sm font-semibold text-orange-900">🤖 Automated Actions (Robots)</div>
          <div className="grid gap-2 md:grid-cols-2">
            {model.activities.filter(a => a.type === "automated").map(a => (
              <div key={a.name} className="bg-white rounded-xl p-3 border border-orange-200">
                <div className="font-semibold text-sm text-slate-900">{a.stepName || a.name}</div>
                <div className="text-xs text-slate-600 mt-1">
                  Folder: <span className="font-medium">{a.folderRef || "N/A"}</span>
                </div>
                <div className="text-xs text-orange-600 mt-0.5">
                  {a.folderRef === "Create PO" && "Creates Purchase Orders"}
                  {a.folderRef === "Create Inventory" && "Creates Inventory Receipts"}
                  {a.folderRef === "Compile File" && "Compiles Contract Document"}
                  {a.folderRef === "Auto-Return" && "Auto-returns to requester"}
                  {!["Create PO", "Create Inventory", "Compile File", "Auto-Return"].includes(a.folderRef) && "Automated system action"}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Folders Required */}
      <div className="grid gap-4 lg:grid-cols-2">
        <div className="rounded-2xl border-2 border-emerald-200 bg-white p-4">
          <div className="mb-2 text-sm font-semibold text-slate-900">📁 Folders to Create in Jaggaer</div>
          {model.folders.length === 0 ? <div className="text-sm text-slate-400">No folders required.</div> : (
            <div className="space-y-2">
              {/* Robot Folders */}
              {model.folders.filter(f => f.type === "automated").length > 0 && (
                <div>
                  <div className="text-xs font-medium text-orange-700 mb-1">🤖 Robot Folders:</div>
                  <div className="flex flex-wrap gap-1">
                    {model.folders.filter(f => f.type === "automated").map(f => (
                      <span key={f.name} className="px-2 py-0.5 bg-orange-100 text-orange-800 rounded text-xs font-medium">{f.name}</span>
                    ))}
                  </div>
                </div>
              )}
              {/* Shared Folders */}
              {model.folders.filter(f => f.type === "shared").length > 0 && (
                <div>
                  <div className="text-xs font-medium text-emerald-700 mb-1">👥 Shared Folders:</div>
                  <div className="flex flex-wrap gap-1">
                    {model.folders.filter(f => f.type === "shared").map(f => (
                      <span key={f.name} className="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded text-xs font-medium">{f.name}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
        <div className="rounded-2xl border-2 border-purple-200 bg-white p-4">
          <div className="mb-2 text-sm font-semibold text-slate-900">🔗 Flow Sequence</div>
          <div className="text-sm text-slate-700 flex flex-wrap items-center gap-1">
            <span className="px-2 py-0.5 bg-slate-200 text-slate-700 rounded text-xs font-bold">START</span>
            <span>→</span>
            {form.approvals.map((a, i) => (
              <Fragment key={a.id}>
                <span className={`px-2 py-0.5 rounded text-xs font-medium ${a.activityType === "automated" ? "bg-orange-100 text-orange-700" : a.activityType === "notification" ? "bg-amber-100 text-amber-700" : "bg-sky-100 text-sky-700"}`}>
                  {slugify(a.name)}
                </span>
                <span>→</span>
              </Fragment>
            ))}
            <span className="px-2 py-0.5 bg-slate-200 text-slate-700 rounded text-xs font-bold">END</span>
          </div>
        </div>
      </div>
    </Section>
  );
};

// ============ BUILDER MODE ============
const BuilderMode = ({ form, setForm, xmlDraft, setXmlDraft }) => {
  const [importStatus, setImportStatus] = useState("");
  const [showSuggestions, setShowSuggestions] = useState(true);
  const [currentGuideStep, setCurrentGuideStep] = useState(0);
  const model = useMemo(() => buildWorkflowModel(form), [form]);
  const validationIssues = useMemo(() => validateXml(xmlDraft), [xmlDraft]);
  
  // Get suggestions based on workflow type
  const suggestions = WORKFLOW_SUGGESTIONS[form.workflowType] || null;
  
  // Calculate current guide step based on form state
  const guideSteps = ["Configure", "Add Steps", "Set Rules", "Export"];
  const calculatedStep = useMemo(() => {
    if (!form.workflowType) return 0;
    if (form.approvals.length === 0) return 1;
    if (form.approvals.some(a => !a.mode || !a.driver)) return 2;
    return 3;
  }, [form]);
  
  // Get next step message
  const getNextStepMessage = () => {
    if (!form.workflowType) return "Start by selecting a Module and Workflow Type above";
    if (form.approvals.length === 0) return "Add your first approval step to get started";
    if (form.approvals.length < 2) return "Consider adding more approval steps for a complete workflow";
    if (validationIssues.length > 0) return "Review and fix validation issues before exporting";
    return "Your workflow is ready! Click 'Export XML' to download";
  };
  
  // Apply a suggested step
  const applySuggestion = (suggestion) => {
    setForm(c => ({
      ...c,
      approvals: [...c.approvals, {
        id: Date.now(),
        name: suggestion.name,
        activityType: suggestion.activityType || "manual",
        mode: suggestion.mode,
        driver: suggestion.driver,
        threshold: suggestion.threshold || "0",
        folder: suggestion.folder || "",
        helpText: suggestion.description
      }]
    }));
  };
  
  // Apply all suggested steps
  const applyAllSuggestions = () => {
    if (!suggestions) return;
    setForm(c => ({
      ...c,
      approvals: suggestions.suggestedSteps.map((s, i) => ({
        id: Date.now() + i,
        name: s.name,
        activityType: s.activityType || "manual",
        mode: s.mode,
        driver: s.driver,
        threshold: s.threshold || "0",
        folder: s.folder || "",
        helpText: s.description
      }))
    }));
    setShowSuggestions(false);
  };

  const updateApproval = (id, patch) => setForm(c => ({ ...c, approvals: c.approvals.map(a => a.id === id ? { ...a, ...patch } : a) }));
  const regenerateXml = () => setXmlDraft(buildXmlFromForm(form));

  const handleXmlFileUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = parseXmlToForm(text);
      setForm(parsed);
      setXmlDraft(text);
      setImportStatus(`✓ Loaded "${file.name}" - ${parsed.approvals.length} approval steps imported`);
      setTimeout(() => setImportStatus(""), 5000);
    } catch (err) {
      setImportStatus(`✗ Error loading file: ${err.message}`);
    }
  };

  const handleXmlPaste = () => {
    try {
      const parsed = parseXmlToForm(xmlDraft);
      setForm(parsed);
      setImportStatus(`✓ Parsed XML - ${parsed.approvals.length} approval steps imported`);
      setTimeout(() => setImportStatus(""), 5000);
    } catch (err) {
      setImportStatus(`✗ Error parsing XML: ${err.message}`);
    }
  };

  // Move step/activity up or down
  const moveStep = (id, direction) => {
    setForm(c => {
      const idx = c.approvals.findIndex(a => a.id === id);
      if (idx === -1) return c;
      const newIdx = direction === "up" ? idx - 1 : idx + 1;
      if (newIdx < 0 || newIdx >= c.approvals.length) return c;
      const newApprovals = [...c.approvals];
      [newApprovals[idx], newApprovals[newIdx]] = [newApprovals[newIdx], newApprovals[idx]];
      return { ...c, approvals: newApprovals };
    });
  };

  // Insert step at specific position
  const insertStepAt = (afterId, newStep) => {
    setForm(c => {
      const idx = c.approvals.findIndex(a => a.id === afterId);
      const newApprovals = [...c.approvals];
      newApprovals.splice(idx + 1, 0, newStep);
      return { ...c, approvals: newApprovals };
    });
  };

  return (
    <div className="space-y-6">
      {/* Progress Guide */}
      <div className="rounded-3xl bg-gradient-to-r from-slate-50 to-sky-50 border border-slate-200 p-4">
        <GuidedSteps currentStep={calculatedStep} steps={guideSteps} />
        <NextStepBanner 
          message={getNextStepMessage()} 
          action={calculatedStep === 3 && validationIssues.length === 0 ? "Export XML" : null}
          onAction={() => download(`${form.workflowType}-workflow.xml`, xmlDraft)}
        />
      </div>

      {/* Dashboard at top - full width */}
      <VisualWorkflowDashboard form={form} title="Workflow Dashboard" subtitle="Visual representation of the workflow structure" />

      {/* Import existing XML */}
      <div className="rounded-3xl border-4 border-sky-500 bg-white p-4 shadow-sm">
        <div className="flex flex-wrap items-center gap-4">
          <div className="flex-1">
            <div className="text-base font-semibold text-slate-900">Import Existing Workflow</div>
            <div className="text-sm text-slate-500">Load an XML file to edit or modify an existing workflow</div>
          </div>
          <label className="cursor-pointer">
            <input type="file" accept=".xml" onChange={handleXmlFileUpload} className="hidden" />
            <span className="inline-flex items-center gap-2 rounded-2xl bg-sky-600 px-6 py-3 text-sm font-semibold text-white hover:bg-sky-700 transition">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
              Import XML
            </span>
          </label>
          <button onClick={handleXmlPaste} className="rounded-2xl border-2 border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">Parse from Editor</button>
        </div>
        {importStatus && (
          <div className={`mt-3 rounded-2xl p-3 text-sm ${importStatus.startsWith("✓") ? "bg-emerald-50 border border-emerald-200 text-emerald-800" : "bg-red-50 border border-red-200 text-red-800"}`}>
            {importStatus}
          </div>
        )}
      </div>

      {/* Section 1: Workflow Configuration */}
      <Section title="1. Workflow Configuration" subtitle="Define the workflow type, module, and version settings." borderColor="border-slate-400">
        <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-4">
          <label className="text-sm">
            <div className="mb-1 font-medium flex items-center">Module <HelpIcon helpKey="module" /></div>
            <select value={form.module} onChange={e => { setForm(c => ({ ...c, module: e.target.value, workflowType: WORKFLOW_MODULES[e.target.value][0].id })); setShowSuggestions(true); }} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none">
              {Object.keys(WORKFLOW_MODULES).map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </label>
          <label className="text-sm">
            <div className="mb-1 font-medium flex items-center">Workflow Type <HelpIcon helpKey="workflowType" /></div>
            <select value={form.workflowType} onChange={e => { setForm(c => ({ ...c, workflowType: e.target.value })); setShowSuggestions(true); }} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none">
              {WORKFLOW_MODULES[form.module]?.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
            </select>
          </label>
          <label className="text-sm">
            <div className="mb-1 font-medium flex items-center">Vertical / Industry <HelpIcon helpKey="vertical" /></div>
            <select value={form.vertical} onChange={e => setForm(c => ({ ...c, vertical: e.target.value }))} className="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 outline-none">
              {Object.keys(VERTICALS).map(v => <option key={v} value={v}>{v}</option>)}
            </select>
          </label>
          <label className="text-sm">
            <div className="mb-1 font-medium">Version Description</div>
            <input value={form.versionDescription} onChange={e => setForm(c => ({ ...c, versionDescription: e.target.value }))} className="w-full rounded-xl border border-slate-200 px-3 py-2 outline-none" placeholder="e.g., Add EHS Static Step" />
          </label>
        </div>
        <div className="mt-4 pt-4 border-t border-slate-200">
          <div className="text-sm font-medium text-slate-700 mb-2">Sample Values (for rule generation)</div>
          <div className="grid gap-3 md:grid-cols-4">
            <label className="text-sm">
              <div className="mb-1 text-slate-500">Sample Department</div>
              <input value={form.sampleDepartment} onChange={e => setForm(c => ({ ...c, sampleDepartment: e.target.value }))} className="w-full rounded-xl border border-slate-200 px-3 py-2 outline-none text-sm" />
            </label>
            <label className="text-sm">
              <div className="mb-1 text-slate-500">Sample Commodity</div>
              <input value={form.sampleCommodity} onChange={e => setForm(c => ({ ...c, sampleCommodity: e.target.value }))} className="w-full rounded-xl border border-slate-200 px-3 py-2 outline-none text-sm" />
            </label>
            <label className="text-sm">
              <div className="mb-1 text-slate-500">Sample GL Account</div>
              <input value={form.sampleGl} onChange={e => setForm(c => ({ ...c, sampleGl: e.target.value }))} className="w-full rounded-xl border border-slate-200 px-3 py-2 outline-none text-sm" />
            </label>
            <label className="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm">
              <input type="checkbox" checked={form.useInventoryRobot} onChange={e => setForm(c => ({ ...c, useInventoryRobot: e.target.checked }))} /> Include Inventory Robot
            </label>
          </div>
        </div>
        
        {/* Workflow Type Description */}
        {WORKFLOW_MODULES[form.module]?.find(w => w.id === form.workflowType)?.desc && (
          <div className="mt-4 rounded-xl bg-sky-50 border border-sky-200 p-3 text-sm text-sky-800">
            <strong>ℹ️ {WORKFLOW_MODULES[form.module]?.find(w => w.id === form.workflowType)?.name}:</strong> {WORKFLOW_MODULES[form.module]?.find(w => w.id === form.workflowType)?.desc}
          </div>
        )}
      </Section>

      {/* Suggested Steps Panel */}
      {showSuggestions && suggestions && (
        <Section title="💡 Suggested Steps" subtitle={`Common approval steps for ${suggestions.name}. Click to add or use 'Apply All' for quick setup.`} borderColor="border-emerald-400">
          <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
            {suggestions.suggestedSteps.map((s, i) => (
              <SuggestionCard key={i} suggestion={s} onApply={() => applySuggestion(s)} />
            ))}
          </div>
          <div className="mt-4 flex flex-wrap items-center gap-3">
            <button onClick={applyAllSuggestions} className="rounded-xl bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">

// ============ TEMPLATE MODE ============
const TemplateMode = ({ form, setForm, templateXml, setTemplateXml }) => {
  const [workbookName, setWorkbookName] = useState("");
  const [sheets, setSheets] = useState({});
  const [sheetNames, setSheetNames] = useState([]);
  const [selectedSheet, setSelectedSheet] = useState("");
  const [sheetRows, setSheetRows] = useState([]);
  const [selectedTemplateType, setSelectedTemplateType] = useState("po");
  const headers = useMemo(() => sheetRows.length ? Object.keys(sheetRows[0]) : [], [sheetRows]);
  const [mapping, setMapping] = useState({ 
    mainCategory: "", commodityCode: "", commodityName: "", companyCode: "", 
    condition: "", totalAmount: "", approvalName: "", approvalUserId: "", itemType: "" 
  });
  const validationIssues = useMemo(() => validateXml(templateXml), [templateXml]);
  
  // Get current template config
  const currentTemplate = TEMPLATE_HEADERS[selectedTemplateType] || TEMPLATE_HEADERS.po;

  // Auto-map columns when headers match template
  const autoMapColumns = (detectedHeaders) => {
    const newMapping = {};
    const templateHeaders = currentTemplate.headers;
    templateHeaders.forEach(th => {
      const matchingHeader = detectedHeaders.find(h => 
        h.toLowerCase().replace(/\s+/g, '') === th.toLowerCase().replace(/\s+/g, '') ||
        h.toLowerCase().includes(th.toLowerCase().split(' ')[0])
      );
      if (matchingHeader) {
        const key = th.replace(/\s+/g, '');
        newMapping[key] = matchingHeader;
      }
    });
    setMapping(prev => ({ ...prev, ...newMapping }));
  };

  const uploadWorkbook = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer, { type: "array" });
    const nextSheets = {};
    wb.SheetNames.forEach(name => { nextSheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" }); });
    setWorkbookName(file.name);
    setSheets(nextSheets);
    setSheetNames(wb.SheetNames);
    if (wb.SheetNames[0]) {
      setSelectedSheet(wb.SheetNames[0]);
      const rows = nextSheets[wb.SheetNames[0]] || [];
      setSheetRows(rows);
      if (rows.length > 0) {
        autoMapColumns(Object.keys(rows[0]));
      }
    }
  };

  const buildFromSpreadsheet = () => {
    if (!sheetRows.length) return;
    
    // Group rows by Approval Name to create unique steps
    const approvalGroups = {};
    sheetRows.forEach((row, i) => {
      // Try multiple column name variations
      const approvalName = row[mapping.ApprovalName] || row["Approval Name"] || row["ApprovalName"] || row["Step Name"] || row["StepName"] || "";
      if (!approvalName) return; // Skip rows without approval name
      
      if (!approvalGroups[approvalName]) {
        approvalGroups[approvalName] = {
          rows: [],
          approvalUserIds: new Set(),
          totalAmounts: [],
          conditions: new Set(),
          commodityCodes: new Set(),
          commodityNames: new Set(),
          companyCodes: new Set(),
          mainCategories: new Set(),
          itemTypes: new Set(),
        };
      }
      approvalGroups[approvalName].rows.push(row);
      
      // Collect approval user IDs
      const userId = row[mapping.ApprovalUserId] || row["ApprovalUserId"] || row["Approver"] || "";
      if (userId) approvalGroups[approvalName].approvalUserIds.add(userId);
      
      // Collect amounts
      const amount = row[mapping.TotalAmount] || row["Total Amount"] || row["TotalAmount"] || row["Amount"] || "";
      if (amount) approvalGroups[approvalName].totalAmounts.push(amount);
      
      // Collect conditions
      const condition = row[mapping.Condition] || row["Condition"] || "";
      if (condition) approvalGroups[approvalName].conditions.add(condition);
      
      // Collect commodity codes
      const commodityCode = row[mapping.CommodityCode] || row["Commodity Code"] || row["CommodityCode"] || "";
      if (commodityCode) approvalGroups[approvalName].commodityCodes.add(commodityCode);
      
      // Collect commodity names
      const commodityName = row[mapping.CommodityName] || row["Commodity Name"] || row["CommodityName"] || "";
      if (commodityName) approvalGroups[approvalName].commodityNames.add(commodityName);
      
      // Collect company codes
      const companyCode = row[mapping.CompanyCode] || row["Company Code"] || row["CompanyCode"] || "";
      if (companyCode) approvalGroups[approvalName].companyCodes.add(companyCode);
      
      // Collect main categories
      const mainCategory = row[mapping.MainCategory] || row["Main Category"] || row["MainCategory"] || row["Category"] || "";
      if (mainCategory) approvalGroups[approvalName].mainCategories.add(mainCategory);
      
      // Collect item types
      const itemType = row[mapping.ItemType] || row["Item Type"] || row["ItemType"] || "";
      if (itemType) approvalGroups[approvalName].itemTypes.add(itemType);
    });
    
    // Convert groups to approval steps
    const approvals = Object.entries(approvalGroups).map(([name, data], i) => {
      // Get threshold - use minimum amount or first amount
      const amounts = data.totalAmounts.map(a => parseFloat(String(a).replace(/[^0-9.]/g, '')) || 0);
      const threshold = amounts.length > 0 ? String(Math.min(...amounts)) : "0";
      
      // Get approvers as comma-separated list
      const approversList = Array.from(data.approvalUserIds).filter(a => a).join(", ");
      
      // Get commodity codes
      const commodities = Array.from(data.commodityCodes).filter(c => c).join(", ");
      const commodityNames = Array.from(data.commodityNames).filter(c => c).join(", ");
      
      // Get company codes
      const companies = Array.from(data.companyCodes).filter(c => c).join(", ");
      
      // Get categories
      const categories = Array.from(data.mainCategories).filter(c => c).join(", ");
      
      // Get conditions
      const conditions = Array.from(data.conditions).filter(c => c);
      const conditionStr = conditions.length > 0 ? conditions[0] : ">=";
      
      // Determine driver and mode based on what data is present
      let driver = "amount";
      let mode = "adw";
      let ruleValues = "";
      let folder = "";
      
      if (commodities) { 
        driver = "commodity"; 
        ruleValues = commodities; 
      } else if (companies) { 
        driver = "department"; 
        ruleValues = companies; 
      } else if (categories) {
        driver = "commodity";
        ruleValues = categories;
      }
      
      // Build rule expression
      let templateRule = "";
      if (parseFloat(threshold) > 0) {
        templateRule = `[TotalAmount() ${conditionStr} ${threshold}]`;
      }
      if (commodities) {
        const commodityList = commodities.split(",").map(c => `"${c.trim()}"`).join(", ");
        templateRule = templateRule ? `${templateRule} && [Commodity.Code in {${commodityList}}]` : `[Commodity.Code in {${commodityList}}]`;
      }
      if (companies) {
        const companyList = companies.split(",").map(c => `"${c.trim()}"`).join(", ");
        templateRule = templateRule ? `${templateRule} && [CompanyCode in {${companyList}}]` : `[CompanyCode in {${companyList}}]`;
      }
      
      // Build ADW approvers string
      const adwApproversLines = [];
      if (parseFloat(threshold) > 0 && approversList) {
        adwApproversLines.push(`Amount ${conditionStr} ${threshold} = ${approversList}`);
      } else if (approversList) {
        adwApproversLines.push(`Default = ${approversList}`);
      }
      
      return { 
        id: Date.now() + i, 
        name: String(name).trim().slice(0, 90),
        activityName: slugify(String(name).trim()),
        activityType: "manual",
        mode,
        driver,
        threshold,
        folder,
        ruleGroup: slugify(String(name).trim()) + "RuleGroup",
        ruleValues,
        ruleLogic: "in",
        templateRule: templateRule || "true",
        manualRuleOverride: !!templateRule,
        approvers: approversList,
        adwApprovers: adwApproversLines.join("\n"),
        defaultApprovers: approversList,
        helpText: `Imported from ${workbookName}. ${data.rows.length} rule(s). ${commodityNames ? `Commodities: ${commodityNames}` : ""}`,
        supportNote: `Rows: ${data.rows.length}, Conditions: ${conditions.join(", ") || "none"}`,
      };
    }).filter(a => a.name && a.name.trim());
    
    if (approvals.length) {
      // Build complete form with all required fields
      const nextForm = { 
        ...form, 
        approvals, 
        workflowType: selectedTemplateType === "po" ? "requisition" : selectedTemplateType,
        module: form.module || "eProcurement",
        vertical: form.vertical || "Manufacturing",
        includeExpiration: form.includeExpiration !== false,
        expiryMode: form.expiryMode || "department",
        useInventoryRobot: form.useInventoryRobot || false,
        sampleDepartment: form.sampleDepartment || "Operations",
        sampleCommodity: form.sampleCommodity || "General",
        sampleGl: form.sampleGl || "1000",
        versionDescription: `Imported from ${workbookName} on ${new Date().toLocaleDateString()}`
      };
      setForm(nextForm);
      setTemplateXml(buildXmlFromForm(nextForm));
    }
  };

  return (
    <div className="space-y-6">
      {/* Dashboard at top - full width */}
      <VisualWorkflowDashboard form={form} title="Template Workflow Dashboard" subtitle="Workflow generated from imported template" />

      {/* Download Templates Section */}
      <Section title="Download Blank Templates" subtitle="Export Excel templates for different workflow types to share with customers." borderColor="border-emerald-400">
        <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-4">
          {Object.entries(TEMPLATE_HEADERS).map(([key, tmpl]) => (
            <button 
              key={key}
              onClick={() => exportExcelTemplate(key)}
              className="rounded-xl border-2 border-emerald-200 bg-emerald-50 p-3 text-left hover:bg-emerald-100 hover:border-emerald-300 transition"
