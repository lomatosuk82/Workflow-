const generateSampleApprovalMatrix = (workflowType) => {
  const config = WORKFLOW_TYPES[workflowType];
  const businessUnits = generateSampleBusinessUnits().filter(bu => bu.name !== "# End of Matrix #");
  const categories = generateSampleCategories().slice(0, 5);
  
  const matrix = [];
  const amounts = [
    { min: 0, max: 1000 },
    { min: 1000, max: 5000 },
    { min: 5000, max: 25000 },
    { min: 25000, max: 100000 },
    { min: 100000, max: 500000 },
    { min: 500000, max: "" }
  ];
  
  // Generate sample rows
  businessUnits.slice(0, 3).forEach(bu => {
    categories.slice(0, 3).forEach(cat => {
      config.transactionTypes.slice(0, 2).forEach(txnType => {
        amounts.slice(0, 3).forEach((amt, idx) => {
          matrix.push({
            businessUnit: bu.name,
            category: cat.name,
            transactionType: txnType,
            minValue: amt.min,
            maxValue: amt.max,
            approvalType: config.approvalTypes[Math.min(idx, config.approvalTypes.length - 1)],
            approver1: generateSampleUsers()[idx % 10].user,
            approver2: idx > 0 ? generateSampleUsers()[(idx + 1) % 10].user : "",
            approver3: idx > 1 ? generateSampleUsers()[(idx + 2) % 10].user : "",
            approver4: "",
            approver5: ""
          });
        });
      });
    });
  });
  
  return matrix.slice(0, 20); // Limit sample data
};

// Excel generation function
const generateExcelTemplate = (workflowType) => {
  const config = WORKFLOW_TYPES[workflowType];
  const wb = XLSX.utils.book_new();
  
  // 1. Approval Matrix Sheet
  const matrixData = [
    [`${config.name} Approval Matrix Configuration`],
    ["Business Unit", "Category", "Transaction Type", "Min Value (Included)", "Max Value (Excluded)", "Approval Type", 
     "Approver 1", "Approver 2", "Approver 3", "Approver 4", "Approver 5", "Approver 6", "Approver 7", "Approver 8", "Approver 9", "Approver 10"],
    ...generateSampleApprovalMatrix(workflowType).map(row => [
      row.businessUnit, row.category, row.transactionType, row.minValue, row.maxValue, row.approvalType,
      row.approver1, row.approver2, row.approver3, row.approver4, row.approver5, "", "", "", "", ""
    ])
  ];
  const wsMatrix = XLSX.utils.aoa_to_sheet(matrixData);
  
  // Set column widths
  wsMatrix['!cols'] = [
    { wch: 35 }, { wch: 30 }, { wch: 20 }, { wch: 18 }, { wch: 18 }, { wch: 20 },
    { wch: 30 }, { wch: 30 }, { wch: 30 }, { wch: 30 }, { wch: 30 },
    { wch: 30 }, { wch: 30 }, { wch: 30 }, { wch: 30 }, { wch: 30 }
  ];
  XLSX.utils.book_append_sheet(wb, wsMatrix, "Approval Matrix");
  
  // 2. Instructions Sheet
  const instructionsData = [
    ["Instructions for Completing the Approval Matrix"],
    [""],
    ["Colour Legend"],
    ["Response Required - Fill in all yellow highlighted cells"],
    ["Response Optional - Blue cells are optional"],
    ["Do Not Modify - Grey cells contain formulas or references"],
    [""],
    ["Column Descriptions:"],
    ["Business Unit", "Select from the Business Unit Tree dropdown. This determines which organizational unit the rule applies to."],
    ["Category", "Select from the Categories dropdown. This determines which spend category the rule applies to."],
    ["Transaction Type", `Select the type of ${config.name.toLowerCase()} transaction.`],
    ["Min Value (Included)", "Enter the minimum value threshold (inclusive). Leave blank for no minimum."],
    ["Max Value (Excluded)", "Enter the maximum value threshold (exclusive). Leave blank for no maximum."],
    ["Approval Type", "Select the type of approval required for this rule."],
    ["Approver 1-10", "Select approvers from the Users dropdown. Approvers are evaluated in sequence."],
    [""],
    ["Tips:"],
    ["- Use # End of Matrix # in Business Unit column to mark the end of your data"],
    ["- Amount ranges should not overlap for the same Business Unit/Category/Transaction Type combination"],
    ["- At least one approver is required for each rule"],
    ["- Rules are evaluated in order from top to bottom"]
  ];
  const wsInstructions = XLSX.utils.aoa_to_sheet(instructionsData);
  wsInstructions['!cols'] = [{ wch: 25 }, { wch: 80 }];
  XLSX.utils.book_append_sheet(wb, wsInstructions, "Instructions");
  
  // 3. Business Unit Tree Sheet
  const businessUnits = generateSampleBusinessUnits();
  const buData = [
    ["Business Unit", "Level 1", "Level 2", "Level 3"],
    ...businessUnits.map(bu => [bu.name, bu.level1, bu.level2, bu.level3])
  ];
  const wsBU = XLSX.utils.aoa_to_sheet(buData);
  wsBU['!cols'] = [{ wch: 40 }, { wch: 35 }, { wch: 35 }, { wch: 35 }];
  XLSX.utils.book_append_sheet(wb, wsBU, "Business Unit Tree");
  
  // 4. Settings Sheet
  const settingsData = [
    ["Amount Thresholds", "Transaction Types", "Approval Types"],
    ["1000", config.transactionTypes[0] || "", config.approvalTypes[0] || "(default)"],
    ["5000", config.transactionTypes[1] || "", config.approvalTypes[1] || ""],
    ["25000", config.transactionTypes[2] || "", config.approvalTypes[2] || ""],
    ["100000", config.transactionTypes[3] || "", config.approvalTypes[3] || ""],
    ["500000", config.transactionTypes[4] || "", config.approvalTypes[4] || ""],
    ["1000000", "", ""],
    ["5000000", "", ""]
  ];
  const wsSettings = XLSX.utils.aoa_to_sheet(settingsData);
  wsSettings['!cols'] = [{ wch: 20 }, { wch: 25 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, wsSettings, "Settings");
  
  // 5. Categories Sheet
  const categories = generateSampleCategories();
  const catData = [
    ["Category", "Level 1", "Level 2", "Level 3", "Level 4"],
    ...categories.map(cat => [cat.name, cat.level1, cat.level2, cat.level3, cat.level4])
  ];
  const wsCat = XLSX.utils.aoa_to_sheet(catData);
  wsCat['!cols'] = [{ wch: 35 }, { wch: 25 }, { wch: 30 }, { wch: 30 }, { wch: 30 }];
  XLSX.utils.book_append_sheet(wb, wsCat, "Categories");
  
  // 6. Users Sheet
  const users = generateSampleUsers();
  const userData = [
    ["User", "First Name", "Last Name", "Organization", "Division", "Department", "User Role", "Email"],
    ...users.map(u => [u.user, u.firstName, u.lastName, u.organization, u.division, u.department, u.role, u.email])
  ];
  const wsUsers = XLSX.utils.aoa_to_sheet(userData);
  wsUsers['!cols'] = [{ wch: 30 }, { wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 35 }];
  XLSX.utils.book_append_sheet(wb, wsUsers, "Users");
  
  // 7. Workflow Steps Sheet (for XML generation reference)
  const stepsData = [
    [`${config.name} Workflow Steps Configuration`],
    ["Step Name", "Activity Name", "Activity Type", "Folder Selection Rule", "Folder Name", "Robot Name", "Rule Group Internal Name", "Rule Expression", "Help Text", "Support Note", "Flags", "Order"],
    ["Approval Step 1", "Approval1", "manual", "MultiElementDynamic", "", "", "Approval 1", 'Document.RequiresRuleGroupEvaluation("Approval 1") == true', "First level approval", "Route to appropriate approvers", "", "1"],
    ["Department Approval", "DeptApproval", "manual", "Department", "", "", "", "Document.RequiresDepartmentalApproval() == true", "Department manager approval", "", "", "2"],
    ["Final Processing", "FinalProcess", "automated", "ExplicitFolder", "Process Folder", "ProcessingRobot", "", "true", "Automated processing step", "System processing", "NoBypass", "3"]
  ];
  const wsSteps = XLSX.utils.aoa_to_sheet(stepsData);
  wsSteps['!cols'] = [
    { wch: 25 }, { wch: 20 }, { wch: 15 }, { wch: 22 }, { wch: 20 }, { wch: 20 }, 
    { wch: 25 }, { wch: 50 }, { wch: 30 }, { wch: 30 }, { wch: 15 }, { wch: 8 }
  ];
  XLSX.utils.book_append_sheet(wb, wsSteps, "Workflow Steps");
  
  // 8. Folders Sheet
  const foldersData = [
    [`${config.name} Workflow Folders Configuration`],
    ["Folder Name", "Folder Type", "Robot Name", "Approvers", "Description"],
    ["Process Folder", "automated", "ProcessingRobot", "", "Automated processing folder"],
    ["Review Folder", "shared", "", "reviewer@company.com", "Manual review folder"],
    ["Exception Folder", "shared", "", "exception.handler@company.com", "Exception handling folder"]
  ];
  const wsFolders = XLSX.utils.aoa_to_sheet(foldersData);
  wsFolders['!cols'] = [{ wch: 25 }, { wch: 15 }, { wch: 25 }, { wch: 35 }, { wch: 40 }];
  XLSX.utils.book_append_sheet(wb, wsFolders, "Folders");
  
  // 9. Rule Groups Sheet
  const ruleGroupsData = [
    [`${config.name} ADW Rule Groups Configuration`],
    ["Rule Group Name", "Description", "Linked to Step"],
    ["Approval 1", "First level approval rules based on amount and category", "Approval Step 1"],
    ["Omit from Approval 1", "Rules to skip first level approval", "Approval Step 1"],
    ["Exception Handling", "Rules for exception routing", "Exception Step"]
  ];
  const wsRuleGroups = XLSX.utils.aoa_to_sheet(ruleGroupsData);
  wsRuleGroups['!cols'] = [{ wch: 25 }, { wch: 50 }, { wch: 25 }];
  XLSX.utils.book_append_sheet(wb, wsRuleGroups, "Rule Groups");
  
  return wb;
};

// Download function
const downloadExcel = (workflowType) => {
  const wb = generateExcelTemplate(workflowType);
  const config = WORKFLOW_TYPES[workflowType];
  XLSX.writeFile(wb, `${workflowType}_workflow_template.xlsx`);
};

const downloadAllTemplates = () => {
  Object.keys(WORKFLOW_TYPES).forEach((type, idx) => {
    setTimeout(() => downloadExcel(type), idx * 500);
  });
};
