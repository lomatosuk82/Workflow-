            { min: 1000, max: 5000, label: "Medium value" },
            { min: 5000, max: 25000, label: "High value" },
            { min: 25000, max: null, label: "Executive approval" }
          ]
        },
        {
          id: "autoApproveThreshold",
          question: "Should low-value transactions be auto-approved?",
          type: "select",
          options: [
            { value: "yes", label: "Yes, auto-approve below a threshold" },
            { value: "no", label: "No, all transactions need approval" }
          ]
        },
        {
          id: "autoApproveAmount",
          question: "Auto-approve transactions below what amount?",
          type: "number",
          placeholder: "e.g., 100",
          showIf: (answers) => answers.autoApproveThreshold === "yes"
        }
      ]
    },
    {
      id: "specialApprovals",
      title: "Special Approvals",
      icon: "⚡",
      questions: [
        {
          id: "specialCategories",
          question: "Are there categories that always need special approval?",
          type: "multiselect",
          options: [
            { value: "it", label: "IT/Software purchases" },
            { value: "capital", label: "Capital expenditures" },
            { value: "hazmat", label: "Hazardous materials" },
            { value: "legal", label: "Legal/Compliance related" },
            { value: "marketing", label: "Marketing/Advertising" },
            { value: "travel", label: "Travel and expenses" },
            { value: "consulting", label: "Consulting/Professional services" },
            { value: "none", label: "No special categories" }
          ]
        },
        {
          id: "emergencyProcess",
          question: "Do you need an emergency/expedited approval process?",
          type: "select",
          options: [
            { value: "yes", label: "Yes, for urgent situations" },
            { value: "no", label: "No, standard process only" }
          ]
        },
        {
          id: "budgetCheck",
          question: "Should the system check budget availability?",
          type: "select",
          options: [
            { value: "yes", label: "Yes, verify budget before approval" },
            { value: "warning", label: "Yes, but allow override with warning" },
            { value: "no", label: "No budget checking needed" }
          ]
        }
      ]
    },
    {
      id: "postApproval",
      title: "Post-Approval Actions",
      icon: "🔄",
      questions: [
        {
          id: "createPO",
          question: "After requisition approval, should a Purchase Order be created automatically?",
          type: "select",
          options: [
            { value: "auto", label: "Yes, automatically create PO" },
            { value: "manual", label: "No, PO created manually" },
            { value: "conditional", label: "Only for certain suppliers/categories" }
          ],
          showIf: (answers) => answers.workflowType === "requisition"
        },
        {
          id: "sendToSupplier",
          question: "Should approved POs be sent to suppliers automatically?",
          type: "select",
          options: [
            { value: "auto", label: "Yes, send automatically" },
            { value: "manual", label: "No, send manually" }
          ],
          showIf: (answers) => answers.workflowType === "purchaseOrder" || answers.workflowType === "requisition"
        },
        {
          id: "threeWayMatch",
          question: "Do you require 3-way matching (PO, Receipt, Invoice)?",
          type: "select",
          options: [
            { value: "yes", label: "Yes, require matching" },
            { value: "tolerance", label: "Yes, with tolerance threshold" },
            { value: "no", label: "No matching required" }
          ],
          showIf: (answers) => answers.workflowType === "invoice"
        },
        {
          id: "contractSignature",
          question: "Do contracts require electronic signature?",
          type: "select",
          options: [
            { value: "yes", label: "Yes, use e-signature" },
            { value: "no", label: "No, manual signature" }
          ],
          showIf: (answers) => answers.workflowType === "contract"
        }
      ]
    },
    {
      id: "notifications",
      title: "Notifications & Escalation",
      icon: "🔔",
      questions: [
        {
          id: "notifyRequester",
          question: "Should requesters be notified of approval status?",
          type: "select",
          options: [
            { value: "all", label: "Yes, at every step" },
            { value: "final", label: "Only when fully approved/rejected" },
            { value: "no", label: "No notifications" }
          ]
        },
        {
          id: "escalation",
          question: "Should pending approvals be escalated if not acted upon?",
          type: "select",
          options: [
            { value: "yes", label: "Yes, escalate after a time period" },
            { value: "no", label: "No automatic escalation" }
          ]
        },
        {
          id: "escalationDays",
          question: "After how many days should approvals be escalated?",
          type: "number",
          placeholder: "e.g., 3",
          showIf: (answers) => answers.escalation === "yes"
        },
        {
          id: "notificationPreferences",
          question: "Any specific notification preferences or requirements?",
          type: "textarea",
          placeholder: "E.g., email format, frequency, who should be CC'd, mobile notifications..."
        }
      ]
    },
    {
      id: "finalNotes",
      title: "Additional Notes",
      icon: "📝",
      questions: [
        {
          id: "existingSystem",
          question: "What system are you currently using for approvals (if any)?",
          type: "text",
          placeholder: "E.g., SAP, Oracle, manual/email-based, spreadsheets..."
        },
        {
          id: "integrations",
          question: "What other systems should this workflow integrate with?",
          type: "textarea",
          placeholder: "E.g., ERP system, accounting software, HR system, supplier portal..."
        },
        {
          id: "timeline",
          question: "What is your expected timeline for implementation?",
          type: "select",
          options: [
            { value: "urgent", label: "Urgent (within 2 weeks)" },
            { value: "soon", label: "Soon (1-2 months)" },
            { value: "planned", label: "Planned (3-6 months)" },
            { value: "exploring", label: "Just exploring options" }
          ],
          allowOther: false
        },
        {
          id: "additionalNotes",
          question: "Any other information that would help us design your workflow?",
          type: "textarea",
          placeholder: "Share any additional context, special cases, exceptions, or questions you have..."
        }
      ]
    }
  ];

  // Get visible questions for current section
  const getCurrentQuestions = () => {
    const section = questionSections[currentStep];
    if (!section) return [];
    return section.questions.filter(q => !q.showIf || q.showIf(answers));
  };

  // Update answer
  const updateAnswer = (questionId, value) => {
    setAnswers(prev => ({ ...prev, [questionId]: value }));
  };

  // Generate workflow from answers
  const generateWorkflowFromAnswers = () => {
    const wfType = answers.workflowType || "requisition";
    const steps = [];
    const folders = [];
    const ruleGroups = [];
    let stepOrder = 1;

    // Helper to add step
    const addStep = (name, activityName, type, folderRule, folder, robot, ruleGroup, rule, helpText) => {
      steps.push({
        id: Date.now() + stepOrder,
        name,
        activityName: activityName || name.replace(/\s+/g, ''),
        activityType: type,
        folderRule: folderRule,
        folder: folder || "",
        robot: robot || "",
        ruleGroup: ruleGroup || "",
        rule: rule || "true",
        helpText: helpText || "",
        supportNote: "",
        flags: type === "automated" ? ["NoBypass"] : [],
        order: stepOrder++
      });
    };

    // Helper to add folder
    const addFolder = (name, type, robot) => {
      if (!folders.find(f => f.name === name)) {
        folders.push({
          id: Date.now() + folders.length + 100,
          name,
          folderType: type,
          robot: robot || "",
          approvers: ""
        });
      }
    };

    // Helper to add rule group
    const addRuleGroup = (name, description, rules = []) => {
      if (!ruleGroups.find(rg => rg.name === name)) {
        ruleGroups.push({
          id: Date.now() + ruleGroups.length + 200,
          name,
          description,
          rules
        });
      }
    };

    // 1. Department/Manager Approval
    if (answers.departmentApproval === "always") {
      addStep("Manager Approval", "ManagerApproval", "manual", "Department", "", "", "", "true", "Route to requester's manager for approval");
    } else if (answers.departmentApproval === "threshold" && answers.managerThreshold) {
      const threshold = answers.managerThreshold;
      addStep("Manager Approval", "ManagerApproval", "manual", "Department", "", "", "", 
        `Document.TotalAmount >= ${threshold}`, `Manager approval required for amounts >= ${threshold}`);
    }

    // 2. Amount-based approvals
    if (answers.useAmountThresholds === "yes" && answers.amountTiers) {
      const tiers = answers.amountTiers;
      tiers.forEach((tier, idx) => {
        const groupName = `Approval Level ${idx + 1}`;
        addRuleGroup(groupName, `Approval for amounts ${tier.min} - ${tier.max || 'unlimited'}`, [
          {
            id: Date.now() + idx,
            departments: "",
            minAmount: tier.min.toString(),
            maxAmount: tier.max ? tier.max.toString() : "",
            approvers: tier.approvers || `approver${idx + 1}@company.com`,
            conditionLogic: "AND"
          }
        ]);
        
        const rule = tier.max 
          ? `Document.RequiresRuleGroupEvaluation("${groupName}") == true`
          : `Document.RequiresRuleGroupEvaluation("${groupName}") == true`;
        
        addStep(`Approval ${idx + 1}`, `Approval${idx + 1}`, "manual", "MultiElementDynamic", "", "", groupName, rule, tier.label);
      });
    } else {
      // Single approval level
      addRuleGroup("Standard Approval", "Standard approval routing", [
        { id: Date.now(), departments: "", minAmount: "", maxAmount: "", approvers: "approver@company.com", conditionLogic: "AND" }
      ]);
      addStep("Approval", "Approval", "manual", "MultiElementDynamic", "", "", "Standard Approval", 
        'Document.RequiresRuleGroupEvaluation("Standard Approval") == true', "Standard approval step");
    }

    // 3. Special category approvals
    if (answers.specialCategories && !answers.specialCategories.includes("none")) {
      answers.specialCategories.forEach(cat => {
        const catNames = {
          it: { name: "IT Review", folder: "IT Review", condition: "[Category.Code LIKE 'IT%']" },
          capital: { name: "Capital Approval", folder: "Capital Review", condition: "[Document.IsCapital == true]" },
          hazmat: { name: "EHS Review", folder: "EHS Review", condition: "[Product.Hazardous == true]" },
          legal: { name: "Legal Review", folder: "Legal Review", condition: "[Category.RequiresLegal == true]" },
          marketing: { name: "Marketing Approval", folder: "Marketing", condition: "[Category.Code LIKE 'MKT%']" },
          travel: { name: "Travel Approval", folder: "Travel Review", condition: "[Category.Code LIKE 'TRV%']" },
          consulting: { name: "Consulting Approval", folder: "Consulting Review", condition: "[Category.Code LIKE 'CONS%']" }
        };
        
        if (catNames[cat]) {
          addFolder(catNames[cat].folder, "shared", "");
          addStep(catNames[cat].name, catNames[cat].name.replace(/\s+/g, ''), "manual", "ExplicitFolder", 
            catNames[cat].folder, "", "", catNames[cat].condition, `Special approval for ${cat} purchases`);
        }
      });
    }

    // 4. Budget check
    if (answers.budgetCheck === "yes" || answers.budgetCheck === "warning") {
      addFolder("Budget Check", "automated", "BudgetValidationRobot");
      addStep("Budget Validation", "BudgetValidation", "automated", "ExplicitFolder", "Budget Check", 
        "BudgetValidationRobot", "", "true", "Automated budget availability check");
    }

    // 5. Post-approval actions based on workflow type
    if (wfType === "requisition") {
      if (answers.createPO === "auto") {
        addFolder("Create PO", "automated", "CreatePurchaseOrderRobot");
        addStep("Create Purchase Order", "CreatePO", "automated", "ExplicitFolder", "Create PO", 
          "CreatePurchaseOrderRobot", "", "true", "Automatically generate Purchase Order");
      }
    }

    if ((wfType === "purchaseOrder" || wfType === "requisition") && answers.sendToSupplier === "auto") {
      addFolder("Send to Supplier", "automated", "SendPORobot");
      addStep("Send to Supplier", "SendToSupplier", "automated", "ExplicitFolder", "Send to Supplier", 
        "SendPORobot", "", "true", "Transmit PO to supplier electronically");
    }

    if (wfType === "invoice" && (answers.threeWayMatch === "yes" || answers.threeWayMatch === "tolerance")) {
      addFolder("Invoice Matching", "automated", "ThreeWayMatchRobot");
      addStep("3-Way Match", "ThreeWayMatch", "automated", "ExplicitFolder", "Invoice Matching", 
        "ThreeWayMatchRobot", "", "true", "Automated PO/Receipt/Invoice matching");
    }

    if (wfType === "contract" && answers.contractSignature === "yes") {
      addFolder("E-Signature", "automated", "ContractEsignServiceRobot");
      addStep("Electronic Signature", "ESignature", "automated", "ExplicitFolder", "E-Signature", 
        "ContractEsignServiceRobot", "", "true", "Process electronic signatures");
    }

    // Auto-approve step (if configured)
    if (answers.autoApproveThreshold === "yes" && answers.autoApproveAmount) {
      // Add omit rule group for auto-approve
      addRuleGroup("Auto-Approve", "Skip approval for low-value transactions", [
        { id: Date.now() + 999, departments: "", minAmount: "0", maxAmount: answers.autoApproveAmount, approvers: "", conditionLogic: "AND" }
      ]);
    }

    return {
      workflowType: wfType,
      version: "1",
      description: `Generated from questionnaire for ${customerInfo.company || 'Customer'}`,
      steps,
      folders,
      ruleGroups,
      customerInfo,
      answers,
      generatedAt: new Date().toISOString()
    };
  };

  // Save questionnaire
  const saveForm = () => {
    const formData = {
      id: Date.now(),
      customerInfo,
      answers,
      savedAt: new Date().toISOString(),
      status: "pending_review"
    };
    const newForms = [...savedForms, formData];
    setSavedForms(newForms);
    localStorage.setItem('jaggaer_questionnaires', JSON.stringify(newForms));
    alert("Questionnaire saved successfully! A solution consultant can review and generate the workflow.");
  };

  // Load saved form
  const loadForm = (form) => {
    setCustomerInfo(form.customerInfo);
    setAnswers(form.answers);
    setShowSavedForms(false);
  };

  // Delete saved form
  const deleteForm = (id) => {
    const newForms = savedForms.filter(f => f.id !== id);
    setSavedForms(newForms);
    localStorage.setItem('jaggaer_questionnaires', JSON.stringify(newForms));
  };

  // Render question input
  const renderQuestion = (q) => {
    if (q.showIf && !q.showIf(answers)) return null;

    const isOtherSelected = answers[q.id] === "__other__" || (answers[q.id]?.startsWith?.("other:"));
    const otherValue = answers[q.id]?.startsWith?.("other:") ? answers[q.id].substring(6) : "";

    return (
      <div key={q.id} className="mb-6">
        <label className="block text-lg font-medium text-slate-800 mb-3">{q.question}</label>
        
        {q.type === "select" && (
          <div className="grid gap-3">
            {q.options.map(opt => (
              <div
                key={opt.value}
                onClick={() => updateAnswer(q.id, opt.value)}
                className={`p-4 rounded-xl border-2 text-left transition-all cursor-pointer ${
                  answers[q.id] === opt.value 
                    ? "border-purple-500 bg-purple-50" 
                    : "border-slate-200 hover:border-purple-300 bg-white"
                }`}
              >
                <div className="flex items-center gap-3">
                  <span className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${
                    answers[q.id] === opt.value ? "border-purple-500 bg-purple-500" : "border-slate-300"
                  }`}>
                    {answers[q.id] === opt.value && <span className="w-2 h-2 bg-white rounded-full"></span>}
                  </span>
                  <div>
                    <div className="font-medium text-slate-900">{opt.label}</div>
                    {opt.desc && <div className="text-sm text-slate-500 mt-1">{opt.desc}</div>}
                  </div>
                </div>
              </div>
            ))}
            {/* Other option */}
            {q.allowOther !== false && (
              <div
                onClick={() => updateAnswer(q.id, "__other__")}
                className={`p-4 rounded-xl border-2 text-left transition-all cursor-pointer ${
                  isOtherSelected
                    ? "border-purple-500 bg-purple-50" 
                    : "border-slate-200 hover:border-purple-300 bg-white"
                }`}
              >
                <div className="flex items-center gap-3">
                  <span className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${
                    isOtherSelected ? "border-purple-500 bg-purple-500" : "border-slate-300"
                  }`}>
                    {isOtherSelected && <span className="w-2 h-2 bg-white rounded-full"></span>}
                  </span>
                  <div className="flex-1">
                    <div className="font-medium text-slate-900">Other</div>
                    {isOtherSelected && (
                      <input
                        type="text"
                        value={otherValue}
                        onChange={(e) => updateAnswer(q.id, `other:${e.target.value}`)}
                        onClick={(e) => e.stopPropagation()}
                        placeholder="Please specify..."
                        className="mt-2 w-full px-3 py-2 border border-purple-300 rounded-lg focus:outline-none focus:border-purple-500"
                        autoFocus
                      />
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {q.type === "multiselect" && (
          <div className="space-y-3">
            <div className="grid md:grid-cols-2 gap-3">
              {q.options.map(opt => (
                <div
                  key={opt.value}
                  onClick={() => {
                    const current = answers[q.id] || [];
                    const newVal = current.includes(opt.value) 
                      ? current.filter(v => v !== opt.value)
                      : [...current, opt.value];
                    updateAnswer(q.id, newVal);
                  }}
                  className={`p-3 rounded-xl border-2 text-left transition-all cursor-pointer ${
                    (answers[q.id] || []).includes(opt.value)
                      ? "border-purple-500 bg-purple-50" 
                      : "border-slate-200 hover:border-purple-300 bg-white"
                  }`}
                >
                  <div className="flex items-center gap-2">
                    <span className={`w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 ${
                      (answers[q.id] || []).includes(opt.value) ? "bg-purple-500 border-purple-500 text-white" : "border-slate-300"
                    }`}>
                      {(answers[q.id] || []).includes(opt.value) && "✓"}
                    </span>
                    <span className="font-medium text-slate-900">{opt.label}</span>
                  </div>
                </div>
              ))}
            </div>
            {/* Other option for multiselect */}
            {q.allowOther !== false && (
              <div className="mt-3">
                <div className="flex items-center gap-2 text-sm text-slate-600 mb-2">
                  <span>📝</span>
                  <span>Add other options (comma-separated):</span>
                </div>
                <input
                  type="text"
                  value={answers[`${q.id}_other`] || ""}
                  onChange={(e) => updateAnswer(`${q.id}_other`, e.target.value)}
                  placeholder="e.g., Custom option 1, Custom option 2"
                  className="w-full px-4 py-2 border-2 border-slate-200 rounded-xl focus:border-purple-500 focus:outline-none"
                />
              </div>
            )}
          </div>
        )}

        {q.type === "number" && (
          <input
            type="number"
            value={answers[q.id] || ""}
            onChange={(e) => updateAnswer(q.id, e.target.value)}
            placeholder={q.placeholder}
            className="w-full max-w-xs px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-purple-500 focus:outline-none text-lg"
          />
        )}

        {q.type === "text" && (
          <input
            type="text"
            value={answers[q.id] || ""}
            onChange={(e) => updateAnswer(q.id, e.target.value)}
            placeholder={q.placeholder}
            className="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-purple-500 focus:outline-none"
          />
        )}

        {q.type === "textarea" && (
          <textarea
            value={answers[q.id] || ""}
            onChange={(e) => updateAnswer(q.id, e.target.value)}
            placeholder={q.placeholder}
            rows={4}
            className="w-full px-4 py-3 border-2 border-slate-200 rounded-xl focus:border-purple-500 focus:outline-none resize-y"
          />
        )}

        {q.type === "amountTiers" && (
          <div className="space-y-3">
            {(answers[q.id] || q.defaultTiers).map((tier, idx) => (
              <div key={idx} className="flex items-center gap-3 bg-slate-50 p-3 rounded-xl">
                <span className="text-sm font-medium text-slate-600 w-20">Tier {idx + 1}:</span>
                <input
                  type="number"
                  value={tier.min}
                  onChange={(e) => {
                    const tiers = [...(answers[q.id] || q.defaultTiers)];
                    tiers[idx] = { ...tiers[idx], min: parseInt(e.target.value) || 0 };
                    updateAnswer(q.id, tiers);
                  }}
                  className="w-28 px-3 py-2 border border-slate-200 rounded-lg text-sm"
                  placeholder="Min"
                />
                <span className="text-slate-400">to</span>
                <input
                  type="number"
                  value={tier.max || ""}
                  onChange={(e) => {
                    const tiers = [...(answers[q.id] || q.defaultTiers)];
                    tiers[idx] = { ...tiers[idx], max: e.target.value ? parseInt(e.target.value) : null };
                    updateAnswer(q.id, tiers);
                  }}
                  className="w-28 px-3 py-2 border border-slate-200 rounded-lg text-sm"
                  placeholder="Max (or blank)"
                />
                <input
                  type="text"
                  value={tier.label || ""}
                  onChange={(e) => {
                    const tiers = [...(answers[q.id] || q.defaultTiers)];
                    tiers[idx] = { ...tiers[idx], label: e.target.value };
                    updateAnswer(q.id, tiers);
                  }}
                  className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm"
                  placeholder="Label (e.g., Manager approval)"
                />
                <button
                  onClick={() => {
                    const tiers = (answers[q.id] || q.defaultTiers).filter((_, i) => i !== idx);
                    updateAnswer(q.id, tiers);
                  }}
                  className="text-red-500 hover:text-red-700 px-2"
                >✕</button>
              </div>
            ))}
            <button
              onClick={() => {
                const tiers = [...(answers[q.id] || q.defaultTiers), { min: 0, max: null, label: "" }];
                updateAnswer(q.id, tiers);
              }}
              className="text-sm text-purple-600 hover:text-purple-700"
            >+ Add tier</button>
          </div>
        )}
      </div>
    );
  };

  // Progress calculation
  const progress = ((currentStep + 1) / questionSections.length) * 100;

  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-50 to-indigo-50">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <button onClick={onBack} className="text-slate-500 hover:text-slate-700">← Back</button>
            <div className="h-6 w-px bg-slate-200"></div>
            <h1 className="text-lg font-semibold text-slate-900">📋 Workflow Questionnaire</h1>
          </div>
          <div className="flex items-center gap-3">
            <button 
              onClick={() => setShowSavedForms(true)}
              className="px-4 py-2 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 text-sm"
            >
              📁 Saved Forms ({savedForms.length})
            </button>
            <button 
              onClick={saveForm}
              className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
            >
              💾 Save Progress
            </button>
          </div>
        </div>
        {/* Progress bar */}
        <div className="h-1 bg-slate-100">
          <div className="h-full bg-purple-500 transition-all duration-300" style={{ width: `${progress}%` }}></div>
        </div>
      </header>

      <main className="max-w-4xl mx-auto px-6 py-8">
        {/* Customer Info (first step) */}
        {currentStep === 0 && (
          <div className="bg-white rounded-2xl border border-slate-200 p-6 mb-6">
            <h2 className="text-lg font-bold text-slate-900 mb-4">👤 Customer Information</h2>
            <div className="grid md:grid-cols-2 gap-4">
              <div>

              <div>

        <div className="flex gap-2 mb-6 overflow-x-auto pb-2">

            <button
              key={section.id}
              onClick={() => setCurrentStep(idx)}
              className={`px-4 py-2 rounded-lg whitespace-nowrap text-sm font-medium transition-all ${

                  : idx < currentStep 
                    ? "bg-green-100 text-green-700" 
                    : "bg-white text-slate-600 border border-slate-200"
              }`}

              <p className="text-sm text-slate-500">Step {currentStep + 1} of {questionSections.length}</p>
            </div>
          </div>

          {getCurrentQuestions().map(q => renderQuestion(q))}

          {/* Navigation */}
          <div className="flex justify-between mt-8 pt-6 border-t border-slate-200">
            <button
              onClick={() => setCurrentStep(Math.max(0, currentStep - 1))}
              disabled={currentStep === 0}
              className="px-6 py-3 bg-slate-100 text-slate-700 rounded-xl font-medium hover:bg-slate-200 disabled:opacity-50"
            >
              ← Previous
            </button>
            
            {currentStep < questionSections.length - 1 ? (
              <button
                onClick={() => setCurrentStep(currentStep + 1)}
                className="px-6 py-3 bg-purple-600 text-white rounded-xl font-medium hover:bg-purple-700"
              >
                Next →
              </button>

              <div className="flex gap-3">
                <button
                  onClick={() => {

                    setGeneratedWorkflow(workflow);

                    <div className="text-xs text-slate-500">

                      {step.ruleGroup && ` • Rule Group: ${step.ruleGroup}`}

                  </div>
                  <span className={`px-2 py-1 rounded text-xs ${
                    step.activityType === "automated" ? "bg-purple-100 text-purple-700" : "bg-blue-100 text-blue-700"
                  }`}>
                    {step.activityType}
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}
      </main>

      {/* Saved Forms Modal */}
      {showSavedForms && (

                        <div className="text-xs text-slate-400 mt-1">

                          Status: <span className={form.status === "pending_review" ? "text-amber-600" : "text-green-600"}>

                          </span>
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <button
                          onClick={() => loadForm(form)}
                          className="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-sm hover:bg-blue-200"
                        >
                          📝 Load
                        </button>
                        <button
                          onClick={() => {
                            setAnswers(form.answers);
                            setCustomerInfo(form.customerInfo);

                            onGenerateWorkflow(workflow);
                          }}

                        >

                          onClick={() => deleteForm(form.id)}
                          className="px-3 py-1.5 bg-red-100 text-red-700 rounded-lg text-sm hover:bg-red-200"

                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

  const downloadTemplate = (workflowType, format = "excel") => {
    if (format === "csv") {
      const csv = generateWorkflowTemplate(workflowType);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${workflowType}_workflow_template.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } else {
      const wb = generateExcelTemplate(workflowType);
      XLSX.writeFile(wb, `${workflowType}_workflow_template.xlsx`);
    }
  };

  const downloadAllTemplates = (format = "excel") => {
    const types = ["requisition", "purchaseOrder", "invoice", "contract", "supplierRegistration", "receipt"];
    types.forEach((type, idx) => {
      setTimeout(() => downloadTemplate(type, format), idx * 500);
    });
  };

  const parseCSV = (content) => {
    const lines = content.split('\n').filter(line => line.trim() && !line.trim().startsWith('#'));
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      if (lines[i].trim().startsWith('#')) continue; // Skip comment lines
      const values = [];
      let current = '';
      let inQuotes = false;
      for (let char of lines[i]) {
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
        else current += char;
      }
      values.push(current.trim());
      const row = {};
      headers.forEach((header, idx) => { row[header] = values[idx] || ''; });
      if (row["Section"]) rows.push(row); // Only add rows with a Section
    }
    return rows;
  };

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setParseError(null);
    
    try {
      const filename = file.name.toLowerCase();
      let detectedType = "requisition";
      if (filename.includes("purchaseorder") || filename.includes("po_")) detectedType = "purchaseOrder";
      else if (filename.includes("invoice")) detectedType = "invoice";
      else if (filename.includes("contract")) detectedType = "contract";
      else if (filename.includes("supplier")) detectedType = "supplierRegistration";
      else if (filename.includes("receipt")) detectedType = "receipt";
      
      // Handle Excel files
      if (filename.endsWith('.xlsx') || filename.endsWith('.xls')) {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data, { type: 'array' });
        
        // Parse all sheets
        const sheets = {};
        workbook.SheetNames.forEach(name => {
          const sheet = workbook.Sheets[name];
          sheets[name] = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        });
        
        // Convert Excel data to our format
        const rows = [];
        
        // Process Workflow Steps sheet
        if (sheets["Workflow Steps"]) {
          const stepsSheet = sheets["Workflow Steps"];
          const headers = stepsSheet[1] || []; // Row 2 has headers (row 1 is title)
          for (let i = 2; i < stepsSheet.length; i++) {
            const row = stepsSheet[i];
            if (!row || !row[0]) continue;
            rows.push({
              Section: "STEP",
              "Step Name": row[0] || "",
              "Activity Name": row[1] || "",
              "Activity Type": row[2] || "manual",
              "Folder Selection Rule": row[3] || "Dummy",
              "Folder Name": row[4] || "",
              "Robot Name": row[5] || "",
              "Rule Group Internal Name": row[6] || "",
              "Rule Expression": row[7] || "true",
              "Help Text": row[8] || "",
              "Support Note": row[9] || "",
              "Flags": row[10] || "",
              "Order": row[11] || (i - 1)
            });
          }
        }
        
        // Process Folders sheet
        if (sheets["Folders"]) {
          const foldersSheet = sheets["Folders"];
          for (let i = 2; i < foldersSheet.length; i++) {
            const row = foldersSheet[i];
            if (!row || !row[0]) continue;
            rows.push({
              Section: "FOLDER",
              "Folder Name": row[0] || "",
              "Activity Type": row[1] || "shared",
              "Robot Name": row[2] || "",
              "Approvers": row[3] || ""
            });
          }
        }
        
        // Process Rule Groups sheet
        if (sheets["Rule Groups"]) {
          const rgSheet = sheets["Rule Groups"];
          for (let i = 2; i < rgSheet.length; i++) {
            const row = rgSheet[i];
            if (!row || !row[0]) continue;
            rows.push({
              Section: "RULEGROUP",
              "Rule Group Internal Name": row[0] || "",
              "Help Text": row[1] || ""
            });
          }
        }
        
        // Process Approval Matrix sheet for rules
        if (sheets["Approval Matrix"]) {
          const matrixSheet = sheets["Approval Matrix"];
          const headers = matrixSheet[1] || [];
          for (let i = 2; i < matrixSheet.length; i++) {
            const row = matrixSheet[i];
            if (!row || !row[0] || row[0] === "# End of Matrix #") continue;
            
            // Create rule from approval matrix row
            const approvers = [];
            for (let j = 6; j < row.length; j++) {
              if (row[j]) approvers.push(row[j]);
            }
            if (approvers.length > 0) {
              rows.push({
                Section: "RULE",
                "Rule Group Internal Name": row[5] || "Approval 1", // Approval Type becomes rule group
                "Rule Priority": (i - 1).toString(),
                "Departments": row[0] || "", // Business Unit
                "Min Amount": row[3]?.toString() || "",
                "Max Amount": row[4]?.toString() || "",
                "Commodity Codes": row[1] || "", // Category
                "Approvers": approvers.join(";"),
                "Condition Logic": "AND"
              });
            }
          }
        }
        
        // Store additional sheet data for reference
        const excelData = {
          rows,
          filename: file.name,
          sheets,
          businessUnits: sheets["Business Unit Tree"] || [],
          categories: sheets["Categories"] || [],
          users: sheets["Users"] || [],
          settings: sheets["Settings"] || []
        };
        
        setSelectedWorkflowType(detectedType);
        setImportedData(excelData);
        setActiveTab("preview");
        
      } else {
        // Handle CSV files
        const content = await file.text();
        const rows = parseCSV(content);
        if (rows.length === 0) { 
          setParseError("No valid data found in file. Make sure rows have a Section (STEP, FOLDER, RULEGROUP, or RULE)."); 
          return; 
        }
        
        setSelectedWorkflowType(detectedType);
        setImportedData({ rows, filename: file.name });
        setActiveTab("preview");
      }
    } catch (err) { 
      setParseError(`Error parsing file: ${err.message}`); 
    }
  };

  const processImportedData = () => {
    if (!importedData?.rows) return null;
    const rows = importedData.rows;
    const result = { workflowType: selectedWorkflowType, version: "1", description: "", steps: [], folders: [], ruleGroups: [] };
    
    // Process STEP rows - matching XML structure
    const stepRows = rows.filter(r => r["Section"]?.toUpperCase() === "STEP");
    result.steps = stepRows.map((s, idx) => ({
      id: Date.now() + idx,
      name: s["Step Name"] || `Step ${idx + 1}`,
      activityName: s["Activity Name"] || s["Step Name"]?.replace(/\s+/g, '') || `Activity${idx + 1}`,
      activityType: s["Activity Type"] || "manual",
      folderRule: s["Folder Selection Rule"] || "Dummy",
      folder: s["Folder Name"] || "",
      ruleGroup: s["Rule Group Internal Name"] || "",
      rule: s["Rule Expression"] || "true",
      helpText: s["Help Text"] || "",
      supportNote: s["Support Note"] || "",
      iconUrl: s["Icon URL"] || "",
      robot: s["Robot Name"] || "",
      flags: s["Flags"] ? s["Flags"].split(";").map(f => f.trim()).filter(f => f) : [],
      order: parseInt(s["Order"]) || (idx + 1)
    })).sort((a, b) => a.order - b.order);
    
    // Process FOLDER rows - matching WorkflowFolder XML structure
    const folderRows = rows.filter(r => r["Section"]?.toUpperCase() === "FOLDER");
    result.folders = folderRows.map((f, idx) => ({
      id: Date.now() + idx + 1000,
      name: f["Folder Name"] || `Folder ${idx + 1}`,
      folderType: f["Activity Type"] || "shared",
      robot: f["Robot Name"] || "",
      approvers: f["Approvers"] || ""

    // Process RULEGROUP and RULE rows - for ADW Rule Groups
    const ruleGroupRows = rows.filter(r => r["Section"]?.toUpperCase() === "RULEGROUP");
    const ruleRows = rows.filter(r => r["Section"]?.toUpperCase() === "RULE");
    
    const groupMap = new Map();
    ruleGroupRows.forEach((g, idx) => {
      const name = g["Rule Group Internal Name"] || `Rule Group ${idx + 1}`;
      groupMap.set(name, { id: Date.now() + idx + 2000, name, description: g["Help Text"] || "", rules: [] });
    });
    
    ruleRows.forEach((r, idx) => {
      const groupName = r["Rule Group Internal Name"];
      if (!groupName) return;
      if (!groupMap.has(groupName)) {
        groupMap.set(groupName, { id: Date.now() + idx + 3000, name: groupName, description: "", rules: [] });
      }
      groupMap.get(groupName).rules.push({
        id: Date.now() + idx + 4000,
        priority: parseInt(r["Rule Priority"]) || (idx + 1),
        departments: r["Departments"] || "",
        minAmount: r["Min Amount"] || "",
        maxAmount: r["Max Amount"] || "",
        commodityCodes: r["Commodity Codes"] || "",
        glAccounts: r["GL Accounts"] || "",
        companyCodes: r["Company Codes"] || "",
        approvers: r["Approvers"] || "",
        conditionLogic: r["Condition Logic"] || "AND"
      });
    });
    
    result.ruleGroups = Array.from(groupMap.values());
    return result;
  };

  const processedData = processImportedData();

                  <button onClick={() => { setImportedData(null); setActiveTab("download"); }} className="px-6 py-3 bg-slate-200 text-slate-700 rounded-xl font-semibold hover:bg-slate-300">🔄 Start Over</button>

  );
};

// ============ MAIN APP ============
const App = () => {
  const [mode, setMode] = useState(null);
  const [workflowType, setWorkflowType] = useState("requisition");
  const [workflowVersion, setWorkflowVersion] = useState("1");
  const [workflowDescription, setWorkflowDescription] = useState("");
  const [steps, setSteps] = useState([]);
  const [folders, setFolders] = useState([]);
  const [ruleGroups, setRuleGroups] = useState([]);
  const [showEmulator, setShowEmulator] = useState(false);
  const [selectedStep, setSelectedStep] = useState(null);
  const [activeTab, setActiveTab] = useState("steps");
  const [showXmlPreview, setShowXmlPreview] = useState(false);
  const [templateLoaded, setTemplateLoaded] = useState(false);
  const [customWorkflowTypes, setCustomWorkflowTypes] = useState([]);
  const [showAddWorkflowType, setShowAddWorkflowType] = useState(false);
  const [newWorkflowTypeName, setNewWorkflowTypeName] = useState("");
  const [savedWorkflows, setSavedWorkflows] = useState(() => {
    // Load from localStorage on init
    try {
      const saved = localStorage.getItem('jaggaer_saved_workflows');
      return saved ? JSON.parse(saved) : [];
    } catch (e) {
      return [];
    }
  });
  const [showSavedWorkflows, setShowSavedWorkflows] = useState(false);
  const [selectedSavedWorkflow, setSelectedSavedWorkflow] = useState(null);
  const [showSavedEmulator, setShowSavedEmulator] = useState(false);
  const [showSavedXmlPreview, setShowSavedXmlPreview] = useState(false);

  // All workflow types (built-in + custom)
  const allWorkflowTypes = {
    ...WORKFLOW_TYPES,
    ...customWorkflowTypes.reduce((acc, wf) => {
      acc[wf.key] = { name: wf.name, dtdUrl: WORKFLOW_TYPES.requisition.dtdUrl, isCustom: true };
      return acc;
    }, {})
  };

  // Add a new custom workflow type
  const addCustomWorkflowType = () => {
    if (!newWorkflowTypeName.trim()) return;
    
    const key = newWorkflowTypeName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
    
    // Check if already exists
    if (allWorkflowTypes[key]) {
      alert("A workflow type with this name already exists.");
      return;
    }
    
    setCustomWorkflowTypes([...customWorkflowTypes, {
      key,
      name: newWorkflowTypeName.trim()
    }]);
    
    // Switch to the new type and start fresh
    setWorkflowType(key);
    setSteps([]);
    setFolders([]);
    setRuleGroups([]);
    setTemplateLoaded(false);
    setNewWorkflowTypeName("");
    setShowAddWorkflowType(false);
  };

  // Save current workflow to saved list
  const saveCurrentWorkflow = (name) => {
    const workflowData = {
      id: Date.now(),
      name: name || `${allWorkflowTypes[workflowType]?.name || workflowType} v${workflowVersion}`,
      savedAt: new Date().toISOString(),
      workflowType,
      workflowVersion,
      workflowDescription,
      steps: JSON.parse(JSON.stringify(steps)),
      folders: JSON.parse(JSON.stringify(folders)),
      ruleGroups: JSON.parse(JSON.stringify(ruleGroups)),
      xml: generateWorkflowXML(),
      folderXml: folders.length > 0 ? generateFolderXML() : null,
      ruleGroupXml: ruleGroups.length > 0 ? generateRuleGroupXML() : null
    };
    
    const newSavedWorkflows = [...savedWorkflows, workflowData];
    setSavedWorkflows(newSavedWorkflows);
    
    // Persist to localStorage
    try {
      localStorage.setItem('jaggaer_saved_workflows', JSON.stringify(newSavedWorkflows));
    } catch (e) {
      console.error("Failed to save to localStorage:", e);
    }
    
    return workflowData;
  };

  // Delete a saved workflow
  const deleteSavedWorkflow = (id) => {
    const newSavedWorkflows = savedWorkflows.filter(w => w.id !== id);
    setSavedWorkflows(newSavedWorkflows);
    try {
      localStorage.setItem('jaggaer_saved_workflows', JSON.stringify(newSavedWorkflows));
    } catch (e) {
      console.error("Failed to update localStorage:", e);
    }
  };

  // Load a saved workflow into the editor
  const loadSavedWorkflow = (workflow) => {
    setWorkflowType(workflow.workflowType);
    setWorkflowVersion(workflow.workflowVersion);
    setWorkflowDescription(workflow.workflowDescription || "");
    setSteps(workflow.steps);
    setFolders(workflow.folders);
    setRuleGroups(workflow.ruleGroups);
    setTemplateLoaded(true);
    setShowSavedWorkflows(false);
    setMode("builder");
  };

  // Export multiple workflows
  const exportMultipleWorkflows = (workflowIds) => {
    const toExport = savedWorkflows.filter(w => workflowIds.includes(w.id));
    toExport.forEach((workflow, idx) => {
      setTimeout(() => {
        const wfTypeName = workflow.name.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
        downloadXML(workflow.xml, `${wfTypeName}_workflow.xml`);
        if (workflow.folderXml) {
          setTimeout(() => {
            downloadXML(workflow.folderXml, `${wfTypeName}_folders.xml`);
          }, 300);
        }
      }, idx * 600);
    });
  };

  // Load default template for workflow type
  const loadDefaultTemplate = (wfType) => {
    console.log("Loading template for:", wfType);
    const template = DEFAULT_TEMPLATES[wfType];
    console.log("Template found:", template);
    if (template) {
      // Load steps with unique IDs
      const timestamp = Date.now();
      const loadedSteps = template.steps.map((step, idx) => ({
        id: timestamp + idx,
        name: step.name || `Step ${idx + 1}`,
        activityName: step.activityName || step.name?.replace(/\s+/g, '') || `Step${idx + 1}`,
        activityType: step.activityType || "manual",
        folderRule: step.folderRule || "Dummy",
        folder: step.folder || "",
        robot: step.robot || "",
        ruleGroup: step.ruleGroup || "",
        rule: step.rule || "true",
        helpText: step.helpText || "",
        supportNote: step.supportNote || "",
        flags: step.flags || [],
        customFieldName: step.customFieldName || "",
        skipIfNoApprovers: step.skipIfNoApprovers || false,
        iconUrl: step.iconUrl || ""
      }));
      console.log("Loaded steps:", loadedSteps);
      setSteps(loadedSteps);

      // Load folders with unique IDs
      const loadedFolders = (template.folders || []).map((folder, idx) => ({
        id: timestamp + 1000 + idx,
        name: folder.name || `Folder ${idx + 1}`,
        folderType: folder.folderType || "shared",
        robot: folder.robot || "",
        description: folder.description || "",
        approvers: folder.approvers || "",
        workflowType: wfType
      }));
      console.log("Loaded folders:", loadedFolders);
      setFolders(loadedFolders);

      // Load rule groups with unique IDs
      const loadedRuleGroups = (template.ruleGroups || []).map((group, idx) => ({
        id: timestamp + 2000 + idx,
        name: group.name || `Rule Group ${idx + 1}`,
        description: group.description || "",
        rules: (group.rules || []).map((rule, rIdx) => ({
          id: timestamp + 3000 + idx * 100 + rIdx,
          departments: rule.departments || "",
          minAmount: rule.minAmount || "",
          maxAmount: rule.maxAmount || "",
          commodityCodes: rule.commodityCodes || "",
          glAccounts: rule.glAccounts || "",
          companyCodes: rule.companyCodes || "",
          approvers: rule.approvers || "",
          conditionLogic: rule.conditionLogic || "AND",
          customExpression: rule.customExpression || "",
          customFields: rule.customFields || {}
        }))
      }));
      console.log("Loaded rule groups:", loadedRuleGroups);
      setRuleGroups(loadedRuleGroups);

      setTemplateLoaded(true);
      setSelectedStep(null);
      console.log("Template loaded successfully!");
    } else {
      console.error("No template found for workflow type:", wfType);
    }
  };

  // Handle workflow type change
  const handleWorkflowTypeChange = (newType) => {
    if (steps.length > 0 && !window.confirm("Changing workflow type will reset all steps, folders, and rule groups. Continue?")) {
      return;
    }
    setWorkflowType(newType);
    
    // Check if it's a custom type (no template available)
    const isCustomType = customWorkflowTypes.some(wf => wf.key === newType);
    if (isCustomType) {
      // Start fresh for custom types
      setSteps([]);
      setFolders([]);
      setRuleGroups([]);
      setTemplateLoaded(false);
    } else {
      loadDefaultTemplate(newType);
    }
  };

  // Add new step
  const addStep = () => {
    const newStep = {
      id: Date.now(),
      name: `Step ${steps.length + 1}`,
      activityName: `Activity${steps.length + 1}`,
      activityType: "manual",
      folderRule: "ExplicitFolder",
      folder: "",
      ruleGroup: "",
      rule: "true",
      helpText: "",
      supportNote: "",
      flags: [],
      robot: "",
      customFieldName: "",
      skipIfNoApprovers: false,
      iconUrl: ""
    };
    setSteps([...steps, newStep]);
    setSelectedStep(newStep.id);
  };

  // Add new folder
  const addFolder = () => {
    const newFolder = {
      id: Date.now(),
      name: `Folder ${folders.length + 1}`,
      folderType: "shared",
      robot: "",
      workflowType: workflowType
    };
    setFolders([...folders, newFolder]);
  };

  // Update step
  const updateStep = (id, field, value) => {
    setSteps(steps.map(s => s.id === id ? { ...s, [field]: value } : s));
  };

  // Delete step
  const deleteStep = (id) => {
    setSteps(steps.filter(s => s.id !== id));
    if (selectedStep === id) setSelectedStep(null);
  };

  // Move step
  const moveStep = (idx, direction) => {
    const newSteps = [...steps];
    const newIdx = idx + direction;
    if (newIdx >= 0 && newIdx < steps.length) {
      [newSteps[idx], newSteps[newIdx]] = [newSteps[newIdx], newSteps[idx]];
      setSteps(newSteps);
    }
  };

  // Generate Activity Name from Step Name
  const generateActivityName = (stepName) => {
    return stepName.replace(/[^a-zA-Z0-9]/g, '').replace(/\s+/g, '');
  };

  // Escape special XML characters
  const escapeXml = (str) => {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&apos;');
  };

  // Generate Workflow Definition XML
  const generateWorkflowXML = () => {
    const dtdUrl = allWorkflowTypes[workflowType]?.dtdUrl || WORKFLOW_TYPES.requisition.dtdUrl;
    
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    xml += `<!DOCTYPE ProcessDefinition SYSTEM "${dtdUrl}">\n`;
    xml += `<ProcessDefinition>\n`;
    xml += `  <WorkflowType>${escapeXml(workflowType)}</WorkflowType>\n`;
    xml += `  <Usable>true</Usable>\n`;
    xml += `  <Version>${escapeXml(workflowVersion)}</Version>\n`;
    if (workflowDescription) {
      xml += `  <VersionDescription>${escapeXml(workflowDescription)}</VersionDescription>\n`;
    }
    
    // Include Rule Groups as comments for reference (ADW rules are configured separately)
    if (ruleGroups.length > 0) {
      xml += `  <!--====== ADW Rule Groups Reference ======-->\n`;
      ruleGroups.forEach(group => {
        xml += `  <!-- Rule Group: ${escapeXml(group.name)} -->\n`;
        if (group.rules && group.rules.length > 0) {
          group.rules.forEach((rule, idx) => {
            const conditions = [];
            if (rule.departments) conditions.push(`Dept IN (${escapeXml(rule.departments)})`);
            if (rule.minAmount) conditions.push(`Amount >= $${escapeXml(rule.minAmount)}`);
            if (rule.maxAmount) conditions.push(`Amount <= $${escapeXml(rule.maxAmount)}`);
            if (rule.commodityCodes) conditions.push(`Commodity IN (${escapeXml(rule.commodityCodes)})`);
            if (rule.glAccounts) conditions.push(`GL IN (${escapeXml(rule.glAccounts)})`);
            if (rule.companyCodes) conditions.push(`Company IN (${escapeXml(rule.companyCodes)})`);
            // Include custom fields
            if (rule.customFields) {
              Object.entries(rule.customFields).forEach(([name, value]) => {
                if (value) conditions.push(`${escapeXml(name)} = "${escapeXml(value)}"`);
              });
            }
            const logic = rule.conditionLogic === "OR" ? " OR " : " AND ";
            const condStr = conditions.length > 0 ? conditions.join(logic) : "Always";
            xml += `  <!--   Rule ${idx + 1}: IF ${condStr} THEN ${escapeXml(rule.approvers) || '[No approvers]'} -->\n`;
          });
        }
      });
    }
    
    // Steps
    xml += `  <!--====== Steps ======-->\n`;
    steps.forEach(step => {
      xml += `  <Step name="${escapeXml(step.name)}">\n`;
      if (step.iconUrl) {
        xml += `    <IconUrl>${escapeXml(step.iconUrl)}</IconUrl>\n`;
      }
      xml += `    <Attribute name="wfActivityHelp">\n`;
      xml += `      <AttrValue lang="default">${escapeXml(step.helpText || `Help for ${step.name}`)}</AttrValue>\n`;
      xml += `    </Attribute>\n`;
      xml += `  </Step>\n`;
    });
    
    // Activities
    xml += `  <!--====== Activities ======-->\n`;
    
    // START activity
    xml += `  <Activity name="START">\n`;
    xml += `    <ActivityType>start</ActivityType>\n`;
    xml += `    <Rule />\n`;
    xml += `    <FolderSelectionRule>Dummy</FolderSelectionRule>\n`;
    xml += `  </Activity>\n`;
    
    // User-defined activities
    steps.forEach(step => {
      const actName = step.activityName || generateActivityName(step.name);
      xml += `  <Activity name="${escapeXml(actName)}">\n`;
      xml += `    <ActivityType>${step.activityType}</ActivityType>\n`;
      xml += `    <StepRef name="${escapeXml(step.name)}" />\n`;
      
      // FolderRef for ExplicitFolder
      if (step.folderRule === "ExplicitFolder" && step.folder) {
        xml += `    <FolderRef name="${escapeXml(step.folder)}" />\n`;
      }
      
      // Rule
      xml += `    <Rule><![CDATA[${step.rule || 'true'}]]></Rule>\n`;
      xml += `    <FolderSelectionRule>${step.folderRule}</FolderSelectionRule>\n`;
      
      // Flags
      if (step.flags && step.flags.length > 0) {
        step.flags.forEach(flag => {
          xml += `    <Flag>${escapeXml(flag)}</Flag>\n`;
        });
      }
      
      // Attributes
      if (step.folderRule === "MultiElementDynamic" && step.ruleGroup) {
        xml += `    <Attribute name="RuleGroupInternalName">\n`;
        xml += `      <AttrValue lang="default">${escapeXml(step.ruleGroup)}</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      
      if (step.folderRule === "CustomFieldValue" && step.customFieldName) {
        xml += `    <Attribute name="wfFolderRuleCustomFieldName">\n`;
        xml += `      <AttrValue lang="default">${escapeXml(step.customFieldName)}</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      
      if (step.supportNote) {
        xml += `    <Attribute name="wfActivitySupportNote">\n`;
        xml += `      <AttrValue lang="default">${escapeXml(step.supportNote)}</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      
      if (step.helpText) {
        xml += `    <Attribute name="wfActivityHelp">\n`;
        xml += `      <AttrValue lang="default">${escapeXml(step.helpText)}</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      
      if (step.skipIfNoApprovers) {
        xml += `    <Attribute name="wfSkipStepIfNoApprovers">\n`;
        xml += `      <AttrValue lang="default">true</AttrValue>\n`;
        xml += `    </Attribute>\n`;
      }
      
      xml += `  </Activity>\n`;
    });
    
    // END activity
    xml += `  <Activity name="END">\n`;
    xml += `    <ActivityType>end</ActivityType>\n`;
    xml += `    <Rule />\n`;
    xml += `    <FolderSelectionRule>Dummy</FolderSelectionRule>\n`;
    xml += `  </Activity>\n`;
    
    // Activity Relationships
    xml += `  <!--====== Activity relationships ======-->\n`;
    if (steps.length > 0) {
      const firstActName = steps[0].activityName || generateActivityName(steps[0].name);
      xml += `  <ActivityRelationship previous="START" next="${escapeXml(firstActName)}" />\n`;
      
      for (let i = 0; i < steps.length; i++) {
        const currActName = steps[i].activityName || generateActivityName(steps[i].name);
        const nextActName = i < steps.length - 1 
          ? (steps[i + 1].activityName || generateActivityName(steps[i + 1].name))
          : "END";
        xml += `  <ActivityRelationship previous="${escapeXml(currActName)}" next="${escapeXml(nextActName)}" />\n`;
      }
    } else {
      xml += `  <ActivityRelationship previous="START" next="END" />\n`;
    }
    
    xml += `</ProcessDefinition>`;
    return xml;
  };

  // Generate Folder Definition XML
  const generateFolderXML = () => {
    if (folders.length === 0) return null;
    
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    xml += `<!DOCTYPE WorkflowFolderMessage SYSTEM "https://usertest.sciquest.com/app_docs/dtd/workflow/WorkflowFolder.dtd">\n`;
    xml += `<WorkflowFolderMessage>\n`;
    
    folders.forEach(folder => {
      xml += `  <Folder name="${escapeXml(folder.name)}" folderType="${escapeXml(folder.folderType)}">\n`;
      xml += `    <WorkflowType>${escapeXml(folder.workflowType || workflowType)}</WorkflowType>\n`;
      if (folder.folderType === "automated" && folder.robot) {
        xml += `    <FolderRobot>${escapeXml(folder.robot)}</FolderRobot>\n`;
      }
      xml += `  </Folder>\n`;
    });
    
    xml += `</WorkflowFolderMessage>`;
    return xml;
  };

  // Generate ADW Rule Group XML
  const generateRuleGroupXML = () => {
    if (ruleGroups.length === 0) return null;
    
    let xml = `<?xml version="1.0" encoding="UTF-8"?>\n`;
    xml += `<!-- ADW Rule Groups Configuration for ${escapeXml(allWorkflowTypes[workflowType]?.name || workflowType)} -->\n`;
    xml += `<!-- These rules should be configured in Jaggaer Admin > Workflow > ADW Rule Groups -->\n`;
    xml += `<RuleGroups>\n`;
    
    ruleGroups.forEach(group => {
      xml += `  <!-- Rule Group: ${escapeXml(group.name)} -->\n`;
      if (group.description) {
        xml += `  <!-- Description: ${escapeXml(group.description)} -->\n`;
      }
      xml += `  <RuleGroup name="${escapeXml(group.name)}">\n`;
      
      if (group.rules && group.rules.length > 0) {
        group.rules.forEach((rule, idx) => {
          xml += `    <Rule priority="${idx + 1}">\n`;
          
          // Standard conditions
          if (rule.departments) {
            xml += `      <Condition field="Department" operator="IN" value="${escapeXml(rule.departments)}" />\n`;
          }
          if (rule.minAmount) {
            xml += `      <Condition field="Amount" operator="GTE" value="${escapeXml(rule.minAmount)}" />\n`;
          }
          if (rule.maxAmount) {
            xml += `      <Condition field="Amount" operator="LTE" value="${escapeXml(rule.maxAmount)}" />\n`;
          }
          if (rule.commodityCodes) {
            xml += `      <Condition field="CommodityCode" operator="IN" value="${escapeXml(rule.commodityCodes)}" />\n`;
          }
          if (rule.glAccounts) {
            xml += `      <Condition field="GLAccount" operator="IN" value="${escapeXml(rule.glAccounts)}" />\n`;
          }
          if (rule.companyCodes) {
            xml += `      <Condition field="CompanyCode" operator="IN" value="${escapeXml(rule.companyCodes)}" />\n`;
          }
          
          // Custom fields
          if (rule.customFields) {
            Object.entries(rule.customFields).forEach(([name, value]) => {
              if (value) {
                xml += `      <Condition field="${escapeXml(name)}" operator="EQUALS" value="${escapeXml(value)}" />\n`;
              }
            });
          }
          
          // Condition logic
          if (rule.conditionLogic === "OR") {
            xml += `      <ConditionLogic>OR</ConditionLogic>\n`;
          } else if (rule.conditionLogic === "CUSTOM" && rule.customExpression) {
            xml += `      <ConditionLogic>CUSTOM</ConditionLogic>\n`;
            xml += `      <CustomExpression><![CDATA[${rule.customExpression}]]></CustomExpression>\n`;
          }
          
          // Approvers
          if (rule.approvers) {
            xml += `      <Approvers>${escapeXml(rule.approvers)}</Approvers>\n`;
          }
          
          xml += `    </Rule>\n`;
        });
      }
      
      xml += `  </RuleGroup>\n`;
    });
    
    xml += `</RuleGroups>`;
    return xml;
  };

  // Download XML - Fixed to ensure proper download
  const downloadXML = (content, filename) => {
    if (!content) {
      console.error("No content to download");
      return;
    }
    const blob = new Blob([content], { type: 'application/xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
  
  // Export all XML files
  const exportAllXML = () => {
    const workflowXML = generateWorkflowXML();
    const wfTypeName = allWorkflowTypes[workflowType]?.name?.replace(/\s+/g, '_') || workflowType;
    downloadXML(workflowXML, `${wfTypeName}_workflow_v${workflowVersion}.xml`);
    
    let delay = 500;
    
    if (folders.length > 0) {
      setTimeout(() => {
        const folderXML = generateFolderXML();
        downloadXML(folderXML, `${wfTypeName}_folders.xml`);
      }, delay);
      delay += 500;
    }
    
    if (ruleGroups.length > 0) {
      setTimeout(() => {
        const ruleGroupXML = generateRuleGroupXML();
        downloadXML(ruleGroupXML, `${wfTypeName}_rule_groups.xml`);

        {/* Saved Workflow XML Preview (on welcome screen) */}

                {selectedSavedWorkflow.ruleGroupXml && (

        {/* Saved Workflow Emulator (on welcome screen) */}

            folders={selectedSavedWorkflow.folders}
            ruleGroups={selectedSavedWorkflow.ruleGroups}
            onClose={() => setShowSavedEmulator(false)} 
          />
        )}
      </div>
    );
  }

  // Builder Mode
  if (mode === "builder") {
    return (

              <button onClick={() => setMode(null)} className="text-slate-500 hover:text-slate-700">← Back</button>
              <div className="h-6 w-px bg-slate-200"></div>
              <h1 className="text-lg font-semibold text-slate-900">Workflow Builder</h1>
            </div>
            
            <div className="flex items-center gap-3">
              <button 
                onClick={() => setShowSavedWorkflows(true)}
                className="px-4 py-2 bg-amber-100 text-amber-700 rounded-lg hover:bg-amber-200 text-sm flex items-center gap-1"

              <button 
                onClick={() => {
                  const name = prompt("Enter a name for this workflow:", `${allWorkflowTypes[workflowType]?.name || workflowType} v${workflowVersion}`);

                className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
                disabled={steps.length === 0}
              >
                💾 Save
              </button>
              <button

                className="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 text-sm"
              >
                👁️ Preview XML

              <button

              <button

                📥 Export XML
              </button>
            </div>

        <main className="flex-1 max-w-7xl mx-auto px-6 py-6 w-full">
          {/* Workflow Settings */}

              {DEFAULT_TEMPLATES[workflowType] ? (

            {/* Add Custom Workflow Type Modal */}

                  </p>
