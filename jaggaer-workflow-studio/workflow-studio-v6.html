                                    <label className="block text-xs font-medium text-amber-700 mb-1">👤 Approver(s) for this rule</label>
                                    <input
                                      value={rule.approvers || ""}
                                      onChange={(e) => {
                                        const newRules = group.rules.map(r => r.id === rule.id ? {...r, approvers: e.target.value} : r);
                                        setRuleGroups(ruleGroups.map(g => g.id === group.id ? {...g, rules: newRules} : g));
                                      }}
                                      className="w-full px-2 py-1.5 text-sm border border-amber-200 rounded focus:ring-1 focus:ring-amber-400"
                                      placeholder="e.g., john.smith@company.com, jane.doe@company.com"
                                    />
                                  </div>

                                  {/* Custom Fields Section */}
                                  <div className="mt-3 pt-3 border-t border-amber-200">
                                    <div className="flex items-center justify-between mb-2">
                                      <label className="block text-xs font-semibold text-purple-700">🔧 Custom Fields (Ad-hoc Conditions)</label>
                                      <RuleGroupCustomFieldAdder 
                                        groupId={group.id} 
                                        ruleId={rule.id} 
                                        ruleGroups={ruleGroups}
                                        setRuleGroups={setRuleGroups}
                                      />
                                    </div>
                                    
                                    {rule.customFields && Object.keys(rule.customFields).length > 0 ? (
                                      <div className="grid grid-cols-3 gap-2 mb-2">
                                        {Object.entries(rule.customFields).map(([fieldName, fieldValue]) => (
                                          <div key={fieldName} className="flex items-center gap-1">
                                            <div className="flex-1">
                                              <label className="block text-xs text-purple-600 mb-0.5">{fieldName}</label>
                                              <input
                                                value={fieldValue || ""}
                                                onChange={(e) => {
                                                  const newCustomFields = {...rule.customFields, [fieldName]: e.target.value};
                                                  const newRules = group.rules.map(r => r.id === rule.id ? {...r, customFields: newCustomFields} : r);
                                                  setRuleGroups(ruleGroups.map(g => g.id === group.id ? {...g, rules: newRules} : g));
                                                }}
                                                className="w-full px-2 py-1 text-xs border border-purple-200 rounded bg-purple-50"
                                                placeholder={`Enter ${fieldName}...`}
                                              />
                                            </div>
                                            <button
                                              onClick={() => {
                                                const newCustomFields = {...rule.customFields};
                                                delete newCustomFields[fieldName];
                                                const newRules = group.rules.map(r => r.id === rule.id ? {...r, customFields: newCustomFields} : r);
                                                setRuleGroups(ruleGroups.map(g => g.id === group.id ? {...g, rules: newRules} : g));
                                              }}
                                              className="text-red-400 hover:text-red-600 text-xs mt-4"
                                              title={`Remove ${fieldName}`}
                                            >✕</button>
                                          </div>
                                        ))}
                                      </div>
                                    ) : (
                                      <p className="text-xs text-purple-500 italic mb-2">No custom fields. Add fields like Supplier, Project, Cost Center, etc.</p>
                                    )}
                                  </div>

                                  {/* Condition Logic */}
                                  <div className="mt-3 pt-3 border-t border-amber-200">
                                    <div className="flex items-center gap-3 mb-2">
                                      <label className="block text-xs font-semibold text-amber-700">Condition Logic:</label>
                                      <select
                                        value={rule.conditionLogic || "AND"}
                                        onChange={(e) => {
                                          const newRules = group.rules.map(r => r.id === rule.id ? {...r, conditionLogic: e.target.value} : r);
                                          setRuleGroups(ruleGroups.map(g => g.id === group.id ? {...g, rules: newRules} : g));
                                        }}
                                        className="px-2 py-1 text-xs border border-amber-200 rounded"
                                      >
                                        <option value="AND">ALL conditions must match (AND)</option>
                                        <option value="OR">ANY condition can match (OR)</option>
                                        <option value="CUSTOM">Custom Expression</option>
                                      </select>
                                    </div>
                                    
                                    {rule.conditionLogic === "CUSTOM" && (
                                      <div className="mb-2">
                                        <label className="block text-xs text-amber-700 mb-1">Custom Expression (advanced):</label>
                                        <input
                                          value={rule.customExpression || ""}
                                          onChange={(e) => {
                                            const newRules = group.rules.map(r => r.id === rule.id ? {...r, customExpression: e.target.value} : r);
                                            setRuleGroups(ruleGroups.map(g => g.id === group.id ? {...g, rules: newRules} : g));
                                          }}
                                          className="w-full px-2 py-1.5 text-xs font-mono border border-amber-200 rounded"
                                          placeholder="e.g., (Dept = 'IT' OR Dept = 'HR') AND Amount > 5000"
                                        />
                                      </div>
                                    )}
                                  </div>

                                  {/* Rule Preview */}
                                  <div className="mt-3 bg-white rounded px-3 py-2 text-xs">
                                    <div className="text-amber-800">
                                      <strong>IF:</strong> {(() => {
                                        if (rule.conditionLogic === "CUSTOM" && rule.customExpression) {
                                          return <span className="font-mono">{rule.customExpression}</span>;
                                        }
                                        const conditions = [];
                                        if (rule.departments) conditions.push(`Dept IN (${rule.departments})`);
                                        if (rule.minAmount) conditions.push(`Amount >= $${rule.minAmount}`);
                                        if (rule.maxAmount) conditions.push(`Amount <= $${rule.maxAmount}`);
                                        if (rule.commodityCodes) conditions.push(`Commodity IN (${rule.commodityCodes})`);
                                        if (rule.glAccounts) conditions.push(`GL IN (${rule.glAccounts})`);
                                        if (rule.companyCodes) conditions.push(`Company IN (${rule.companyCodes})`);
                                        // Add custom fields
                                        if (rule.customFields) {
                                          Object.entries(rule.customFields).forEach(([name, value]) => {
                                            if (value) conditions.push(`${name} = "${value}"`);
                                          });
                                        }
                                        const logic = rule.conditionLogic === "OR" ? " OR " : " AND ";
                                        return conditions.length > 0 ? conditions.join(logic) : <span className="text-slate-500">Always (no conditions)</span>;
                                      })()}
                                    </div>
                                    <div className="text-green-700 mt-1">
                                      <strong>THEN:</strong> Route to → <strong>{rule.approvers || <span className="text-red-500">[No approvers set]</span>}</strong>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>

                        {/* Show which steps use this rule group */}
                        {steps.filter(s => s.ruleGroup === group.name).length > 0 && (
                          <div className="px-4 pb-4">
                            <div className="pt-3 border-t border-slate-100">
                              <span className="text-xs text-slate-500">Used by steps: </span>
                              {steps.filter(s => s.ruleGroup === group.name).map(s => (
                                <span key={s.id} className="inline-block text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded mr-1">
                                  {s.name}
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Sidebar */}
              <div className="space-y-4">
                {/* Missing Rule Groups */}
                {(() => {
                  const referencedGroups = [...new Set(steps.filter(s => s.ruleGroup).map(s => s.ruleGroup))];
                  const missingGroups = referencedGroups.filter(rg => !ruleGroups.some(g => g.name === rg));
                  
                  return missingGroups.length > 0 && (
                    <div className="bg-amber-50 rounded-xl border border-amber-200 p-4">
                      <h3 className="font-semibold text-amber-900 mb-3">⚠️ Missing Rule Groups</h3>
                      <p className="text-xs text-amber-700 mb-3">These rule groups are referenced in steps but not defined:</p>
                      <div className="space-y-2">
                        {missingGroups.map(groupName => (
                          <div key={groupName} className="flex items-center justify-between bg-white rounded-lg p-2">
                            <span className="text-sm text-slate-700">{groupName}</span>
                            <button
                              onClick={() => setRuleGroups([...ruleGroups, {
                                id: Date.now(),
                                name: groupName,
                                description: "",
                                rules: []
                              }])}
                              className="text-xs px-2 py-1 bg-amber-500 text-white rounded hover:bg-amber-600"
                            >
                              + Add
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}

                {/* Quick Add Templates */}
                <div className="bg-white rounded-xl border border-slate-200 p-4">
                  <h3 className="font-semibold text-slate-900 mb-3">⚡ Quick Add Templates</h3>
                  <div className="space-y-2">
                    <button
                      onClick={() => setRuleGroups([...ruleGroups, {
                        id: Date.now(),
                        name: "Amount Tiers",
                        description: "Approval based on amount thresholds",
                        rules: [
                          { id: Date.now(), departments: "", minAmount: "0", maxAmount: "5000", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "manager@company.com" },
                          { id: Date.now() + 1, departments: "", minAmount: "5000", maxAmount: "25000", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "director@company.com" },
                          { id: Date.now() + 2, departments: "", minAmount: "25000", maxAmount: "", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "vp@company.com" }
                        ]
                      }])}
                      className="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg text-sm"
                    >
                      💰 Amount Tiers ($0-5k, $5k-25k, $25k+)
                    </button>
                    <button
                      onClick={() => setRuleGroups([...ruleGroups, {
                        id: Date.now(),
                        name: "Department Routing",
                        description: "Route to department managers",
                        rules: [
                          { id: Date.now(), departments: "IT", minAmount: "", maxAmount: "", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "it-manager@company.com" },
                          { id: Date.now() + 1, departments: "HR", minAmount: "", maxAmount: "", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "hr-manager@company.com" },
                          { id: Date.now() + 2, departments: "Finance", minAmount: "", maxAmount: "", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "finance-manager@company.com" }
                        ]
                      }])}
                      className="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg text-sm"
                    >
                      🏢 Department Routing (IT, HR, Finance)
                    </button>
                    <button
                      onClick={() => setRuleGroups([...ruleGroups, {
                        id: Date.now(),
                        name: "Commodity Approval",
                        description: "Route by commodity category",
                        rules: [
                          { id: Date.now(), departments: "", minAmount: "", maxAmount: "", commodityCodes: "IT, Software", glAccounts: "", companyCodes: "", approvers: "it-procurement@company.com" },
                          { id: Date.now() + 1, departments: "", minAmount: "", maxAmount: "", commodityCodes: "MRO, Facilities", glAccounts: "", companyCodes: "", approvers: "facilities@company.com" }
                        ]
                      }])}
                      className="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg text-sm"
                    >
                      📦 Commodity Routing (IT, MRO)
                    </button>
                    <button
                      onClick={() => setRuleGroups([...ruleGroups, {
                        id: Date.now(),
                        name: "High Value Approval",
                        description: "Executive approval for high value items",
                        rules: [
                          { id: Date.now(), departments: "", minAmount: "50000", maxAmount: "", commodityCodes: "", glAccounts: "", companyCodes: "", approvers: "cfo@company.com" }
                        ]
                      }])}
                      className="w-full text-left px-3 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg text-sm"
                    >
                      💎 High Value ($50k+ → CFO)
                    </button>
                  </div>
                </div>

                {/* Summary */}
                <div className="bg-white rounded-xl border border-slate-200 p-4">
                  <h3 className="font-semibold text-slate-900 mb-3">📊 Summary</h3>
                  <div className="space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-slate-600">Rule Groups:</span>
                      <span className="font-medium">{ruleGroups.length}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-600">Total Rules:</span>
                      <span className="font-medium">{ruleGroups.reduce((sum, g) => sum + (g.rules?.length || 0), 0)}</span>
                    </div>
                    <div className="flex justify-between">
                      <span className="text-slate-600">Steps Using ADW:</span>
                      <span className="font-medium">{steps.filter(s => s.folderRule === "MultiElementDynamic").length}</span>
                    </div>
                  </div>
                </div>

                {/* Info */}
                <div className="bg-blue-50 rounded-xl border border-blue-200 p-4">
                  <h3 className="font-semibold text-blue-900 mb-2">ℹ️ About Rule Groups</h3>
                  <p className="text-xs text-blue-700">
                    Rule Groups are used with the <strong>MultiElementDynamic</strong> folder selection rule. 
                    Each rule group can have multiple rules with different conditions. 
                    When a document matches a rule's conditions, it routes to the specified approvers.
                  </p>
                </div>
              </div>
            </div>
          )}
        </main>

        {/* XML Preview Modal */}
        {showXmlPreview && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col">
              <div className="bg-slate-900 text-white p-4 flex items-center justify-between">
                <h2 className="font-semibold">XML Preview</h2>
                <button onClick={() => setShowXmlPreview(false)} className="text-white/80 hover:text-white">×</button>
              </div>
              <div className="flex-1 overflow-auto p-4 bg-slate-900">
                <p className="text-slate-400 text-xs mb-2">📄 Workflow Definition XML:</p>
                <pre className="text-green-400 text-sm font-mono whitespace-pre-wrap">{generateWorkflowXML()}</pre>
                {folders.length > 0 && (
                  <>
                    <hr className="border-slate-700 my-4" />
                    <p className="text-slate-400 text-xs mb-2">📁 Folder Definition XML:</p>
                    <pre className="text-blue-400 text-sm font-mono whitespace-pre-wrap">{generateFolderXML()}</pre>
                  </>
                )}
                {ruleGroups.length > 0 && (
                  <>
                    <hr className="border-slate-700 my-4" />
                    <p className="text-slate-400 text-xs mb-2">⚙️ ADW Rule Groups XML:</p>
                    <pre className="text-purple-400 text-sm font-mono whitespace-pre-wrap">{generateRuleGroupXML()}</pre>
                  </>
                )}
              </div>
            </div>
          </div>
        )}

        {/* Emulator Modal */}
        {showEmulator && (
          <WorkflowEmulator 
            steps={steps} 
            workflowType={workflowType}
            folders={folders}
            ruleGroups={ruleGroups}
            onClose={() => setShowEmulator(false)} 
          />
        )}

        {/* Saved Workflows Modal */}
        {showSavedWorkflows && (
          <SavedWorkflowsModal
            savedWorkflows={savedWorkflows}
            onClose={() => {
              setShowSavedWorkflows(false);
              setSelectedSavedWorkflow(null);
            }}
            onDelete={deleteSavedWorkflow}
            onLoad={loadSavedWorkflow}
            onExport={(workflow) => {
              const wfTypeName = workflow.name.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
              downloadXML(workflow.xml, `${wfTypeName}_workflow.xml`);
              let exportDelay = 300;
              if (workflow.folderXml) {
                setTimeout(() => {
                  downloadXML(workflow.folderXml, `${wfTypeName}_folders.xml`);
                }, exportDelay);
                exportDelay += 300;
              }
              if (workflow.ruleGroupXml) {
                setTimeout(() => {
                  downloadXML(workflow.ruleGroupXml, `${wfTypeName}_rule_groups.xml`);
                }, exportDelay);
              }
            }}
            onExportAll={() => exportMultipleWorkflows(savedWorkflows.map(w => w.id))}
            onViewXml={(workflow) => {
              setSelectedSavedWorkflow(workflow);
              setShowSavedXmlPreview(true);
            }}
            onSimulate={(workflow) => {
              setSelectedSavedWorkflow(workflow);
              setShowSavedEmulator(true);
            }}
            allWorkflowTypes={allWorkflowTypes}
          />
        )}

        {/* Saved Workflow XML Preview */}
        {showSavedXmlPreview && selectedSavedWorkflow && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[60] p-4">
            <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden flex flex-col">
              <div className="bg-slate-900 text-white p-4 flex items-center justify-between">
                <h2 className="font-semibold">XML Preview: {selectedSavedWorkflow.name}</h2>
                <button onClick={() => setShowSavedXmlPreview(false)} className="text-white/80 hover:text-white text-2xl">×</button>
              </div>
              <div className="flex-1 overflow-auto p-4 bg-slate-900">
                <p className="text-slate-400 text-xs mb-2">📄 Workflow Definition XML:</p>
                <pre className="text-green-400 text-sm font-mono whitespace-pre-wrap">{selectedSavedWorkflow.xml}</pre>
                {selectedSavedWorkflow.folderXml && (
                  <>
                    <hr className="border-slate-700 my-4" />
                    <p className="text-slate-400 text-xs mb-2">📁 Folder Definition XML:</p>
                    <pre className="text-blue-400 text-sm font-mono whitespace-pre-wrap">{selectedSavedWorkflow.folderXml}</pre>
                  </>
                )}
                {selectedSavedWorkflow.ruleGroupXml && (
                  <>
                    <hr className="border-slate-700 my-4" />
                    <p className="text-slate-400 text-xs mb-2">⚙️ ADW Rule Groups XML:</p>
                    <pre className="text-purple-400 text-sm font-mono whitespace-pre-wrap">{selectedSavedWorkflow.ruleGroupXml}</pre>
                  </>
                )}
              </div>
            </div>
          </div>
        )}

        {/* Saved Workflow Emulator */}
        {showSavedEmulator && selectedSavedWorkflow && (
          <WorkflowEmulator 
            steps={selectedSavedWorkflow.steps} 
            workflowType={selectedSavedWorkflow.workflowType}
            folders={selectedSavedWorkflow.folders}
            ruleGroups={selectedSavedWorkflow.ruleGroups}
            onClose={() => setShowSavedEmulator(false)} 
          />
        )}
      </div>
    );
  }

  // Template Import Mode
  if (mode === "template") {
    return (
      <TemplateImportMode
        onBack={() => setMode(null)}
        onImportComplete={(data) => {
          setWorkflowType(data.workflowType);
          setWorkflowVersion(data.version || "1");
          setWorkflowDescription(data.description || "");
          setSteps(data.steps || []);
          setFolders(data.folders || []);
          setRuleGroups(data.ruleGroups || []);
          setMode("builder");
        }}
        allWorkflowTypes={allWorkflowTypes}
      />
    );
  }

  // Questionnaire Mode
  if (mode === "questionnaire") {
    return (
      <QuestionnaireMode
        onBack={() => setMode(null)}
        onGenerateWorkflow={(data) => {
          setWorkflowType(data.workflowType);
          setWorkflowVersion(data.version || "1");
          setWorkflowDescription(data.description || "");
          setSteps(data.steps || []);
          setFolders(data.folders || []);
          setRuleGroups(data.ruleGroups || []);
          setMode("builder");
        }}
        allWorkflowTypes={allWorkflowTypes}
      />
    );
  }

  // Fallback
  return null;
};

// ============ SAVED WORKFLOWS MODAL ============
const SavedWorkflowsModal = ({ savedWorkflows, onClose, onDelete, onLoad, onExport, onExportAll, onViewXml, onSimulate, allWorkflowTypes }) => {
  const [selectedIds, setSelectedIds] = useState([]);
  const [filter, setFilter] = useState("");

  const filteredWorkflows = savedWorkflows.filter(w => 
    w.name.toLowerCase().includes(filter.toLowerCase()) ||
    w.workflowType.toLowerCase().includes(filter.toLowerCase())
  );

  const toggleSelect = (id) => {
    setSelectedIds(prev => 
      prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
    );
  };

  const selectAll = () => {
    if (selectedIds.length === filteredWorkflows.length) {
      setSelectedIds([]);
    } else {
      setSelectedIds(filteredWorkflows.map(w => w.id));
    }
  };

  const exportSelected = () => {
    if (selectedIds.length === 0) return;
    selectedIds.forEach((id, idx) => {
      const workflow = savedWorkflows.find(w => w.id === id);
      if (workflow) {
        setTimeout(() => {
          onExport(workflow);
        }, idx * 600);
      }
    });
  };

  const deleteSelected = () => {
    if (selectedIds.length === 0) return;
    if (window.confirm(`Delete ${selectedIds.length} selected workflow(s)?`)) {
      selectedIds.forEach(id => onDelete(id));
      setSelectedIds([]);
    }
  };

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        {/* Header */}
        <div className="bg-gradient-to-r from-amber-500 to-orange-500 text-white p-4 flex items-center justify-between">
          <div>
            <h2 className="font-bold text-xl">📁 Saved Workflows</h2>
            <p className="text-amber-100 text-sm">{savedWorkflows.length} workflow(s) saved</p>
          </div>
          <button onClick={onClose} className="text-white/80 hover:text-white text-3xl">×</button>
        </div>

        {/* Toolbar */}
        <div className="bg-slate-50 border-b border-slate-200 p-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-2">
            <input
              type="text"
              placeholder="🔍 Search workflows..."
              value={filter}
              onChange={(e) => setFilter(e.target.value)}
              className="px-3 py-1.5 border border-slate-300 rounded-lg text-sm w-64"
            />
            <button
              onClick={selectAll}
              className="px-3 py-1.5 bg-slate-200 text-slate-700 rounded-lg text-sm hover:bg-slate-300"
            >
              {selectedIds.length === filteredWorkflows.length && filteredWorkflows.length > 0 ? "Deselect All" : "Select All"}
            </button>
          </div>
          <div className="flex items-center gap-2">
            {selectedIds.length > 0 && (
              <>
                <span className="text-sm text-slate-600">{selectedIds.length} selected</span>
                <button
                  onClick={exportSelected}
                  className="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700"
                >
                  📥 Export Selected
                </button>
                <button
                  onClick={deleteSelected}
                  className="px-3 py-1.5 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700"
                >
                  🗑️ Delete Selected
                </button>
              </>
            )}
            {savedWorkflows.length > 0 && selectedIds.length === 0 && (
              <button
                onClick={onExportAll}
                className="px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700"
              >
                📥 Export All
              </button>
            )}
          </div>
        </div>

        {/* Content */}
        <div className="flex-1 overflow-auto p-4">
          {savedWorkflows.length === 0 ? (
            <div className="text-center py-16">
              <div className="text-6xl mb-4">📭</div>
              <h3 className="text-xl font-semibold text-slate-700 mb-2">No Saved Workflows</h3>
              <p className="text-slate-500">Build a workflow and click "💾 Save" to save it here.</p>
            </div>
          ) : filteredWorkflows.length === 0 ? (
            <div className="text-center py-16">
              <div className="text-4xl mb-4">🔍</div>
              <p className="text-slate-500">No workflows match your search.</p>
            </div>
          ) : (
            <div className="space-y-3">
              {filteredWorkflows.map(workflow => (
                <div 
                  key={workflow.id} 
                  className={`bg-white border rounded-xl p-4 transition-all ${
                    selectedIds.includes(workflow.id) 
                      ? 'border-amber-400 bg-amber-50 ring-2 ring-amber-200' 
                      : 'border-slate-200 hover:border-slate-300'
                  }`}
                >
                  <div className="flex items-start gap-4">
                    {/* Checkbox */}
                    <input
                      type="checkbox"
                      checked={selectedIds.includes(workflow.id)}
                      onChange={() => toggleSelect(workflow.id)}
                      className="mt-1 w-5 h-5 rounded border-slate-300 text-amber-500 focus:ring-amber-500"
                    />

                    {/* Info */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1">
                        <h3 className="font-semibold text-slate-900 truncate">{workflow.name}</h3>
                        <span className="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-xs">
                          {allWorkflowTypes[workflow.workflowType]?.name || workflow.workflowType}
                        </span>
                        <span className="px-2 py-0.5 bg-blue-100 text-blue-600 rounded text-xs">
                          v{workflow.workflowVersion}
                        </span>

                      <div className="flex items-center gap-4 text-xs text-slate-500">
                        <span>📅 {new Date(workflow.savedAt).toLocaleString()}</span>
                        <span>📋 {workflow.steps?.length || 0} steps</span>
                        <span>📁 {workflow.folders?.length || 0} folders</span>
                        <span>⚙️ {workflow.ruleGroups?.length || 0} rule groups</span>
                      </div>
                      {workflow.workflowDescription && (
                        <p className="text-sm text-slate-600 mt-1 truncate">{workflow.workflowDescription}</p>
                      )}
                    </div>

                    {/* Actions */}
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <button
                        onClick={() => onViewXml(workflow)}
                        className="px-3 py-1.5 bg-slate-100 text-slate-700 rounded-lg text-xs hover:bg-slate-200"
                        title="View XML"
                      >
                        👁️ XML
                      </button>
                      <button
                        onClick={() => onSimulate(workflow)}
                        className="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-xs hover:bg-purple-200"
                        title="Run Simulation"
                      >
                        ▶️ Simulate
                      </button>
                      <button
                        onClick={() => onExport(workflow)}
                        className="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs hover:bg-blue-200"
                        title="Export XML"
                      >
                        📥 Export
                      </button>
                      <button
                        onClick={() => onLoad(workflow)}
                        className="px-3 py-1.5 bg-green-100 text-green-700 rounded-lg text-xs hover:bg-green-200"
                        title="Load into Editor"
                      >
                        ✏️ Edit
                      </button>
                      <button
                        onClick={() => {
                          if (window.confirm(`Delete "${workflow.name}"?`)) {
                            onDelete(workflow.id);
                          }
                        }}
                        className="px-3 py-1.5 bg-red-100 text-red-700 rounded-lg text-xs hover:bg-red-200"
                        title="Delete"
                      >
                        🗑️
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="bg-slate-50 border-t border-slate-200 p-3 flex items-center justify-between">
          <p className="text-xs text-slate-500">
            💡 Workflows are saved in your browser's local storage.
          </p>
          <button
            onClick={onClose}
            className="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg text-sm hover:bg-slate-300"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  );
};

// ============ CUSTOM FIELD ADDER COMPONENT (for Step Editor) ============
const CustomFieldAdder = ({ ruleId, onAdd }) => {
  const [fieldName, setFieldName] = useState("");
  
  const handleAdd = () => {
    if (fieldName.trim()) {
      onAdd(ruleId, fieldName.trim());
      setFieldName("");
    }
  };
  
  return (
    <div className="flex items-center gap-1">
      <input
        type="text"
        value={fieldName}
        onChange={(e) => setFieldName(e.target.value)}
        placeholder="Field name (e.g., Supplier)"
        className="px-2 py-0.5 text-xs border border-amber-300 rounded w-32"
        onKeyDown={(e) => {
          if (e.key === 'Enter') {
            handleAdd();
          }
        }}
      />
      <button
        onClick={handleAdd}
        className="px-2 py-0.5 bg-purple-500 text-white rounded text-xs hover:bg-purple-600"
      >
        + Add
      </button>
    </div>
  );
};

// ============ RULE GROUP CUSTOM FIELD ADDER (for Rule Groups Tab) ============
const RuleGroupCustomFieldAdder = ({ groupId, ruleId, ruleGroups, setRuleGroups }) => {
  const [fieldName, setFieldName] = useState("");
  
  const handleAdd = () => {
    if (fieldName.trim()) {
      const newRuleGroups = ruleGroups.map(g => {
        if (g.id === groupId) {
          const newRules = g.rules.map(r => {
            if (r.id === ruleId) {
              const customFields = r.customFields || {};
              return {...r, customFields: {...customFields, [fieldName.trim()]: ""}};
            }
            return r;
          });
          return {...g, rules: newRules};
        }
        return g;
      });
      setRuleGroups(newRuleGroups);
      setFieldName("");
    }
  };
  
  return (
    <div className="flex items-center gap-1">
      <input
        type="text"
        value={fieldName}
        onChange={(e) => setFieldName(e.target.value)}
        placeholder="Add field (e.g., Supplier)"
        className="px-2 py-0.5 text-xs border border-purple-300 rounded w-36"
        onKeyDown={(e) => {
          if (e.key === 'Enter') {
            handleAdd();
          }
        }}
      />
      <button
        onClick={handleAdd}
        className="px-2 py-0.5 bg-purple-500 text-white rounded text-xs hover:bg-purple-600"
      >
        + Add
      </button>
    </div>
  );
};

// ============ STEP EDITOR COMPONENT ============
const StepEditor = ({ step, updateStep, folders, ruleGroups, setRuleGroups }) => {
  const [showRuleGroupEditor, setShowRuleGroupEditor] = useState(false);
  const [newCustomFieldName, setNewCustomFieldName] = useState("");
  
  // Get the selected rule group object
  const selectedRuleGroup = ruleGroups.find(g => g.name === step.ruleGroup);
  
  // Update a rule within the selected rule group
  const updateRuleInGroup = (ruleId, field, value) => {
    if (!selectedRuleGroup) return;
    const newRules = selectedRuleGroup.rules.map(r => 
      r.id === ruleId ? {...r, [field]: value} : r
    );
    setRuleGroups(ruleGroups.map(g => 
      g.id === selectedRuleGroup.id ? {...g, rules: newRules} : g
    ));
  };
  
  // Add a new rule to the selected rule group
  const addRuleToGroup = () => {
    if (!selectedRuleGroup) return;
    const newRule = {
      id: Date.now(),
      departments: "",
      minAmount: "",
      maxAmount: "",
      commodityCodes: "",
      glAccounts: "",
      companyCodes: "",
      approvers: "",
      customFields: {} // Support for custom fields
    };
    setRuleGroups(ruleGroups.map(g => 
      g.id === selectedRuleGroup.id ? {...g, rules: [...(g.rules || []), newRule]} : g
    ));
  };
  
  // Delete a rule from the selected rule group
  const deleteRuleFromGroup = (ruleId) => {
    if (!selectedRuleGroup) return;
    setRuleGroups(ruleGroups.map(g => 
      g.id === selectedRuleGroup.id ? {...g, rules: g.rules.filter(r => r.id !== ruleId)} : g
    ));
  };
  
  // Add custom field to a rule
  const addCustomFieldToRule = (ruleId, fieldName) => {
    if (!selectedRuleGroup || !fieldName.trim()) return;
    const newRules = selectedRuleGroup.rules.map(r => {
      if (r.id === ruleId) {
        const customFields = r.customFields || {};
        customFields[fieldName.trim()] = "";
        return {...r, customFields};
      }
      return r;
    });
    setRuleGroups(ruleGroups.map(g => 
      g.id === selectedRuleGroup.id ? {...g, rules: newRules} : g
    ));
  };
  
  // Remove custom field from a rule
  const removeCustomFieldFromRule = (ruleId, fieldName) => {
    if (!selectedRuleGroup) return;
    const newRules = selectedRuleGroup.rules.map(r => {
      if (r.id === ruleId && r.customFields) {
        const customFields = {...r.customFields};
        delete customFields[fieldName];
        return {...r, customFields};
      }
      return r;
    });
    setRuleGroups(ruleGroups.map(g => 
      g.id === selectedRuleGroup.id ? {...g, rules: newRules} : g
    ));
  };
  
  // Update custom field value in a rule
  const updateCustomFieldInRule = (ruleId, fieldName, value) => {
    if (!selectedRuleGroup) return;
    const newRules = selectedRuleGroup.rules.map(r => {
      if (r.id === ruleId) {
        const customFields = r.customFields || {};
        customFields[fieldName] = value;
        return {...r, customFields};
      }
      return r;
    });
    setRuleGroups(ruleGroups.map(g => 
      g.id === selectedRuleGroup.id ? {...g, rules: newRules} : g
    ));
  };
  
  return (
    <div className="border-t border-slate-200 p-4 bg-slate-50 animate-slide-in">
      <div className="grid md:grid-cols-2 gap-4">
        {/* Basic Info */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Step Name</label>
          <input
            value={step.name}
            onChange={(e) => updateStep(step.id, "name", e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg"
            placeholder="e.g., Department Approval"
          />
        </div>
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Activity Name (XML)</label>
          <input
            value={step.activityName}
            onChange={(e) => updateStep(step.id, "activityName", e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg font-mono text-sm"
            placeholder="e.g., DepartmentApproval"
          />
        </div>
        
        {/* Activity Type */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Activity Type</label>
          <select
            value={step.activityType}
            onChange={(e) => updateStep(step.id, "activityType", e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg"
          >
            {Object.entries(ACTIVITY_TYPES).map(([key, type]) => (
              <option key={key} value={key}>{type.icon} {type.name} - {type.description}</option>
            ))}
          </select>
        </div>

        {/* Folder Selection Rule */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Folder Selection Rule</label>
          <select
            value={step.folderRule}
            onChange={(e) => updateStep(step.id, "folderRule", e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg"
          >
            {Object.entries(FOLDER_RULES).map(([key, rule]) => (
              <option key={key} value={key}>{rule.name}</option>
            ))}
          </select>
        </div>

        {/* Folder Name (for ExplicitFolder) */}
        {step.folderRule === "ExplicitFolder" && (
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">Folder Name</label>
            <input
              value={step.folder || ""}
              onChange={(e) => updateStep(step.id, "folder", e.target.value)}
              className="w-full px-3 py-2 border border-slate-300 rounded-lg"
              placeholder="e.g., EHS Check, Create PO"
              list="folder-suggestions"
            />
            <datalist id="folder-suggestions">
              {folders.map(f => <option key={f.id} value={f.name} />)}
            </datalist>
          </div>
        )}

        {/* Rule Group (for MultiElementDynamic) */}
        {step.folderRule === "MultiElementDynamic" && (
          <div className="md:col-span-2">
            <label className="block text-sm font-medium text-slate-700 mb-1">⚙️ ADW Rule Group</label>
            <div className="flex gap-2 mb-2">
              <select
                value={step.ruleGroup || ""}
                onChange={(e) => {
                  updateStep(step.id, "ruleGroup", e.target.value);
                  setShowRuleGroupEditor(!!e.target.value);
                }}
                className="flex-1 px-3 py-2 border border-slate-300 rounded-lg"
              >
                <option value="">Select Rule Group...</option>
                {ruleGroups.map(g => (
                  <option key={g.id} value={g.name}>{g.name} ({g.rules?.length || 0} rules)</option>
                ))}
              </select>
              <button
                onClick={() => {
                  const newGroupName = `${step.name} Rules`;
                  const newGroup = {
                    id: Date.now(),
                    name: newGroupName,
                    description: `Rules for ${step.name}`,
                    rules: []
                  };
                  setRuleGroups([...ruleGroups, newGroup]);
                  updateStep(step.id, "ruleGroup", newGroupName);
                  setShowRuleGroupEditor(true);
                }}
                className="px-3 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 text-sm whitespace-nowrap"
              >
                + New Group
              </button>
            </div>
            
            {/* Inline Rule Group Editor */}
            {step.ruleGroup && selectedRuleGroup && (
              <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mt-2">
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <span className="font-semibold text-amber-800">📋 {selectedRuleGroup.name}</span>
                    <span className="text-xs text-amber-600">({selectedRuleGroup.rules?.length || 0} rules)</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <button
                      onClick={() => setShowRuleGroupEditor(!showRuleGroupEditor)}
                      className="text-xs px-2 py-1 bg-amber-200 text-amber-800 rounded hover:bg-amber-300"
                    >
                      {showRuleGroupEditor ? "▼ Collapse" : "▶ Expand"}
                    </button>
                    <button
                      onClick={addRuleToGroup}
                      className="text-xs px-2 py-1 bg-amber-500 text-white rounded hover:bg-amber-600"
                    >
                      + Add Rule
                    </button>
                  </div>
                </div>
                
                {showRuleGroupEditor && (
                  <div className="space-y-3">
                    {(!selectedRuleGroup.rules || selectedRuleGroup.rules.length === 0) ? (
                      <p className="text-sm text-amber-700 text-center py-4">No rules defined. Click "+ Add Rule" to create conditions.</p>
                    ) : (
                      selectedRuleGroup.rules.map((rule, ruleIdx) => (
                        <div key={rule.id} className="bg-white border border-amber-200 rounded-lg p-3">
                          <div className="flex items-center justify-between mb-2">
                            <span className="text-xs font-semibold text-amber-800">Rule #{ruleIdx + 1}</span>
                            <button 
                              onClick={() => deleteRuleFromGroup(rule.id)}
                              className="text-xs text-red-500 hover:text-red-700"
                            >✕ Remove</button>
                          </div>
                          
                          <div className="grid grid-cols-3 gap-2 mb-2">
                            <div>
                              <label className="block text-xs text-amber-700 mb-0.5">Department(s)</label>
                              <input
                                value={rule.departments || ""}
                                onChange={(e) => updateRuleInGroup(rule.id, "departments", e.target.value)}
                                className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                                placeholder="IT, HR, Finance"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-amber-700 mb-0.5">Min Amount ($)</label>
                              <input
                                type="number"
                                value={rule.minAmount || ""}
                                onChange={(e) => updateRuleInGroup(rule.id, "minAmount", e.target.value)}
                                className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                                placeholder="0"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-amber-700 mb-0.5">Max Amount ($)</label>
                              <input
                                type="number"
                                value={rule.maxAmount || ""}
                                onChange={(e) => updateRuleInGroup(rule.id, "maxAmount", e.target.value)}
                                className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                                placeholder="No limit"
                              />
                            </div>
                          </div>
                          
                          <div className="grid grid-cols-3 gap-2 mb-2">
                            <div>
                              <label className="block text-xs text-amber-700 mb-0.5">Commodity Code(s)</label>
                              <input
                                value={rule.commodityCodes || ""}
                                onChange={(e) => updateRuleInGroup(rule.id, "commodityCodes", e.target.value)}
                                className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                                placeholder="IT, MRO"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-amber-700 mb-0.5">GL Account(s)</label>
                              <input
                                value={rule.glAccounts || ""}
                                onChange={(e) => updateRuleInGroup(rule.id, "glAccounts", e.target.value)}
                                className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                                placeholder="1505, 1510"
                              />
                            </div>
                            <div>
                              <label className="block text-xs text-amber-700 mb-0.5">Company Code(s)</label>
                              <input
                                value={rule.companyCodes || ""}
                                onChange={(e) => updateRuleInGroup(rule.id, "companyCodes", e.target.value)}
                                className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                                placeholder="1000, 2000"
                              />
                            </div>
                          </div>
                          
                          <div>
                            <label className="block text-xs text-amber-700 mb-0.5">👤 Approver(s)</label>
                            <input
                              value={rule.approvers || ""}
                              onChange={(e) => updateRuleInGroup(rule.id, "approvers", e.target.value)}
                              className="w-full px-2 py-1 text-xs border border-amber-200 rounded"
                              placeholder="john@company.com, jane@company.com"
                            />
                          </div>
                          
                          {/* Custom Fields Section */}
                          <div className="mt-3 pt-3 border-t border-amber-200">
                            <div className="flex items-center justify-between mb-2">
                              <label className="block text-xs font-semibold text-amber-800">🔧 Custom Fields</label>
                              <CustomFieldAdder ruleId={rule.id} onAdd={addCustomFieldToRule} />
                            </div>
                            
                            {rule.customFields && Object.keys(rule.customFields).length > 0 && (
                              <div className="grid grid-cols-2 gap-2">
                                {Object.entries(rule.customFields).map(([fieldName, fieldValue]) => (
                                  <div key={fieldName} className="flex items-center gap-1">
                                    <div className="flex-1">
                                      <label className="block text-xs text-purple-700 mb-0.5">{fieldName}</label>
                                      <input
                                        value={fieldValue || ""}
                                        onChange={(e) => updateCustomFieldInRule(rule.id, fieldName, e.target.value)}
                                        className="w-full px-2 py-1 text-xs border border-purple-200 rounded bg-purple-50"
                                        placeholder={`Enter ${fieldName}...`}
                                      />
                                    </div>
                                    <button
                                      onClick={() => removeCustomFieldFromRule(rule.id, fieldName)}
                                      className="text-red-400 hover:text-red-600 text-xs mt-4"
                                      title={`Remove ${fieldName}`}
                                    >✕</button>
                                  </div>
                                ))}
                              </div>
                            )}
                            
                            {(!rule.customFields || Object.keys(rule.customFields).length === 0) && (
                              <p className="text-xs text-amber-600 italic">No custom fields. Add fields like Supplier, Project, Cost Center, etc.</p>
                            )}
                          </div>
                          
                          {/* Rule Preview */}
                          <div className="mt-2 bg-amber-100 rounded px-2 py-1 text-xs text-amber-700">
                            <strong>IF:</strong> {(() => {
                              const conditions = [];
                              if (rule.departments) conditions.push(`Dept IN (${rule.departments})`);
                              if (rule.minAmount) conditions.push(`Amount >= $${rule.minAmount}`);
                              if (rule.maxAmount) conditions.push(`Amount <= $${rule.maxAmount}`);
                              if (rule.commodityCodes) conditions.push(`Commodity IN (${rule.commodityCodes})`);
                              if (rule.glAccounts) conditions.push(`GL IN (${rule.glAccounts})`);
                              if (rule.companyCodes) conditions.push(`Company IN (${rule.companyCodes})`);
                              // Add custom fields to preview
                              if (rule.customFields) {
                                Object.entries(rule.customFields).forEach(([name, value]) => {
                                  if (value) conditions.push(`${name} = "${value}"`);
                                });
                              }
                              return conditions.length > 0 ? conditions.join(" AND ") : "Always";
                            })()} <strong>THEN:</strong> {rule.approvers || "[No approvers]"}
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                )}
              </div>
            )}
            
            {step.ruleGroup && !selectedRuleGroup && (
              <div className="bg-red-50 border border-red-200 rounded-lg p-3 mt-2">
                <p className="text-sm text-red-700">
                  ⚠️ Rule group "{step.ruleGroup}" not found. 
                  <button
                    onClick={() => {
                      const newGroup = {
                        id: Date.now(),
                        name: step.ruleGroup,
                        description: "",
                        rules: []
                      };
                      setRuleGroups([...ruleGroups, newGroup]);
                    }}
                    className="ml-2 underline hover:no-underline"
                  >
                    Create it now
                  </button>
                </p>
              </div>
            )}
          </div>
        )}

        {/* Custom Field (for CustomFieldValue) */}
        {step.folderRule === "CustomFieldValue" && (
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">Custom Field Name</label>
            <input
              value={step.customFieldName || ""}
              onChange={(e) => updateStep(step.id, "customFieldName", e.target.value)}
              className="w-full px-3 py-2 border border-slate-300 rounded-lg"
              placeholder="Internal name of custom field"
            />
          </div>
        )}

        {/* Robot (for automated) */}
        {step.activityType === "automated" && (
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">Robot</label>
            <select
              value={step.robot || ""}
              onChange={(e) => updateStep(step.id, "robot", e.target.value)}
              className="w-full px-3 py-2 border border-slate-300 rounded-lg"
            >
              <option value="">Select Robot...</option>

                <option key={key} value={key}>{robot.name}</option>
              ))}
            </select>
          </div>

        {/* Rule Expression */}
        <div className="md:col-span-2">
          <label className="block text-sm font-medium text-slate-700 mb-1">Entry Rule (CDATA)</label>
          <div className="flex gap-2">
            <select 
              onChange={(e) => {
                if (e.target.value) {
                  let expr = RULE_TEMPLATES[e.target.value].expression;
                  expr = expr.replace("{ruleGroup}", step.ruleGroup || step.name);
                  expr = expr.replace("{stepName}", step.name);
                  updateStep(step.id, "rule", expr);
                }
                e.target.value = "";
              }}
              className="px-2 py-2 border border-slate-300 rounded-lg text-sm"
            >
              <option value="">Insert Template...</option>
              {Object.entries(RULE_TEMPLATES).map(([key, tmpl]) => (
                <option key={key} value={key}>{tmpl.name}</option>
              ))}
            </select>
            <input
              value={step.rule || "true"}
              onChange={(e) => updateStep(step.id, "rule", e.target.value)}
              className="flex-1 px-3 py-2 border border-slate-300 rounded-lg font-mono text-sm"
              placeholder="true"
            />
          </div>
        </div>

        {/* Help Text */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Help Text</label>
          <input
            value={step.helpText || ""}
            onChange={(e) => updateStep(step.id, "helpText", e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg"
            placeholder="Help text shown to users"
          />
        </div>

        {/* Support Note */}
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1">Support Note</label>
          <input
            value={step.supportNote || ""}
            onChange={(e) => updateStep(step.id, "supportNote", e.target.value)}
            className="w-full px-3 py-2 border border-slate-300 rounded-lg"
            placeholder="Internal support notes"
          />
        </div>

        {/* Flags */}
        <div className="md:col-span-2">
          <label className="block text-sm font-medium text-slate-700 mb-2">Activity Flags</label>
          <div className="flex flex-wrap gap-2">
            {Object.entries(ACTIVITY_FLAGS).map(([key, flag]) => (
              <label key={key} className="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg cursor-pointer hover:bg-slate-200" title={flag.description}>
                <input
                  type="checkbox"
                  checked={(step.flags || []).includes(key)}
                  onChange={(e) => {
                    const flags = step.flags || [];
                    const newFlags = e.target.checked ? [...flags, key] : flags.filter(f => f !== key);
                    updateStep(step.id, "flags", newFlags);
                  }}
                  className="rounded border-slate-300"
                />
                <span className="text-xs text-slate-700">{flag.name}</span>
              </label>
            ))}
          </div>
        </div>

        {/* Skip if no approvers */}
        <div className="md:col-span-2">
          <label className="flex items-center gap-2">
            <input
              type="checkbox"
              checked={step.skipIfNoApprovers || false}
              onChange={(e) => updateStep(step.id, "skipIfNoApprovers", e.target.checked)}
              className="rounded border-slate-300"
            />
            <span className="text-sm text-slate-700">Skip step if no approvers configured (wfSkipStepIfNoApprovers)</span>
          </label>
        </div>
      </div>
    </div>
  );
};

// ============ WORKFLOW EMULATOR ============
const WorkflowEmulator = ({ steps, workflowType, folders, ruleGroups, onClose }) => {
  const [currentStep, setCurrentStep] = useState(-1);
  const [isRunning, setIsRunning] = useState(false);
  const [log, setLog] = useState([]);
  const [selectedStepDetail, setSelectedStepDetail] = useState(null);

  const allSteps = [
    { name: "START", activityType: "start", activityName: "START" },
    ...steps,
    { name: "END", activityType: "end", activityName: "END" }
  ];

  const addLog = (message, type = "info") => {
    setLog(prev => [...prev, { time: new Date().toLocaleTimeString(), message, type }]);
  };

  // Get approvers for a step based on folder rule
  const getApproversForStep = (step) => {
    const approvers = [];
    
    if (step.folderRule === "MultiElementDynamic" && step.ruleGroup) {
      // Get approvers from rule group
      const ruleGroup = ruleGroups?.find(g => g.name === step.ruleGroup);
      if (ruleGroup && ruleGroup.rules) {
        ruleGroup.rules.forEach(rule => {
          if (rule.approvers) {
            rule.approvers.split(',').forEach(email => {
              const trimmed = email.trim();
              if (trimmed && !approvers.includes(trimmed)) {
                approvers.push(trimmed);
              }
            });
          }
        });
      }
    } else if (step.folderRule === "ExplicitFolder" && step.folder) {
      // Get approvers from folder definition
      const folder = folders?.find(f => f.name === step.folder);
      if (folder && folder.approvers) {
        folder.approvers.split(',').forEach(email => {
          const trimmed = email.trim();
          if (trimmed && !approvers.includes(trimmed)) {
            approvers.push(trimmed);
          }
        });
      }
    }
    
    return approvers;
  };

  const runSimulation = async () => {
    setIsRunning(true);
    setLog([]);
    setCurrentStep(0);
    addLog("▶️ START activity triggered", "success");
    addLog("   ActivityType: start", "info");
    addLog("   FolderSelectionRule: Dummy", "info");

    for (let i = 0; i < steps.length; i++) {
      await new Promise(r => setTimeout(r, 1500));
      setCurrentStep(i + 1);
      const step = steps[i];
      
      // Log step entry with all details
      addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, "info");
      addLog(`📍 Step ${i + 1}: ${step.name}`, "success");
      addLog(`   Activity: ${step.activityName || step.name.replace(/\s+/g, '')}`, "info");
      addLog(`   Type: ${ACTIVITY_TYPES[step.activityType]?.name || step.activityType}`, "info");
      
      // Log rule evaluation
      if (step.rule && step.rule !== "true") {
        addLog(`   📋 Evaluating Rule:`, "info");
        addLog(`      ${step.rule}`, "info");
        await new Promise(r => setTimeout(r, 300));
        addLog(`   ✓ Rule evaluated: TRUE`, "success");
      }
      
      // Log folder selection rule
      const folderRuleName = FOLDER_RULES[step.folderRule]?.name || step.folderRule;
      addLog(`   📁 Folder Rule: ${folderRuleName}`, "info");
      
      // Handle different activity types with their specific data
      if (step.activityType === "automated") {
        const robotName = step.robot ? (ROBOTS[step.robot]?.name || step.robot) : "Unknown Robot";
        const robotId = step.robot ? (ROBOTS[step.robot]?.id || "N/A") : "N/A";
        addLog(`   🤖 Robot: ${robotName} (ID: ${robotId})`, "info");
        if (step.folder) {
          addLog(`   📂 Target Folder: ${step.folder}`, "info");
        }
        await new Promise(r => setTimeout(r, 800));
        addLog(`   ✅ Robot execution completed`, "success");
        
      } else if (step.activityType === "notification") {
        if (step.folder) {
          addLog(`   � Notification Folder: ${step.folder}`, "info");
        }
        addLog(`   📧 Sending notifications to folder approvers...`, "info");
        await new Promise(r => setTimeout(r, 400));
        addLog(`   ✅ Notifications sent (no approval required)`, "success");
        
      } else if (step.activityType === "manual") {
        // Show routing details based on folder rule
        if (step.folderRule === "ExplicitFolder" && step.folder) {
          addLog(`   📂 Routing to Folder: ${step.folder}`, "info");
          // Get folder approvers
          const folder = folders?.find(f => f.name === step.folder);
          if (folder && folder.approvers) {
            addLog(`   👥 Folder Approvers: ${folder.approvers}`, "info");
          }
        } else if (step.folderRule === "MultiElementDynamic" && step.ruleGroup) {
          addLog(`   ⚙️ ADW Rule Group: ${step.ruleGroup}`, "info");
          addLog(`   🔍 Evaluating dynamic approvers...`, "info");
          // Get rule group and show matching rules
          const ruleGroup = ruleGroups?.find(g => g.name === step.ruleGroup);
          if (ruleGroup && ruleGroup.rules && ruleGroup.rules.length > 0) {
            await new Promise(r => setTimeout(r, 300));
            ruleGroup.rules.forEach((rule, idx) => {
              const conditions = [];
              if (rule.departments) conditions.push(`Dept: ${rule.departments}`);
              if (rule.minAmount) conditions.push(`Min: $${rule.minAmount}`);
              if (rule.maxAmount) conditions.push(`Max: $${rule.maxAmount}`);
              if (rule.commodityCodes) conditions.push(`Commodity: ${rule.commodityCodes}`);
              if (rule.glAccounts) conditions.push(`GL: ${rule.glAccounts}`);
              if (rule.companyCodes) conditions.push(`Company: ${rule.companyCodes}`);
              // Include custom fields
              if (rule.customFields) {
                Object.entries(rule.customFields).forEach(([name, value]) => {
                  if (value) conditions.push(`${name}: ${value}`);
                });
              }
              const condStr = conditions.length > 0 ? conditions.join(", ") : "Default";
              if (rule.approvers) {
                addLog(`      Rule ${idx + 1} [${condStr}]`, "info");
                addLog(`         📧 → ${rule.approvers}`, "info");
              }
            });
          }
        } else if (step.folderRule === "Department") {
          addLog(`   🏢 Routing to Department approvers`, "info");
          addLog(`   📧 → [Department Manager from org structure]`, "info");
        } else if (step.folderRule === "CommodityCode") {
          addLog(`   📦 Routing by Commodity Code`, "info");
          addLog(`   📧 → [Commodity Code approvers from setup]`, "info");
        } else if (step.folderRule === "CustomFieldValue" && step.customFieldName) {
          addLog(`   🔧 Custom Field: ${step.customFieldName}`, "info");
          addLog(`   📧 → [Approvers based on field value]`, "info");
        } else if (step.folderRule === "UserSelectedApprover") {
          addLog(`   👤 User Selected Approver`, "info");
          addLog(`   📧 → [Approver selected by requisitioner]`, "info");
        }
        
        // Get and display all resolved approvers
        const approvers = getApproversForStep(step);
        if (approvers.length > 0) {
          await new Promise(r => setTimeout(r, 200));
          addLog(`   ✉️ Sending approval request to:`, "info");
          approvers.forEach(email => {
            addLog(`      📧 ${email}`, "info");
          });
        }
        
        // Show flags if any
        if (step.flags && step.flags.length > 0) {
          addLog(`   🚩 Flags: ${step.flags.join(", ")}`, "info");
        }
        
        // Show skip if no approvers
        if (step.skipIfNoApprovers) {
          addLog(`   ⏭️ Skip if no approvers: enabled`, "info");
        }
        
        addLog(`   👤 Awaiting approval...`, "info");
        await new Promise(r => setTimeout(r, 600));
        
        // Show who approved
        if (approvers.length > 0) {
          const approver = approvers[0]; // Simulate first approver approving
          addLog(`   ✅ Approved by: ${approver}`, "success");
        } else {
          addLog(`   ✅ Approved`, "success");
        }
        
      } else if (step.activityType === "dummy") {
        addLog(`   🔗 Dummy activity - passing through`, "info");
        await new Promise(r => setTimeout(r, 200));
        addLog(`   ✅ Passed`, "success");
      }
      
      // Show help text if available
      if (step.helpText) {
        addLog(`   💡 Help: ${step.helpText}`, "info");
      }
    }

    await new Promise(r => setTimeout(r, 800));
    setCurrentStep(steps.length + 1);
    addLog(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, "info");
    addLog("🏁 END activity reached", "success");
    addLog("   ActivityType: end", "info");
    addLog("   FolderSelectionRule: Dummy", "info");
    addLog("", "info");
    addLog("✨ Workflow completed successfully!", "success");
    addLog(`   Total steps: ${steps.length}`, "info");
    addLog(`   Manual approvals: ${steps.filter(s => s.activityType === 'manual').length}`, "info");
    addLog(`   Automated steps: ${steps.filter(s => s.activityType === 'automated').length}`, "info");
    setIsRunning(false);
  };

  // Get icon for activity type
  const getStepIcon = (step, idx, total) => {
    if (idx === 0) return "▶";
    if (idx === total - 1) return "■";
    return ACTIVITY_TYPES[step.activityType]?.icon || (idx);
  };

  // Get color for activity type
  const getStepColor = (step) => {
    if (step.activityType === "start") return "bg-green-500";
    if (step.activityType === "end") return "bg-red-500";
    if (step.activityType === "automated") return "bg-purple-500";
    if (step.activityType === "notification") return "bg-amber-500";
    if (step.activityType === "dummy") return "bg-slate-400";
    return "bg-blue-500";
  };

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl max-w-5xl w-full max-h-[90vh] overflow-hidden flex flex-col">
        <div className="bg-gradient-to-r from-purple-600 to-blue-600 text-white p-4 flex items-center justify-between">
          <div>
            <h2 className="font-semibold">🎮 Workflow Simulator</h2>
            <p className="text-sm text-white/80">{WORKFLOW_TYPES[workflowType]?.name} Workflow • {steps.length} steps</p>
          </div>
          <button onClick={onClose} className="text-white/80 hover:text-white text-xl">×</button>
        </div>

        <div className="flex-1 overflow-auto p-6 grid md:grid-cols-5 gap-6">
          {/* Flow - Left side */}
          <div className="md:col-span-2">
            <h3 className="font-semibold mb-4">Workflow Progress</h3>
            <div className="space-y-1 max-h-[400px] overflow-auto">
              {allSteps.map((step, idx) => (
                <div 
                  key={idx} 
                  className={`flex items-center gap-3 p-2 rounded-lg transition-all cursor-pointer hover:bg-slate-100 ${
                    idx === currentStep ? 'bg-blue-100 animate-pulse-glow' : 
                    idx < currentStep ? 'bg-green-50' : 'bg-slate-50'
                  }`}
                  onClick={() => setSelectedStepDetail(idx > 0 && idx < allSteps.length - 1 ? steps[idx - 1] : null)}
                >
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-white text-sm flex-shrink-0 ${
                    idx < currentStep ? 'bg-green-500' :
                    idx === currentStep ? 'bg-blue-500' : getStepColor(step)
                  }`}>
                    {idx < currentStep ? '✓' : getStepIcon(step, idx, allSteps.length)}
                  </div>
                  <div className="flex-1 min-w-0">
                    <span className={`text-sm block truncate ${idx === currentStep ? 'font-semibold text-blue-700' : ''}`}>
                      {step.name}
                    </span>
                    {idx > 0 && idx < allSteps.length - 1 && (
                      <span className="text-xs text-slate-500">
                        {ACTIVITY_TYPES[step.activityType]?.name} • {FOLDER_RULES[step.folderRule]?.name || step.folderRule}
                      </span>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {/* Step Detail Panel */}
            {selectedStepDetail && (
              <div className="mt-4 p-3 bg-slate-100 rounded-lg text-xs">
                <h4 className="font-semibold text-slate-800 mb-2">📋 {selectedStepDetail.name}</h4>
                <div className="space-y-1 text-slate-600">
                  <p><strong>Activity:</strong> {selectedStepDetail.activityName}</p>
                  <p><strong>Type:</strong> {ACTIVITY_TYPES[selectedStepDetail.activityType]?.name}</p>
                  <p><strong>Folder Rule:</strong> {FOLDER_RULES[selectedStepDetail.folderRule]?.name}</p>
                  {selectedStepDetail.folder && <p><strong>Folder:</strong> {selectedStepDetail.folder}</p>}
                  {selectedStepDetail.ruleGroup && <p><strong>Rule Group:</strong> {selectedStepDetail.ruleGroup}</p>}
                  {selectedStepDetail.robot && <p><strong>Robot:</strong> {ROBOTS[selectedStepDetail.robot]?.name}</p>}
                  {selectedStepDetail.rule && selectedStepDetail.rule !== "true" && (
                    <p><strong>Rule:</strong> <code className="bg-slate-200 px-1 rounded">{selectedStepDetail.rule}</code></p>
                  )}
                  {selectedStepDetail.flags?.length > 0 && <p><strong>Flags:</strong> {selectedStepDetail.flags.join(", ")}</p>}
                </div>
              </div>
            )}
          </div>

          {/* Log - Right side */}
          <div className="md:col-span-3">
            <h3 className="font-semibold mb-4">Execution Log</h3>
            <div className="bg-slate-900 rounded-lg p-3 h-[450px] overflow-auto font-mono text-xs">
              {log.length === 0 ? (
                <div className="text-slate-500">
                  <p>Click "Run Simulation" to start...</p>
                  <p className="mt-2">The simulator will:</p>
                  <ul className="list-disc ml-4 mt-1 space-y-1">
                    <li>Execute each step in sequence</li>
                    <li>Show activity types and folder rules</li>
                    <li>Evaluate entry rules</li>
                    <li>Display robot executions</li>
                    <li>Show ADW rule group evaluations</li>
                  </ul>
                </div>
              ) : (
                log.map((entry, i) => (
                  <div key={i} className={`mb-0.5 ${
                    entry.type === 'success' ? 'text-green-400' :
                    entry.type === 'error' ? 'text-red-400' : 
                    entry.type === 'warning' ? 'text-amber-400' : 'text-slate-300'
                  }`}>
                    {entry.message ? (
                      <>
                        <span className="text-slate-500">[{entry.time}]</span> {entry.message}
                      </>
                    ) : null}
                  </div>
                ))
              )}
            </div>
          </div>
        </div>

        <div className="border-t p-4 flex items-center justify-between">
          <div className="text-sm text-slate-500">
            {steps.length > 0 && (
              <span>
                {steps.filter(s => s.activityType === 'manual').length} manual • 
                {steps.filter(s => s.activityType === 'automated').length} automated • 
                {steps.filter(s => s.activityType === 'notification').length} notification
              </span>
            )}
          </div>
          <div className="flex gap-3">
            <button 
              onClick={() => { setCurrentStep(-1); setLog([]); setSelectedStepDetail(null); }} 
              className="px-4 py-2 bg-slate-200 rounded-lg hover:bg-slate-300" 
              disabled={isRunning}
            >
              Reset
            </button>
            <button 
              onClick={runSimulation} 
              className="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 disabled:opacity-50" 
              disabled={isRunning || steps.length === 0}
            >
              {isRunning ? "Running..." : "▶️ Run Simulation"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
